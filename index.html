  //
  // New approach:
  //   1. Initial load: one getCountFromServer() per benchmark (server-side
  //      aggregation, billed as 1 read each — ~30 total instead of 20,000).
  //   2. Live updates: maintain counts locally by listening only to the
  //      currently-OPEN benchmark's gallery (already done in
  //      subscribePortfolios + subscribeGallery). Other badges drift only
  //      while a different benchmark is open; refreshCountBadge() is called
  //      after every submit/delete to re-pull the affected benchmark.
  async function refreshCountBadge(benchmarkId) {
    if (!benchmarkId) return;
    const isHw = benchmarkId.startsWith('hw-');
    const colName = isHw ? 'artifacts' : 'portfolios';
    try {
      const q = query(collection(db, colName), where('benchmarkId', '==', benchmarkId));
      const agg = await getCountFromServer(q);
      updateCountBadge(benchmarkId, agg.data().count);
    } catch (err) {
      console.warn('count refresh failed for', benchmarkId, err);
    }
  }

  async function loadInitialCounts() {
    const ids = Object.keys(countEls);
    // Run in parallel; getCountFromServer is a single read each.
    await Promise.allSettled(ids.map(refreshCountBadge));
  }

  const _schemHistory = [];      // JSON snapshots of state for undo
  const _SCHEM_HISTORY_MAX = 40;

  function pushSchemHistory() {
    try {
      _schemHistory.push(JSON.stringify(_schemState));
      if (_schemHistory.length > _SCHEM_HISTORY_MAX) _schemHistory.shift();
    } catch (_) {}
  }
  function schemUndo() {
    const snap = _schemHistory.pop();
    if (!snap) {
      schemToast('Nothing to undo.');
      return;
    }
    try {
      _schemState = JSON.parse(snap);
      _schemPendingPin = null;
      schemSave();
      renderPerfboard();
    } catch (_) {
      schemToast('Could not undo.');
    }
  }

  function schemLoad() {
    try {
      const raw = localStorage.getItem(SCHEM_STORAGE_KEY);
      if (!raw) return _schemDefaultState();
      const parsed = JSON.parse(raw);
      // Merge defaults so older saves don't crash.
      return Object.assign(_schemDefaultState(), parsed);
    } catch (err) {
      console.warn('schematic load failed', err);
      return _schemDefaultState();
    }
  }

  function schemSave() {
    try {
      localStorage.setItem(SCHEM_STORAGE_KEY, JSON.stringify(_schemState));
    } catch (err) {
      console.warn('schematic save failed', err);
    }
  }

  function schemNewId(prefix) {
    const n = _schemState._idCounter++;
    return `${prefix}_${n}`;
  }

  function schemToast(msg, ms) {
    let el = document.getElementById('schemToast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'schemToast';
      el.className = 'schem-toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    requestAnimationFrame(() => el.classList.add('is-visible'));
    clearTimeout(el._timer);
    el._timer = setTimeout(() => {
      el.classList.remove('is-visible');
    }, ms || 2400);
  }

  function initSchematicTool() {
    _schemState = schemLoad();
    _schemPendingPin = null;
    _schemDrag = null;

    app.innerHTML = '';
    const wrap = document.createElement('section');
    wrap.className = 'project';
    wrap.innerHTML = `
      <button class="schem-back" id="schemBack">← Back</button>
      <h2 class="project-title">Schematic</h2>

      <div class="schem-wrap">
        <div class="schem-toolbar">
          <div class="schem-toolbar-group">
            <span class="schem-toolbar-label">Wire color</span>
            <div class="schem-color-row" id="schemColors"></div>
          </div>
          <div class="schem-toolbar-group" style="margin-left: auto;">
            <button class="schem-btn" id="schemUndo" title="Undo last change (Cmd+Z / Ctrl+Z)">Undo</button>
            <button class="schem-btn" id="schemClear">Clear</button>
            <button class="schem-btn" id="schemPortfolio">Add to Portfolio</button>
            <button class="schem-btn is-primary" id="schemDownload">Download Image</button>
          </div>
        </div>

        <div class="schem-stage">
          <div class="schem-palette" id="schemPalette"></div>
          <div class="schem-canvas-wrap" id="schemCanvasWrap"></div>
        </div>

        <div class="schem-hint">Click a pin, then a second pin to draw a wire. Shift+click any component to rotate 90°. Double-click a wire to delete. Cmd/Ctrl+Z to undo.</div>
      </div>
    `;
    app.appendChild(wrap);

    document.getElementById('schemBack').addEventListener('click', () => {
      history.pushState({}, '', '/tools');
      document.body.classList.remove('view-tools-detail');
      renderTools();
    });

    renderComponentPalette();
    renderColorRow();
    renderPerfboard();

    document.getElementById('schemUndo').addEventListener('click', schemUndo);
    // Keyboard shortcut: Cmd/Ctrl+Z to undo
    const undoKeyHandler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
        e.preventDefault();
        schemUndo();
      }
    };
    document.addEventListener('keydown', undoKeyHandler);
    // Detach when leaving the tool — small leak protection
    document.getElementById('schemBack').addEventListener('click', () => {
      document.removeEventListener('keydown', undoKeyHandler);
    });

    document.getElementById('schemClear').addEventListener('click', () => {
      if (!_schemState.components.length && !_schemState.wires.length) {
        schemToast('Already empty.');
        return;
      }
      if (!confirm('Clear the whole canvas? This cannot be undone.')) return;
      clearCanvas();
    });

    document.getElementById('schemPortfolio').addEventListener('click', () => {
      schemToast('Coming soon. For now, download and add manually.', 3200);
    });

    document.getElementById('schemDownload').addEventListener('click', () => {
      exportPNG();
    });
  }

  function renderColorRow() {
    const row = document.getElementById('schemColors');
    row.innerHTML = '';
    Object.entries(SCHEM_COLORS).forEach(([name, hex]) => {
      const btn = document.createElement('button');
      btn.className = 'schem-color' + (name === _schemState.selectedColor ? ' is-active' : '');
      btn.style.background = hex;
      btn.title = name;
      btn.setAttribute('aria-label', `Wire color: ${name}`);
      btn.addEventListener('click', () => {
        _schemState.selectedColor = name;
        schemSave();
        renderColorRow();
      });
      row.appendChild(btn);
    });
  }

  function renderComponentPalette() {
    const pal = document.getElementById('schemPalette');
    pal.innerHTML = '';
    const groups = { boards: [], components: [] };
    Object.entries(SCHEM_COMPONENTS).forEach(([type, def]) => {
      groups[def.group].push({ type, def });
    });

    const addGroup = (title, items) => {
      const heading = document.createElement('div');
      heading.className = 'schem-palette-group';
      heading.textContent = title;
      pal.appendChild(heading);
      items.forEach(({ type, def }) => {
        const btn = document.createElement('button');
        btn.className = 'schem-palette-item';
        btn.innerHTML = `
          <span class="schem-palette-thumb">
            <svg viewBox="0 0 ${def.w * SCHEM_GRID_PITCH} ${def.h * SCHEM_GRID_PITCH}" width="28" height="${Math.min(28, def.h * 14)}">
              ${def.svg({ ledColor: 'red' })}
            </svg>
          </span>
          <span>${def.label}</span>
        `;
        btn.addEventListener('click', () => placeComponent(type));
        pal.appendChild(btn);
      });
    };

    addGroup('Boards', groups.boards);
    addGroup('Components', groups.components);
  }

  // Resize the canvas grid to fit all currently-placed components, plus a few
  // cells of breathing room on the right and bottom. Generous minimums so the
  // canvas starts off as a real workspace, not a tight box.
  function autoFitCanvas() {
    let maxCol = 50;
    let maxRow = 32;
    _schemState.components.forEach(c => {
      const w = _schemComponentW(c);
      const h = _schemComponentH(c);
      maxCol = Math.max(maxCol, c.x + w + 5);
      maxRow = Math.max(maxRow, c.y + h + 4);
    });
    _schemState.gridCols = maxCol;
    _schemState.gridRows = maxRow;
  }

  function _schemComponentW(c) {
    const def = SCHEM_COMPONENTS[c.type];
    if (!def) return 4;
    if (c.type === 'perfboard') return c.cols || def.w;
    return def.w;
  }
  function _schemComponentH(c) {
    const def = SCHEM_COMPONENTS[c.type];
    if (!def) return 4;
    if (c.type === 'perfboard') return c.rows || def.h;
    return def.h;
  }
  function _schemPerfboardPins(cols, rows) {
    const out = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        out.push({ name: `r${r}c${c}`, gx: c + 0.5, gy: r + 0.5 });
      }
    }
    return out;
  }

  function renderPerfboard() {
    const wrap = document.getElementById('schemCanvasWrap');
    if (!wrap) return;
    autoFitCanvas();
    wrap.innerHTML = '';

    const cols = _schemState.gridCols;
    const rows = _schemState.gridRows;
    const W = (cols + 1) * SCHEM_GRID_PITCH;
    const H = (rows + 1) * SCHEM_GRID_PITCH;

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'schem-canvas');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('xmlns', svgNS);
    _schemSvg = svg;

    // Workspace background, baked into the SVG so PNG export keeps it.
    const bg = document.createElementNS(svgNS, 'rect');
    bg.setAttribute('x', 0);
    bg.setAttribute('y', 0);
    bg.setAttribute('width', W);
    bg.setAttribute('height', H);
    bg.setAttribute('fill', '#FAF6EE');
    bg.setAttribute('rx', 8);
    svg.appendChild(bg);

    // Components layer.
    const layerComponents = document.createElementNS(svgNS, 'g');
    layerComponents.setAttribute('id', 'schemLayerComponents');
    svg.appendChild(layerComponents);

    // Wires layer (drawn ABOVE components so they're visible).
    const layerWires = document.createElementNS(svgNS, 'g');
    layerWires.setAttribute('id', 'schemLayerWires');
    svg.appendChild(layerWires);

    _schemState.components.forEach(c => drawComponent(c));
    _schemState.wires.forEach(w => drawWire(w));

    // Cancel pending wire on background click.
    svg.addEventListener('click', (e) => {
      if (e.target === svg || e.target === bg) {
        if (_schemPendingPin) {
          _schemPendingPin = null;
          highlightPendingPin(null);
        }
      }
    });

    // Drag handling at the SVG level for performance.
    svg.addEventListener('mousemove', _schemOnDragMove);
    svg.addEventListener('mouseup', _schemOnDragEnd);
    svg.addEventListener('mouseleave', _schemOnDragEnd);

    wrap.appendChild(svg);
  }

  function drawComponent(c) {
    const def = SCHEM_COMPONENTS[c.type];
    if (!def) return;
    const svgNS = 'http://www.w3.org/2000/svg';
    const layer = _schemSvg.querySelector('#schemLayerComponents');

    const isPerfboard = c.type === 'perfboard';
    const cw = _schemComponentW(c);
    const ch = _schemComponentH(c);

    const g = document.createElementNS(svgNS, 'g');
    g.setAttribute('class', 'schem-component component-svg');
    g.setAttribute('data-component', c.type);
    g.setAttribute('data-component-id', c.id);
    const rot = c.rotation || 0;
    const cxLocal = cw * SCHEM_GRID_PITCH / 2;
    const cyLocal = ch * SCHEM_GRID_PITCH / 2;
    const transform = rot
      ? `translate(${(c.x + 0.5) * SCHEM_GRID_PITCH}, ${(c.y + 0.5) * SCHEM_GRID_PITCH}) rotate(${rot} ${cxLocal} ${cyLocal})`
      : `translate(${(c.x + 0.5) * SCHEM_GRID_PITCH}, ${(c.y + 0.5) * SCHEM_GRID_PITCH})`;
    g.setAttribute('transform', transform);

    // Body (innerSVG from definition). Pins drawn separately below.
    const body = document.createElementNS(svgNS, 'g');
    body.setAttribute('class', 'schem-component-body');
    if (isPerfboard) {
      const W = cw * SCHEM_GRID_PITCH;
      const H = ch * SCHEM_GRID_PITCH;
      body.innerHTML = `
        <rect x="0" y="0" width="${W}" height="${H}" rx="6" fill="#1f6f3e" stroke="#0c3a1f" stroke-width="2"/>
        <rect x="2" y="2" width="${W - 4}" height="${H - 4}" rx="4" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
        <circle cx="${W*0.04}" cy="${H*0.06}" r="3.5" fill="#0c3a1f"/>
        <circle cx="${W*0.96}" cy="${H*0.06}" r="3.5" fill="#0c3a1f"/>
        <circle cx="${W*0.04}" cy="${H*0.94}" r="3.5" fill="#0c3a1f"/>
        <circle cx="${W*0.96}" cy="${H*0.94}" r="3.5" fill="#0c3a1f"/>
      `;
    } else {
      body.innerHTML = def.svg({ ledColor: c.ledColor || 'red' });
    }
    g.appendChild(body);

    // Pins (dynamic for perfboard, static otherwise).
    const pins = isPerfboard ? _schemPerfboardPins(cw, ch) : def.pins;
    pins.forEach(pin => {
      const px = pin.gx * SCHEM_GRID_PITCH;
      const py = pin.gy * SCHEM_GRID_PITCH;
      const pinG = document.createElementNS(svgNS, 'g');
      pinG.setAttribute('class', 'schem-pin-group');

      const pinId = `${c.id}:${pin.name}`;

      if (def.pinStyle === 'pad') {
        // Perfboard copper ring: outer copper donut + dark hole + transparent click target.
        const ring = document.createElementNS(svgNS, 'circle');
        ring.setAttribute('cx', px);
        ring.setAttribute('cy', py);
        ring.setAttribute('r', 5.5);
        ring.setAttribute('fill', '#d4a851');
        ring.setAttribute('stroke', '#7a5c1c');
        ring.setAttribute('stroke-width', '0.7');
        ring.setAttribute('pointer-events', 'none');
        pinG.appendChild(ring);

        const hole = document.createElementNS(svgNS, 'circle');
        hole.setAttribute('cx', px);
        hole.setAttribute('cy', py);
        hole.setAttribute('r', 1.8);
        hole.setAttribute('fill', '#0c0c0c');
        hole.setAttribute('pointer-events', 'none');
        pinG.appendChild(hole);

        // Click target overlay (transparent), uses the same .schem-pin styling for hover affordance.
        const click = document.createElementNS(svgNS, 'circle');
        click.setAttribute('class', 'schem-pin schem-pad');
        click.setAttribute('cx', px);
        click.setAttribute('cy', py);
        click.setAttribute('r', 6.5);
        click.setAttribute('fill', 'transparent');
        click.setAttribute('stroke', 'transparent');
        click.setAttribute('data-pin', pinId);
        pinG.appendChild(click);

        click.addEventListener('click', (e) => {
          e.stopPropagation();
          handlePinClick(pinId);
        });

        g.appendChild(pinG);
        return;
      }

      const pinCircle = document.createElementNS(svgNS, 'circle');
      pinCircle.setAttribute('class', 'schem-pin');
      pinCircle.setAttribute('cx', px);
      pinCircle.setAttribute('cy', py);
      pinCircle.setAttribute('r', SCHEM_PIN_RADIUS);
      pinCircle.setAttribute('fill', '#c0c0c0');
      pinCircle.setAttribute('stroke', '#1f2937');
      pinCircle.setAttribute('stroke-width', '1.2');
      pinCircle.setAttribute('data-pin', pinId);
      pinG.appendChild(pinCircle);

      if (def.pinLabels) {
        const lbl = document.createElementNS(svgNS, 'text');
        lbl.setAttribute('x', px);
        // Place label outside the component bbox.
        const labelAbove = pin.gy <= 0.01;
        lbl.setAttribute('y', labelAbove ? py - 8 : py + 14);
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('font-size', '7');
        lbl.setAttribute('fill', '#1f2937');
        lbl.setAttribute('font-family', 'system-ui, sans-serif');
        lbl.setAttribute('font-weight', '600');
        lbl.setAttribute('pointer-events', 'none');
        lbl.textContent = pin.name;
        pinG.appendChild(lbl);
      }

      pinCircle.addEventListener('click', (e) => {
        e.stopPropagation();
        handlePinClick(pinId);
      });

      g.appendChild(pinG);
    });

    // Perfboard move handle (top-left, dotted square icon). Always-visible
    // grab target so students don't have to find the gap between pads.
    if (isPerfboard) {
      const moveHandle = document.createElementNS(svgNS, 'g');
      moveHandle.setAttribute('class', 'schem-move-handle');
      moveHandle.innerHTML = `
        <rect x="-2" y="-2" width="20" height="20" rx="3" fill="#0c3a1f" stroke="#fff" stroke-width="0.8"/>
        <circle cx="3" cy="3" r="1" fill="#fff"/>
        <circle cx="8" cy="3" r="1" fill="#fff"/>
        <circle cx="13" cy="3" r="1" fill="#fff"/>
        <circle cx="3" cy="8" r="1" fill="#fff"/>
        <circle cx="8" cy="8" r="1" fill="#fff"/>
        <circle cx="13" cy="8" r="1" fill="#fff"/>
        <circle cx="3" cy="13" r="1" fill="#fff"/>
        <circle cx="8" cy="13" r="1" fill="#fff"/>
        <circle cx="13" cy="13" r="1" fill="#fff"/>
      `;
      moveHandle.style.cursor = 'grab';
      moveHandle.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        pushSchemHistory();
        const pt = svgPoint(e);
        _schemDrag = {
          id: c.id,
          startX: pt.x,
          startY: pt.y,
          originGx: c.x,
          originGy: c.y,
          moved: false
        };
        g.classList.add('is-dragging');
      });
      g.appendChild(moveHandle);
    }

    // Perfboard resize handle (bottom-right corner). Drag to grow/shrink.
    if (isPerfboard) {
      const W = cw * SCHEM_GRID_PITCH;
      const H = ch * SCHEM_GRID_PITCH;
      const handle = document.createElementNS(svgNS, 'g');
      handle.setAttribute('class', 'schem-resize-handle');
      handle.innerHTML = `
        <path d="M ${W - 14} ${H} L ${W} ${H} L ${W} ${H - 14} Z" fill="#0c3a1f" stroke="#fff" stroke-width="0.6"/>
        <line x1="${W - 8}" y1="${H - 2}" x2="${W - 2}" y2="${H - 8}" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="${W - 4}" y1="${H - 2}" x2="${W - 2}" y2="${H - 4}" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
      `;
      handle.style.cursor = 'nwse-resize';
      handle.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        pushSchemHistory();
        const pt = svgPoint(e);
        _schemResize = {
          id: c.id,
          startX: pt.x,
          startY: pt.y,
          startCols: cw,
          startRows: ch
        };
      });
      g.appendChild(handle);
    }

    // Drag start on the body, not on pins or the corner handles.
    g.addEventListener('mousedown', (e) => {
      if (e.target.classList && e.target.classList.contains('schem-pin')) return;
      if (e.target.closest && (e.target.closest('.schem-resize-handle') || e.target.closest('.schem-move-handle'))) return;
      if (e.button !== 0) return;
      // Shift+click rotates 90 degrees clockwise (skip perfboard).
      if (e.shiftKey && c.type !== 'perfboard') {
        e.preventDefault();
        e.stopPropagation();
        pushSchemHistory();
        c.rotation = ((c.rotation || 0) + 90) % 360;
        schemSave();
        renderPerfboard();
        return;
      }
      const pt = svgPoint(e);
      pushSchemHistory();
      _schemDrag = {
        id: c.id,
        startX: pt.x,
        startY: pt.y,
        originGx: c.x,
        originGy: c.y,
        moved: false
      };
      g.classList.add('is-dragging');
      e.preventDefault();
    });

    // Right-click delete.
    g.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (confirm(`Delete ${def.label}?`)) {
        deleteComponent(c.id);
      }
    });

    // Double-click LED to cycle color.
    if (def.hasColor) {
      g.addEventListener('dblclick', (e) => {
        e.preventDefault();
        pushSchemHistory();
        const order = ['red', 'yellow', 'green', 'blue', 'white'];
        const cur = c.ledColor || 'red';
        const next = order[(order.indexOf(cur) + 1) % order.length];
        c.ledColor = next;
        schemSave();
        renderPerfboard();
      });
    }

    layer.appendChild(g);
  }

  function _isPerfboardPin(pinId) {
    if (!pinId) return false;
    const compId = pinId.split(':')[0];
    const c = _schemState.components.find(x => x.id === compId);
    return !!(c && c.type === 'perfboard');
  }

  function drawWire(w) {
    const svgNS = 'http://www.w3.org/2000/svg';
    const layer = _schemSvg.querySelector('#schemLayerWires');
    const a = pinIdToCoords(w.fromPinId);
    const b = pinIdToCoords(w.toPinId);
    if (!a || !b) return;

    // Pad-to-pad connections render as silver "solder" traces. All other
    // wires use the chosen wire color and render as straight lines.
    const padToPad = _isPerfboardPin(w.fromPinId) && _isPerfboardPin(w.toPinId);
    const stroke = padToPad ? '#9aa3ad' : (SCHEM_COLORS[w.color] || SCHEM_COLORS.red);

    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('class', 'schem-wire');
    path.setAttribute('d', `M ${a.x} ${a.y} L ${b.x} ${b.y}`);
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', padToPad ? '2.4' : '3');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('fill', 'none');
    path.setAttribute('data-wire-id', w.id);
    if (!padToPad && w.color === 'white') {
      path.setAttribute('stroke', '#f8fafc');
      path.style.filter = 'drop-shadow(0 0 1px rgba(0,0,0,0.4))';
    }

    path.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      deleteWire(w.id);
    });
    path.addEventListener('dblclick', (e) => {
      e.preventDefault();
      e.stopPropagation();
      deleteWire(w.id);
    });
    path.addEventListener('click', (e) => {
      if (e.shiftKey) {
        deleteWire(w.id);
      }
    });

    layer.appendChild(path);

    // Solder blobs at each end.
    [a, b].forEach(pt => {
      const blob = document.createElementNS(svgNS, 'circle');
      blob.setAttribute('class', 'schem-solder');
      blob.setAttribute('cx', pt.x);
      blob.setAttribute('cy', pt.y);
      blob.setAttribute('r', SCHEM_SOLDER_RADIUS);
      blob.setAttribute('fill', '#94a3b8');
      blob.setAttribute('stroke', '#475569');
      blob.setAttribute('stroke-width', '0.8');
      layer.appendChild(blob);
    });
  }

  function pinIdToCoords(pinId) {
    const [compId, pinName] = pinId.split(':');
    const c = _schemState.components.find(x => x.id === compId);
    if (!c) return null;
    const def = SCHEM_COMPONENTS[c.type];
    if (!def) return null;

    let pin;
    if (c.type === 'perfboard') {
      const m = pinName && pinName.match(/^r(\d+)c(\d+)$/);
      if (!m) return null;
      const row = parseInt(m[1], 10);
      const col = parseInt(m[2], 10);
      const cols = _schemComponentW(c);
      const rows = _schemComponentH(c);
      if (row >= rows || col >= cols) return null;
      pin = { name: pinName, gx: col + 0.5, gy: row + 0.5 };
    } else {
      pin = def.pins.find(p => p.name === pinName);
    }
    if (!pin) return null;

    const rot = ((c.rotation || 0) % 360 + 360) % 360;
    const w = _schemComponentW(c);
    const h = _schemComponentH(c);
    const cxLocal = w * SCHEM_GRID_PITCH / 2;
    const cyLocal = h * SCHEM_GRID_PITCH / 2;
    const px = pin.gx * SCHEM_GRID_PITCH;
    const py = pin.gy * SCHEM_GRID_PITCH;
    let localX = px;
    let localY = py;
    if (rot) {
      const rad = rot * Math.PI / 180;
      const cosR = Math.cos(rad);
      const sinR = Math.sin(rad);
      const dx = px - cxLocal;
      const dy = py - cyLocal;
      localX = cxLocal + (dx * cosR - dy * sinR);
      localY = cyLocal + (dx * sinR + dy * cosR);
    }
    const x = (c.x + 0.5) * SCHEM_GRID_PITCH + localX;
    const y = (c.y + 0.5) * SCHEM_GRID_PITCH + localY;
    return { x, y };
  }

  function svgPoint(e) {
    const pt = _schemSvg.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;
    return pt.matrixTransform(_schemSvg.getScreenCTM().inverse());
  }

  function _schemOnDragMove(e) {
    if (_schemResize) {
      const pt = svgPoint(e);
      const dx = (pt.x - _schemResize.startX) / SCHEM_GRID_PITCH;
      const dy = (pt.y - _schemResize.startY) / SCHEM_GRID_PITCH;
      const c = _schemState.components.find(x => x.id === _schemResize.id);
      if (!c) return;
      const newCols = Math.max(4, Math.round(_schemResize.startCols + dx));
      const newRows = Math.max(4, Math.round(_schemResize.startRows + dy));
      if (newCols !== (c.cols || 14) || newRows !== (c.rows || 10)) {
        c.cols = newCols;
        c.rows = newRows;
        renderPerfboard();
      }
      return;
    }
    if (!_schemDrag) return;
    const pt = svgPoint(e);
    const dx = (pt.x - _schemDrag.startX) / SCHEM_GRID_PITCH;
    const dy = (pt.y - _schemDrag.startY) / SCHEM_GRID_PITCH;
    const c = _schemState.components.find(x => x.id === _schemDrag.id);
    if (!c) return;
    const cw = _schemComponentW(c);
    const ch = _schemComponentH(c);
    let nx = Math.round(_schemDrag.originGx + dx);
    let ny = Math.round(_schemDrag.originGy + dy);
    nx = Math.max(0, Math.min(_schemState.gridCols - cw, nx));
    ny = Math.max(0, Math.min(_schemState.gridRows - ch, ny));
    if (nx !== c.x || ny !== c.y) {
      c.x = nx;
      c.y = ny;
      // Re-render only this component's transform + redraw wires that touch it.
      const node = _schemSvg.querySelector(`[data-component-id="${c.id}"]`);
      if (node) {
        node.setAttribute('transform', `translate(${(c.x + 0.5) * SCHEM_GRID_PITCH}, ${(c.y + 0.5) * SCHEM_GRID_PITCH})`);
      }
      redrawWires();
    }
  }

  function _schemOnDragEnd() {
    if (_schemResize) {
      _schemState.wires = _schemState.wires.filter(w =>
        pinIdToCoords(w.fromPinId) && pinIdToCoords(w.toPinId)
      );
      _schemResize = null;
      schemSave();
      renderPerfboard();
      return;
    }
    if (!_schemDrag) return;
    const node = _schemSvg.querySelector(`[data-component-id="${_schemDrag.id}"]`);
    if (node) node.classList.remove('is-dragging');
    const draggedId = _schemDrag.id;
    _schemDrag = null;
    schemSave();
    // Only re-render the whole canvas if auto-fit would change its size.
    // Otherwise we keep the existing nodes in place — no flash, no flicker.
    const oldCols = _schemState.gridCols;
    const oldRows = _schemState.gridRows;
    autoFitCanvas();
    if (_schemState.gridCols !== oldCols || _schemState.gridRows !== oldRows) {
      renderPerfboard();
    }
  }

  function redrawWires() {
    const layer = _schemSvg.querySelector('#schemLayerWires');
    if (!layer) return;
    layer.innerHTML = '';
    _schemState.wires.forEach(w => drawWire(w));
  }

  function placeComponent(type) {
    const def = SCHEM_COMPONENTS[type];
    if (!def) return;
    pushSchemHistory();
    // Drop in middle of canvas, offset slightly per existing count to avoid overlap.
    const count = _schemState.components.filter(c => c.type === type).length;
    const baseX = Math.max(0, Math.floor(_schemState.gridCols / 2 - def.w / 2));
    const baseY = Math.max(0, Math.floor(_schemState.gridRows / 2 - def.h / 2));
    const x = Math.min(_schemState.gridCols - def.w, baseX + (count % 4));
    const y = Math.min(_schemState.gridRows - def.h, baseY + Math.floor(count / 4));
    const id = schemNewId(type);
    const c = { id, type, x, y };
    if (def.hasColor) c.ledColor = 'red';
    if (type === 'perfboard') {
      c.cols = 14;
      c.rows = 10;
    }
    _schemState.components.push(c);
    schemSave();
    renderPerfboard();

    // LED reminder: offer 220 ohm resistor on first LED placement per session.
    if (type === 'led' && !_schemState.resistorReminderShown) {
      _schemState.resistorReminderShown = true;
      schemSave();
      schemToast('LEDs need a 220 ohm resistor in series. Add one from the palette.', 3600);
    }
  }

  function handlePinClick(pinId) {
    if (!_schemPendingPin) {
      _schemPendingPin = pinId;
      highlightPendingPin(pinId);
      return;
    }
    if (_schemPendingPin === pinId) {
      // Click same pin again to cancel.
      _schemPendingPin = null;
      highlightPendingPin(null);
      return;
    }
    completeWire(_schemPendingPin, pinId);
    _schemPendingPin = null;
    highlightPendingPin(null);
  }

  function highlightPendingPin(pinId) {
    _schemSvg.querySelectorAll('.schem-pin.is-pending').forEach(el => el.classList.remove('is-pending'));
    if (pinId) {
      const el = _schemSvg.querySelector(`[data-pin="${pinId}"]`);
      if (el) el.classList.add('is-pending');
    }
  }

  function completeWire(fromPinId, toPinId) {
    pushSchemHistory();
    const id = schemNewId('wire');
    const w = { id, fromPinId, toPinId, color: _schemState.selectedColor };
    _schemState.wires.push(w);
    schemSave();
    drawWire(w);
  }

  function deleteComponent(id) {
    pushSchemHistory();
    _schemState.components = _schemState.components.filter(c => c.id !== id);
    // Drop any wires touching this component.
    _schemState.wires = _schemState.wires.filter(w => {
      return !w.fromPinId.startsWith(id + ':') && !w.toPinId.startsWith(id + ':');
    });
    schemSave();
    renderPerfboard();
  }

  function deleteWire(id) {
    pushSchemHistory();
    _schemState.wires = _schemState.wires.filter(w => w.id !== id);
    schemSave();
    redrawWires();
  }

  function clearCanvas() {
    pushSchemHistory();
    _schemState.components = [];
    _schemState.wires = [];
    schemSave();
    renderPerfboard();
    schemToast('Canvas cleared.');
  }

  function exportPNG() {
    if (!_schemSvg) return;
    try {
      const serializer = new XMLSerializer();
      // Clone so we can strip interactive cursor classes.
      const clone = _schemSvg.cloneNode(true);
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      const svgStr = serializer.serializeToString(clone);
      const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const w = _schemSvg.viewBox.baseVal.width || _schemSvg.clientWidth;
        const h = _schemSvg.viewBox.baseVal.height || _schemSvg.clientHeight;
        const scale = 2;
        const canvas = document.createElement('canvas');
        canvas.width = w * scale;
        canvas.height = h * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob((pngBlob) => {
          if (!pngBlob) {
            schemToast('Could not generate image. Try again.');
            return;
          }
          const a = document.createElement('a');
          a.href = URL.createObjectURL(pngBlob);
          const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
          a.download = `wiring-schematic-${stamp}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(a.href), 1000);
          schemToast('Image saved.');
        }, 'image/png');
      };
      img.onerror = (err) => {
        console.error('image load error', err);
        schemToast('Could not generate image. Try again.');
      };
      img.src = url;
    } catch (err) {
      console.error('export PNG failed', err);
      schemToast('Could not generate image. Try again.');
    }
  }

  // ============== PROGRESS page ==============
  // Live grid of student × benchmark completion. Subscribes to the portfolios
  // collection once; the existence of any portfolio doc with (studentName,
  // benchmarkId) marks that cell as "done" and renders a clickable green check
  // that opens the benchmark modal and auto-expands that student's row.
  let _progressUnsubscribe = null;
  let _progressData = {}; // { studentName: Set(benchmarkId) }

  const PROG_CHECK_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>`;

  function findBenchmarkById(id) {
    for (const p of PROJECTS) {
      for (const b of p.benchmarks) {
        if (b.id === id) return b;
      }
    }
    return null;
  }

  function shortBenchLabel(b, idx) {
    if (b.id === 'instructable') return 'I';
    return String(idx + 1);
  }

  function shortProjectLabel(p) {
    // Keep the leading namespace ("Project 1", "Final"), drop the descriptive subtitle.
    const m = p.title.match(/^([^:]+):/);
    return m ? m[1].trim() : p.title;
  }

  function renderProgress() {
    app.innerHTML = '';
    const wrap = document.createElement('section');
    wrap.className = 'progress-section';
    wrap.innerHTML = `
      <h2 class="project-title">Progress</h2>
      <div id="progressTable" class="progress-board"></div>
    `;
    app.appendChild(wrap);
    subscribeProgress();
  }

  function subscribeProgress() {
    if (_progressUnsubscribe) _progressUnsubscribe();
    _progressUnsubscribe = onSnapshot(collection(db, 'portfolios'), (snap) => {
      _progressData = {};
      snap.forEach(d => {
        const data = d.data();
        const name = (data.studentName || '').trim();
        if (!name || !data.benchmarkId) return;
        if (!_progressData[name]) _progressData[name] = new Set();
        _progressData[name].add(data.benchmarkId);
      });
      renderProgressTable();
    }, (err) => {
      console.error('progress subscribe error', err);
      const tbl = document.getElementById('progressTable');
      if (tbl) tbl.innerHTML = `<tbody><tr><td class="prog-empty">Could not load progress.</td></tr></tbody>`;
    });
  }

  function renderProgressTable() {
    const tbl = document.getElementById('progressTable');
    if (!tbl) return;

    // Viewer's localStorage name — they always see their own card first, even
    // if they haven't submitted anything yet. Lets every student walk up to
    // Progress and see their full track ready to fill.
    const myName = (localStorage.getItem(NAME_KEY) || '').trim();
    const merged = { ..._progressData };

    const allNames = new Set(Object.keys(merged));
    if (myName) allNames.add(myName);

    if (!allNames.size) {
      tbl.innerHTML = `
        <div class="prog-cards-empty">
          <p class="prog-cards-empty-line">Track your progress through the course.</p>
          <p class="prog-cards-empty-sub">Drop your first submission anywhere — your card will pin to the top of this page.</p>
        </div>
      `;
      return;
    }

    const studentNames = Array.from(allNames).sort((a, b) => {
      if (myName) {
        if (a.toLowerCase() === myName.toLowerCase()) return -1;
        if (b.toLowerCase() === myName.toLowerCase()) return 1;
      }
      return a.localeCompare(b, undefined, { sensitivity: 'base' });
    });

    const totalBench = PROJECTS.reduce((s, p) => s + p.benchmarks.length, 0);

    let html = '<div class="prog-cards">';
    studentNames.forEach(name => {
      const done = merged[name] || new Set();
      let ownDone = 0;
      PROJECTS.forEach(p => p.benchmarks.forEach(b => { if (done.has(b.id)) ownDone++; }));
      const isMe = myName && name.toLowerCase() === myName.toLowerCase();

      html += `<article class="prog-card${isMe ? ' is-you' : ''}">
        <header class="prog-card-head">
          <h3 class="prog-card-name">${escapeHtml(name)}${isMe ? '<span class="prog-card-you">you</span>' : ''}</h3>
        </header>
        <ul class="prog-card-rows">`;

      PROJECTS.forEach(p => {
        const prefix = shortProjectLabel(p);
        const subtitle = p.title.replace(/^[^:]+:\s*/, '');
        const rowFinalCls = p.id === 'final' ? ' is-final' : '';
        html += `<li class="prog-card-row${rowFinalCls}">
          <div class="prog-card-row-label">
            <span class="prog-card-row-prefix">${escapeHtml(prefix)}</span>
            <span class="prog-card-row-title">${escapeHtml(subtitle)}</span>
          </div>
          <div class="prog-card-row-dots">`;
        p.benchmarks.forEach((b, idx) => {
          const num = b.id === 'instructable' ? '' : (idx + 1);
          if (done.has(b.id)) {
            html += `<a class="prog-pip is-done" data-bench="${escapeHtml(b.id)}" data-student="${escapeHtml(name)}" title="View ${escapeHtml(name)}'s ${escapeHtml(b.title)}">${PROG_CHECK_SVG}</a>`;
          } else {
            html += `<span class="prog-pip" title="${escapeHtml(b.title)}">${num}</span>`;
          }
        });
        html += `</div></li>`;
      });

      html += `</ul></article>`;
    });
    html += '</div>';

    tbl.innerHTML = html;

    tbl.querySelectorAll('.prog-pip.is-done[data-bench]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const benchObj = findBenchmarkById(a.dataset.bench);
        if (benchObj) openModal(benchObj, { focusStudent: a.dataset.student });
      });
    });
  }

  function toggleChecked(id, row, cb) {
    if (checked.has(id)) {
      checked.delete(id);
      row.classList.remove('done');
      cb.classList.remove('checked');
      cb.setAttribute('aria-checked', 'false');
    } else {
      checked.add(id);
      row.classList.add('done');
      cb.classList.add('checked');
      cb.setAttribute('aria-checked', 'true');
    }
    persist();
  }

  // Auto-check a benchmark after a successful submission. Idempotent —
  // re-submitting won't toggle it back off.
  function markChecked(id) {
    if (checked.has(id)) return;
    checked.add(id);
    const cb = document.querySelector(`[data-checkbox="${id}"]`);
    const row = cb ? cb.closest('.benchmark') : null;
    if (cb) {
      cb.classList.add('checked');
      cb.setAttribute('aria-checked', 'true');
    }
    if (row) row.classList.add('done');
    persist();
  }

  // ============== MODAL ==============

  const modalPoints = document.getElementById('modalPoints');

      modalBody.appendChild(sec);

        </div>

    // Links
    if (b.links && b.links.length) {

            <div class="rubric-row">

              <div class="rubric-points">${r.points} pts</div>

    // Submission panel — instructable (link-only), Portfolio Drop (multi-slot), or checkpoint (photo + reflection)
    const isPortfolioDrop = b.title === 'Portfolio Drop';

      : 'Submit evidence + reflection';

      <h3>${badge()}${submitHeading}</h3>
      <div id="portfolioPanelMount"></div>
    `;
    modalBody.appendChild(portfolioSec);
    const panelMount = portfolioSec.querySelector('#portfolioPanelMount');
    panelMount.appendChild(
      isInstructable ? buildInstructablePanel(b.id)
      : isPortfolioDrop ? buildPortfolioPanel(b.id)
      : buildCheckpointPanel(b.id)

    // Gallery — students by name with expandable rows
    const gallerySec = document.createElement('div');
    gallerySec.className = 'modal-section';
    gallerySec.innerHTML = `
      <h3>${isPortfolioDrop ? 'Class portfolios' : 'Class submissions'}</h3>
      <div class="pf-gallery" id="pfGallery"></div>

    modalBody.appendChild(gallerySec);
    subscribePortfolios(b.id);

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    currentBenchmark = null;
    _focusStudent = null;
    if (unsubscribeGallery) { unsubscribeGallery(); unsubscribeGallery = null; }
    if (unsubscribePortfolios) { unsubscribePortfolios(); unsubscribePortfolios = null; }
    // Cancel any pending debounced renders so they don't paint into a closed modal.
    if (_galleryRenderTimer) { clearTimeout(_galleryRenderTimer); _galleryRenderTimer = null; _galleryRenderArgs = null; }
    if (_pfGalleryRenderTimer) { clearTimeout(_pfGalleryRenderTimer); _pfGalleryRenderTimer = null; _pfGalleryRenderItems = null; }
    // Clear modal body refs so a re-open animates fresh.
    const pfGrid = document.getElementById('pfGallery');
    if (pfGrid) pfGrid._pfKnownIds = null;
    // Clear archive deep-link param so closing an archive doesn't keep it sticky.
    try {
      const sp = new URLSearchParams(location.search);
      if (sp.has('archive')) {
        sp.delete('archive');
        history.replaceState(null, '', sp.toString() ? `${location.pathname}?${sp.toString()}` : location.pathname);
      }
    } catch (_) {}
  }

  // ============== GALLERY ==============
  function subscribeGallery(benchmarkId, opts = {}) {
    if (unsubscribeGallery) unsubscribeGallery();
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    const q = query(
      collection(db, 'artifacts'),
      where('benchmarkId', '==', benchmarkId)
    );
    unsubscribeGallery = onSnapshot(q, (snap) => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      // newest first
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      // Update the count badge from the live snapshot for free (no extra read).
      updateCountBadge(benchmarkId, items.length);
      debouncedRenderGallery(grid, benchmarkId, items, opts);
    }, (err) => {
      console.error('gallery subscribe error', err);
      grid.innerHTML = `<div class="gallery-empty">Could not load gallery.</div>`;
    });
  }

  // Debounce gallery re-renders. When 30 students submit in 5 seconds the
  // snapshot fires 30 times; we want to coalesce to ~1 paint per ~200ms.
  let _galleryRenderTimer = null;
  let _galleryRenderArgs = null;
  function debouncedRenderGallery(...args) {
    _galleryRenderArgs = args;
    if (_galleryRenderTimer) return;
    _galleryRenderTimer = setTimeout(() => {
      _galleryRenderTimer = null;
      const a = _galleryRenderArgs;
      _galleryRenderArgs = null;
      if (a) renderGallery.apply(null, a);
    }, 200);
  }

  function renderGallery(grid, benchmarkId, items, opts = {}) {
    grid.innerHTML = '';
    items.forEach(item => {
      const tile = document.createElement('div');
      const isLink = item.type === 'link';
      const isVideo = (item.contentType || '').startsWith('video/');
      tile.className = 'gallery-tile' + (isLink ? ' link-tile' : '');

      let media;
      if (isLink) {
        media = item.linkImage
          ? `<img src="${item.linkImage}" alt="${escapeHtml(item.linkTitle || item.linkUrl)}" loading="lazy" decoding="async" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'link-fallback',innerHTML:'<div class=\\'link-icon\\'>🔗</div><div class=\\'link-domain\\'>${escapeHtml(item.linkDomain || '')}</div>'}));" />`
          : `<div class="link-fallback"><div class="link-icon">🔗</div><div class="link-domain">${escapeHtml(item.linkDomain || 'link')}</div></div>`;
      } else if (isVideo) {
        media = `<video src="${item.fileUrl}" muted preload="metadata"></video><div class="play-icon">▶</div>`;
      } else {
        media = `<img src="${item.fileUrl}" alt="${escapeHtml(item.studentName || '')}" loading="lazy" decoding="async" onerror="this.parentElement.innerHTML='<div class=&quot;pf-broken&quot;><span class=&quot;pf-broken-icon&quot;>⚠</span><span>(file unavailable)</span></div>';" />`;
      }

      tile.innerHTML = `
        ${media}
        ${isLink ? `<span class="link-chip">Link</span>` : ''}
        <div class="tile-caption">
          <span class="tile-name">${escapeHtml(item.studentName || 'Unnamed')}</span>
          <span class="tile-desc">${escapeHtml(item.description || '')}</span>
        </div>
        <button class="tile-delete" aria-label="Delete">×</button>
      `;
      tile.addEventListener('click', (e) => {
        if (e.target.closest('.tile-delete')) return;
        if (isLink) {
          window.open(item.linkUrl, '_blank', 'noopener');
        } else {
          openLightbox(item);
        }
      });
      tile.querySelector('.tile-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`Delete "${item.studentName}" submission?`)) return;
        await deleteArtifact(item);
      });
      grid.appendChild(tile);
    });
    // Add tile (always last)
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.innerHTML = `<div class="plus">+</div><div>${opts.linkOnly ? 'Submit link' : 'Add your work'}</div>`;
    addTile.addEventListener('click', () => {
      const form = buildUploadForm(benchmarkId, () => {
        // re-render handled by snapshot
      }, () => {
        renderGallery(grid, benchmarkId, items, opts);
      }, opts);
      grid.replaceChild(form, addTile);
    });
    grid.appendChild(addTile);
  }

  function buildUploadForm(benchmarkId, onSuccess, onCancel, opts = {}) {
    const linkOnly = !!opts.linkOnly;
    const descPlaceholder = opts.descriptionPlaceholder || 'What is this and what should we look at?';
    const form = document.createElement('div');
    form.className = 'upload-form';
    const savedName = localStorage.getItem(NAME_KEY) || '';
    const UPLOAD_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0l-5 5m5-5l5 5M4 20h16"/></svg>';
    const LINK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.5-1.5"/></svg>';

    const fileBlock = linkOnly ? '' : `
      <div class="attach-empty" data-attach-empty>
        <div class="attach-icon">${UPLOAD_ICON}</div>
        <div class="attach-text">Drop a file or click to upload</div>
        <div class="attach-sub">Image or video, up to 50MB</div>
        <button type="button" class="attach-link-toggle" data-link-toggle>${LINK_ICON} Or paste a link</button>
      </div>
      <input type="file" data-file accept="image/*,video/*" />
    `;

    form.innerHTML = `
      <label>Your name<input type="text" data-name maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" /></label>
      <label>Brief description<textarea data-desc rows="2" maxlength="500" placeholder="${escapeHtml(descPlaceholder)}"></textarea></label>

      <div class="attach ${linkOnly ? 'is-link-entry' : ''}" data-attach>
        ${fileBlock}
        <div class="attach-link-entry">
          <input type="url" data-link-input placeholder="${linkOnly ? 'Paste your link' : 'Paste a URL'}" />
          ${linkOnly ? '' : '<button type="button" class="icon-btn" data-link-cancel aria-label="Cancel">×</button>'}
        </div>
        <div class="attach-preview" data-preview></div>
      </div>

      <div class="upload-status" data-status></div>
      <div class="actions">
        <button class="btn-cancel" data-cancel type="button">Cancel</button>
        <button class="btn-submit" data-submit type="button">Submit</button>
      </div>
    `;

    const nameInput = form.querySelector('[data-name]');
    const descInput = form.querySelector('[data-desc]');
    const statusEl = form.querySelector('[data-status]');
    const submitBtn = form.querySelector('[data-submit]');
    const attach = form.querySelector('[data-attach]');
    const attachEmpty = form.querySelector('[data-attach-empty]');
    const fileInput = form.querySelector('[data-file]');
    const linkToggle = form.querySelector('[data-link-toggle]');
    const linkInput = form.querySelector('[data-link-input]');
    const linkCancel = form.querySelector('[data-link-cancel]');
    const previewEl = form.querySelector('[data-preview]');

    // Attachment state
    let attachedFile = null;
    let attachedLink = null; // { url, preview }

    function setErr(msg) {
      statusEl.classList.add('error');
      statusEl.textContent = msg;
    }
    function clearStatus() {
      statusEl.classList.remove('error');
      statusEl.textContent = '';
    }

    function clearAttachment() {
      attachedFile = null;
      attachedLink = null;
      attach.classList.remove('has-content', 'is-link-entry');
      previewEl.innerHTML = '';
      fileInput.value = '';
      linkInput.value = '';
      clearStatus();
    }

    function attachFile(file) {
      if (!file.type.match(/^(image|video)\//)) { setErr('File must be an image or video.'); return; }
      if (file.size > 50 * 1024 * 1024) { setErr('File too large (50MB max).'); return; }
      attachedFile = file;
      attachedLink = null;
      const isVideo = file.type.startsWith('video/');
      const sizeKb = file.size / 1024;
      const sizeStr = sizeKb < 1024 ? `${Math.round(sizeKb)} KB` : `${(sizeKb / 1024).toFixed(1)} MB`;
      const objectUrl = URL.createObjectURL(file);
      previewEl.innerHTML = `
        <div class="preview-thumb">${isVideo ? `<video src="${objectUrl}" muted></video>` : `<img src="${objectUrl}" alt="preview" />`}</div>
        <div class="preview-info">
          <div class="preview-title">${escapeHtml(file.name)}</div>
          <div class="preview-meta">${sizeStr} · ${isVideo ? 'Video' : 'Image'}</div>
        </div>
        <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
      `;
      attach.classList.add('has-content');
      attach.classList.remove('is-link-entry');
      previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      clearStatus();
    }

    async function attachLink(url) {
      if (!/^https?:\/\//i.test(url)) { setErr('Link must start with http:// or https://'); return; }
      attachedFile = null;
      attachedLink = { url, preview: null };
      attach.classList.add('has-content');
      attach.classList.remove('is-link-entry');
      // loading state
      previewEl.innerHTML = `
        <div class="preview-thumb">${LINK_ICON_BIG}</div>
        <div class="preview-info">
          <div class="preview-title">${escapeHtml(url)}</div>
          <div class="preview-meta preview-loading">Pulling preview…</div>
        </div>
        <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
      `;
      previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      clearStatus();
      try {
        const preview = await fetchLinkPreview(url);
        if (attachedLink?.url !== url) return; // user changed it
        attachedLink.preview = preview;
        const thumb = preview.image
          ? `<img src="${preview.image}" alt="preview" onerror="this.parentElement.innerHTML='${LINK_ICON_BIG.replace(/'/g, "\\'")}';" />`
          : LINK_ICON_BIG;
        previewEl.innerHTML = `
          <div class="preview-thumb">${thumb}</div>
          <div class="preview-info">
            <div class="preview-title">${escapeHtml(preview.title || preview.domain || url)}</div>
            <div class="preview-meta">${escapeHtml(preview.domain || url)}</div>
          </div>
          <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
        `;
        previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      } catch (err) {
        // keep the basic preview but mark as failed
        const meta = previewEl.querySelector('.preview-meta');
        if (meta) meta.textContent = 'Could not pull preview · still submittable';
      }
    }

    const LINK_ICON_BIG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.5-1.5"/></svg>';

    if (!linkOnly) {
      // Click empty zone → file picker
      attachEmpty.addEventListener('click', (e) => {
        if (e.target.closest('[data-link-toggle]')) return;
        fileInput.click();
      });
      fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) attachFile(fileInput.files[0]);
      });

      // Drag & drop on the attach zone (file or URL)
      ['dragenter', 'dragover'].forEach(ev => attach.addEventListener(ev, (e) => {
        e.preventDefault();
        attach.classList.add('is-dragover');
      }));
      ['dragleave', 'drop'].forEach(ev => attach.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== attach) return;
        attach.classList.remove('is-dragover');
      }));
      attach.addEventListener('drop', (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files && files.length) { attachFile(files[0]); return; }
        const url = (e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '').trim();
        if (url) attachLink(url);
      });

      // Link toggle: reveal URL entry
      linkToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        attach.classList.add('is-link-entry');
        setTimeout(() => linkInput.focus(), 50);
      });
      linkCancel.addEventListener('click', () => {
        attach.classList.remove('is-link-entry');
        linkInput.value = '';
      });
    } else {
      // linkOnly: drop URL anywhere on the attach zone is still useful
      ['dragenter', 'dragover'].forEach(ev => attach.addEventListener(ev, (e) => {
        e.preventDefault();
        attach.classList.add('is-dragover');
      }));
      ['dragleave', 'drop'].forEach(ev => attach.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== attach) return;
        attach.classList.remove('is-dragover');
      }));
      attach.addEventListener('drop', (e) => {
        e.preventDefault();
        const url = (e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '').trim();
        if (url) attachLink(url);
      });
      // Auto-focus the link input when form opens
      setTimeout(() => linkInput.focus(), 50);
    }
    linkInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const v = linkInput.value.trim();
        if (v) attachLink(v);
      } else if (e.key === 'Escape') {
        linkCancel.click();
      }
    });
    // Paste a URL into the link input → auto-attach
    linkInput.addEventListener('paste', (e) => {
      const t = (e.clipboardData?.getData('text/plain') || '').trim();
      if (/^https?:\/\//i.test(t)) {
        e.preventDefault();
        linkInput.value = t;
        attachLink(t);
      }
    });
    // Paste a URL anywhere else on the form (not in name/desc inputs) → auto-attach
    form.addEventListener('paste', (e) => {
      if (e.target === nameInput || e.target === descInput || e.target === linkInput) return;
      const t = (e.clipboardData?.getData('text/plain') || '').trim();
      if (/^https?:\/\//i.test(t)) {
        e.preventDefault();
        attachLink(t);
      }
    });

    form.querySelector('[data-cancel]').addEventListener('click', onCancel);
    submitBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const desc = descInput.value.trim();
      if (!name) { setErr('Please enter your name.'); return; }
      if (!attachedFile && !attachedLink) { setErr(linkOnly ? 'Paste a link to your design.' : 'Drop a file or paste a link.'); return; }
      submitBtn.disabled = true;
      clearStatus();
      localStorage.setItem(NAME_KEY, name);
      try {
        if (attachedFile) {
          statusEl.textContent = 'Uploading…';
          await uploadArtifact({ benchmarkId, name, desc, file: attachedFile, onProgress: (pct) => {
            statusEl.textContent = `Uploading… ${pct}%`;
          }});
        } else {
          statusEl.textContent = 'Saving…';
          const preview = attachedLink.preview || await fetchLinkPreview(attachedLink.url);
          await addLinkArtifact({ benchmarkId, name, desc, link: attachedLink.url, preview });
        }
        statusEl.textContent = 'Done.';
        onSuccess();
      } catch (err) {
        console.error(err);
        setErr(err.message || 'Submit failed. Try again.');
        submitBtn.disabled = false;
      }
    });

    return form;
  }

  async function fetchLinkPreview(url) {
    try {
      const r = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error('preview');
      return await r.json();
    } catch (err) {
      // Graceful degradation — submit the link with no preview metadata
      let domain = '';
      try { domain = new URL(url).hostname.replace(/^www\./, ''); } catch (_) {}
      return { url, title: '', description: '', image: '', domain };
    }
  }

  async function addLinkArtifact({ benchmarkId, name, desc, link, preview }) {
    await addDoc(collection(db, 'artifacts'), {
      benchmarkId,
      studentName: name,
      description: desc,
      type: 'link',
      linkUrl: link,
      linkTitle: preview?.title || '',
      linkDescription: preview?.description || '',
      linkImage: preview?.image || '',
      linkDomain: preview?.domain || '',
      createdAt: serverTimestamp()
    });
  }

  function uploadArtifact({ benchmarkId, name, desc, file, onProgress }) {
    return new Promise((resolve, reject) => {
      const ext = (file.name.match(/\.[a-z0-9]+$/i) || [''])[0];
      const path = `artifacts/${benchmarkId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}${ext}`;
      const ref = storageRef(storage, path);
      const task = uploadBytesResumable(ref, file, { contentType: file.type });
      task.on('state_changed',
        (snap) => onProgress?.(Math.round(snap.bytesTransferred / snap.totalBytes * 100)),
        reject,
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            await addDoc(collection(db, 'artifacts'), {
              benchmarkId,
              studentName: name,
              description: desc,
              fileUrl: url,
              filePath: path,
              contentType: file.type,
              createdAt: serverTimestamp()
            });
            resolve();
          } catch (e) { reject(e); }
        }
      );
    });
  }

  async function deleteArtifact(item) {
    try {
      if (item.filePath) {
        try { await deleteObject(storageRef(storage, item.filePath)); } catch (e) { /* file may already be gone */ }
      }
      await deleteDoc(doc(db, 'artifacts', item.id));
      // Open-snapshot listener will update the count for this benchmark live;
      // belt-and-braces refresh the badge in case nothing else closes the loop.
      if (item.benchmarkId) refreshCountBadge(item.benchmarkId);
    } catch (err) {
      console.error('delete failed', err);
      alert('Could not delete. Try again.');
    }
  }

  // ============== PORTFOLIO SYSTEM ==============
  const SLOT_DEFS = [
    { key: 'image',   label: 'Image',   icon: ICON_IMAGE,   accept: 'image/jpeg,image/png',                                          exts: 'JPG, PNG',  fileTypes: 'image', allowFile: true,  allowLink: false },
    { key: 'video',   label: 'Video',   icon: ICON_VIDEO,   accept: 'video/mp4',                                                     exts: 'MP4',       fileTypes: 'video', allowFile: true,  allowLink: true  },
    { key: 'cad',     label: 'CAD',     icon: ICON_CAD,     accept: '.stl,model/stl,application/sla,application/vnd.ms-pki.stl',    exts: 'STL',       fileTypes: 'cad',   allowFile: true,  allowLink: false },
    { key: 'code',    label: 'Code',    icon: ICON_CODE,    accept: '',                                                              exts: 'Link only', fileTypes: 'link', allowFile: false, allowLink: true  },
    { key: 'summary', label: 'Summary', icon: ICON_SUMMARY, accept: '',                                                              exts: 'Text only', fileTypes: 'text', allowFile: false, allowLink: false }
  ];
  const SUMMARY_MAX = 1500;
  const PORTFOLIO_MAX_FILE = 100 * 1024 * 1024; // 100MB

  function isStlFile(file) {
    if (!file) return false;
    if (/\.stl$/i.test(file.name || '')) return true;
    const ct = (file.type || '').toLowerCase();
    return ct === 'model/stl' || ct === 'application/sla' || ct === 'application/vnd.ms-pki.stl';
  }

  function isAcceptedForSlot(slotKey, file) {
    if (!file) return false;
    if (file.size > PORTFOLIO_MAX_FILE) return false;
    const ct = (file.type || '').toLowerCase();
    if (slotKey === 'image') {
      return ct === 'image/jpeg' || ct === 'image/png';
    }
    if (slotKey === 'video') {
      return ct === 'video/mp4';
    }
    if (slotKey === 'cad') {
      return isStlFile(file);
    }
    return false; // code is link-only, summary is text-only
  }

  function shortBytes(n) {
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${Math.round(n / 1024)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch (_) { return ''; }
  }

  function thumbnailFor(slotData) {
    if (!slotData) return '';
    if (slotData.mode === 'text') return ICON_SUMMARY;
    if (slotData.mode === 'link') return ICON_LINK;
    const ct = (slotData.contentType || '').toLowerCase();
    if (ct.startsWith('image/')) return `<img src="${slotData.url}" alt="" loading="lazy" />`;
    if (ct.startsWith('video/')) return `<video src="${slotData.url}" muted preload="metadata"></video>`;
    return ICON_DOC;
  }

  function buildPortfolioPanel(benchmarkId) {
    const panel = document.createElement('div');
    panel.className = 'portfolio-panel';

    const savedName = localStorage.getItem(NAME_KEY) || '';
    panel.innerHTML = `
      <div class="pf-name-row">
        <label for="pfNameInput">Your name</label>
        <input id="pfNameInput" type="text" maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" />
      </div>
      <div class="pf-slots" data-pf-slots></div>
      <div class="pf-actions">
        <div class="pf-status" data-pf-status></div>
        <button class="pf-submit" data-pf-submit type="button" disabled>Submit Portfolio</button>
      </div>
    `;

    const nameInput = panel.querySelector('#pfNameInput');
    const slotsEl = panel.querySelector('[data-pf-slots]');
    const submitBtn = panel.querySelector('[data-pf-submit]');
    const statusEl = panel.querySelector('[data-pf-status]');

    // In-memory slot state: { image: {...}, video: {...}, ... } or null
    const state = { image: null, video: null, code: null, cad: null, summary: null };
    // Pending file objects, before submit (so we can upload at submit time)
    const pendingFiles = {}; // { slotKey: File }
    let openSlotKey = null;

    SLOT_DEFS.forEach(def => {
      const slot = document.createElement('div');
      slot.className = 'pf-slot';
      slot.dataset.slot = def.key;
      slot.innerHTML = `
        <div class="pf-slot-tile" data-pf-tile>
          <div class="pf-slot-icon">${def.icon}</div>
          <div class="pf-slot-label">${def.label}</div>
          <div class="pf-slot-status">+ Add</div>
          <div class="pf-slot-mini-actions">
            <button type="button" data-pf-mini-edit aria-label="Edit">✎</button>
            <button type="button" data-pf-mini-remove aria-label="Remove">×</button>
          </div>
        </div>
        <div class="pf-slot-body">
          <div class="pf-slot-head">
            <div class="pf-slot-head-title">
              <span class="pf-slot-icon">${def.icon}</span>
              ${def.label}
            </div>
            <button type="button" class="pf-slot-collapse" data-pf-collapse aria-label="Collapse">×</button>
          </div>
          <div class="pf-slot-body-inner" data-pf-body-inner></div>
        </div>
      `;
      slotsEl.appendChild(slot);

      const tile = slot.querySelector('[data-pf-tile]');
      const collapseBtn = slot.querySelector('[data-pf-collapse]');
      const bodyInner = slot.querySelector('[data-pf-body-inner]');

      tile.addEventListener('click', (e) => {
        if (e.target.closest('[data-pf-mini-remove]')) {
          e.stopPropagation();
          clearSlot(def.key);
          return;
        }
        if (e.target.closest('[data-pf-mini-edit]')) {
          e.stopPropagation();
        }
        openSlot(def.key);
      });
      // Keyboard support: Enter / Space on tile opens slot
      tile.setAttribute('tabindex', '0');
      tile.setAttribute('role', 'button');
      tile.setAttribute('aria-label', `${def.label} slot`);
      tile.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          if (e.target.closest('[data-pf-mini-remove], [data-pf-mini-edit]')) return;
          e.preventDefault();
          openSlot(def.key);
        }
      });
      // Drag-over feedback on the slot tile itself (when collapsed) — only
      // for slots that actually accept files.
      if (def.allowFile) {
        ['dragenter', 'dragover'].forEach(ev => slot.addEventListener(ev, (e) => {
          if (slot.classList.contains('is-open')) return;
          if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
          e.preventDefault();
          slot.classList.add('is-tile-dragover');
        }));
        ['dragleave', 'drop'].forEach(ev => slot.addEventListener(ev, (e) => {
          if (ev === 'dragleave' && slot.contains(e.relatedTarget)) return;
          slot.classList.remove('is-tile-dragover');
        }));
        slot.addEventListener('drop', (e) => {
          if (slot.classList.contains('is-open')) return;
          const files = e.dataTransfer?.files;
          if (!files || !files.length) return;
          e.preventDefault();
          openSlot(def.key);
          handleFileForSlot(def, files[0]);
        });
      }
      collapseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeOpenSlot();
      });

      function renderBody() {
        if (def.fileTypes === 'text') {
          const existingText = state.summary?.text || '';
          bodyInner.innerHTML = `
            <textarea class="pf-summary-box" data-pf-text rows="6" maxlength="${SUMMARY_MAX}" placeholder="4–5 sentences reflecting on your prototyping process: what you created, problems you encountered, how you overcame them, and new things you learned.">${escapeHtml(existingText)}</textarea>
            <div class="pf-char-count" data-pf-char>${existingText.length} / ${SUMMARY_MAX}</div>
          `;
          const txt = bodyInner.querySelector('[data-pf-text]');
          const counter = bodyInner.querySelector('[data-pf-char]');
          const updateCount = () => {
            const len = txt.value.length;
            counter.textContent = `${len} / ${SUMMARY_MAX}`;
            counter.classList.toggle('is-warn', len > SUMMARY_MAX * 0.85 && len <= SUMMARY_MAX);
            counter.classList.toggle('is-over', len > SUMMARY_MAX);
          };
          txt.addEventListener('input', () => {
            updateCount();
            const v = txt.value.trim();
            state.summary = v ? { mode: 'text', text: v.slice(0, SUMMARY_MAX) } : null;
            refreshTile(def.key);
            refreshSubmit();
          });
          updateCount();
          setTimeout(() => txt.focus(), 50);
          return;
        }

        // File slot UI
        const filled = state[def.key];
        let previewHtml = '';
        if (filled) {
          let thumb = '';
          if (filled.mode === 'link') {
            thumb = ICON_LINK;
          } else if ((filled.contentType || '').startsWith('image/')) {
            thumb = `<img src="${filled.url}" alt="" />`;
          } else if ((filled.contentType || '').startsWith('video/')) {
            thumb = `<video src="${filled.url}" muted></video>`;
          } else {
            thumb = ICON_DOC;
          }
          const title = filled.mode === 'link'
            ? (filled.url || 'Link')
            : (filled.fileName || 'File');
          const meta = filled.mode === 'link'
            ? (getDomain(filled.url) || 'External link')
            : (filled.contentType || '');
          previewHtml = `
            <div class="pf-filled-preview">
              <div class="pf-fp-thumb">${thumb}</div>
              <div class="pf-fp-info">
                <div class="pf-fp-title">${escapeHtml(title)}</div>
                <div class="pf-fp-meta">${escapeHtml(meta)}</div>
              </div>
              <button type="button" class="pf-fp-remove" data-pf-clear aria-label="Remove">×</button>
            </div>
          `;
        }

        const dropHtml = def.allowFile ? `
          <div class="pf-drop" data-pf-drop>
            <div class="pf-drop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0l-5 5m5-5l5 5M4 20h16"/></svg></div>
            <div class="pf-drop-text">Drop a file or click to upload</div>
            <div class="pf-drop-sub">${def.exts} · up to 100MB</div>
            <input type="file" data-pf-file accept="${def.accept}" style="display:none;" />
          </div>
        ` : '';
        const linkHtml = def.allowLink ? `
          <div class="pf-link-row">
            <span class="pf-link-label">${def.allowFile ? 'Or link' : 'Public URL'}</span>
            <span class="pf-link-input-wrap">
              <input type="url" data-pf-link placeholder="https://…" value="${filled?.mode === 'link' ? escapeHtml(filled.url) : ''}" />
              <span class="pf-link-check" data-pf-link-check></span>
            </span>
          </div>
        ` : '';
        bodyInner.innerHTML = `${previewHtml}${dropHtml}${linkHtml}`;

        const dropZone = bodyInner.querySelector('[data-pf-drop]');
        const fileInput = bodyInner.querySelector('[data-pf-file]');
        const linkInput = bodyInner.querySelector('[data-pf-link]');
        const linkCheck = bodyInner.querySelector('[data-pf-link-check]');
        const clearBtn = bodyInner.querySelector('[data-pf-clear]');

        if (clearBtn) clearBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          clearSlot(def.key);
          renderBody();
        });

        if (dropZone && fileInput) {
          dropZone.addEventListener('click', () => fileInput.click());
          fileInput.addEventListener('change', () => {
            const f = fileInput.files[0];
            if (f) handleFileForSlot(def, f);
          });

          ['dragenter', 'dragover'].forEach(ev => dropZone.addEventListener(ev, (e) => {
            e.preventDefault();
            dropZone.classList.add('is-dragover');
          }));
          ['dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, (e) => {
            if (ev === 'dragleave' && e.target !== dropZone) return;
            dropZone.classList.remove('is-dragover');
          }));
          dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files && files.length) handleFileForSlot(def, files[0]);
          });
        }

        if (!linkInput) return;
        const commitLink = () => {
          const v = linkInput.value.trim();
          if (!v) return;
          if (!/^https?:\/\//i.test(v)) {
            setStatus('Link must start with http:// or https://', true);
            return;
          }
          // Clear pending file, set link
          delete pendingFiles[def.key];
          state[def.key] = { mode: 'link', url: v };
          refreshTile(def.key);
          refreshSubmit();
          setStatus('');
          renderBody();
        };
        const updateLinkCheck = () => {
          if (!linkCheck) return;
          const v = linkInput.value.trim();
          if (!v) {
            linkCheck.classList.remove('is-valid', 'is-invalid');
            linkCheck.textContent = '';
            return;
          }
          if (/^https?:\/\/[^\s]+\.[^\s]+/i.test(v)) {
            linkCheck.classList.add('is-valid');
            linkCheck.classList.remove('is-invalid');
            linkCheck.textContent = '✓';
          } else {
            linkCheck.classList.add('is-invalid');
            linkCheck.classList.remove('is-valid');
            linkCheck.textContent = '✗';
          }
        };
        linkInput.addEventListener('input', updateLinkCheck);
        updateLinkCheck();
        linkInput.addEventListener('blur', commitLink);
        linkInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            commitLink();
          }
        });
      }

      function handleFileForSlot(def, file) {
        if (!isAcceptedForSlot(def.key, file)) {
          setStatus(`That file type is not accepted for ${def.label}. Allowed: ${def.exts}.`, true);
          return;
        }
        if (file.size > PORTFOLIO_MAX_FILE) {
          setStatus('File too large (100MB max).', true);
          return;
        }
        pendingFiles[def.key] = file;
        // Use a local object URL for preview until upload at submit time
        const objUrl = URL.createObjectURL(file);
        const ct = file.type || (isStlFile(file) ? 'model/stl' : 'application/octet-stream');
        state[def.key] = {
          mode: 'file',
          url: objUrl,
          fileName: file.name,
          contentType: ct,
          _localPreview: true
        };
        refreshTile(def.key);
        refreshSubmit();
        setStatus('');
        renderBody();
        // Soft warning for files >50MB (still under the 100MB hard cap).
        if (file.size > 50 * 1024 * 1024) {
          const inner = bodyInner;
          const existing = inner.querySelector('.pf-soft-warn');
          if (existing) existing.remove();
          const warn = document.createElement('div');
          warn.className = 'pf-soft-warn';
          warn.textContent = 'Files over 50MB are accepted but may slow down the class. Consider linking instead.';
          inner.appendChild(warn);
        }
      }

      function openSlot(key) {
        // Already open? Do nothing — protect the in-progress textarea / link input.
        if (openSlotKey === key && slot.classList.contains('is-open')) return;
        if (openSlotKey && openSlotKey !== key) {
          const prev = slotsEl.querySelector(`.pf-slot[data-slot="${openSlotKey}"]`);
          if (prev) prev.classList.remove('is-open');
        }
        slot.classList.add('is-open');
        openSlotKey = key;
        renderBody();
      }
      function closeOpenSlot() {
        slot.classList.remove('is-open');
        if (openSlotKey === def.key) openSlotKey = null;
      }

      // Expose for outside helpers
      slot._openSlot = openSlot;
      slot._renderBody = renderBody;
    });

    function refreshTile(key) {
      const slot = slotsEl.querySelector(`.pf-slot[data-slot="${key}"]`);
      if (!slot) return;
      const filled = state[key];
      const tile = slot.querySelector('[data-pf-tile]');
      const iconEl = tile.querySelector('.pf-slot-icon');
      const labelEl = tile.querySelector('.pf-slot-label');
      const statusEl = tile.querySelector('.pf-slot-status');
      const def = SLOT_DEFS.find(d => d.key === key);

      if (filled) {
        slot.classList.add('is-filled');
        if (filled.mode === 'text') {
          const wordCount = filled.text.trim().split(/\s+/).filter(Boolean).length;
          statusEl.textContent = wordCount === 1 ? '1 word written' : `${wordCount} words written`;
          iconEl.textContent = def.icon;
        } else if (filled.mode === 'link') {
          statusEl.textContent = `Link · ${getDomain(filled.url) || 'external'}`;
          iconEl.textContent = def.icon;
        } else {
          // File: show filename truncated, swap icon for a tiny thumb if image/video
          statusEl.textContent = filled.fileName || 'File';
          if ((filled.contentType || '').startsWith('image/')) {
            iconEl.innerHTML = `<div class="pf-slot-thumb"><img src="${filled.url}" alt="" /></div>`;
          } else if ((filled.contentType || '').startsWith('video/')) {
            iconEl.innerHTML = `<div class="pf-slot-thumb"><video src="${filled.url}" muted></video></div>`;
          } else {
            iconEl.textContent = def.icon;
          }
        }
        labelEl.textContent = def.label;
      } else {
        slot.classList.remove('is-filled');
        iconEl.textContent = def.icon;
        statusEl.textContent = '+ Add';
        labelEl.textContent = def.label;
      }
    }

    function clearSlot(key) {
      const filled = state[key];
      if (filled?._localPreview && filled.url) {
        try { URL.revokeObjectURL(filled.url); } catch (_) {}
      }
      delete pendingFiles[key];
      state[key] = null;
      refreshTile(key);
      refreshSubmit();
    }

    function refreshSubmit() {
      const name = nameInput.value.trim();
      const anyFilled = Object.values(state).some(v => v !== null);
      submitBtn.disabled = !(name && anyFilled);
    }
    nameInput.addEventListener('input', refreshSubmit);

    let statusTimeout = null;
    function setStatus(msg, isErr) {
      if (statusTimeout) { clearTimeout(statusTimeout); statusTimeout = null; }
      statusEl.textContent = msg;
      statusEl.classList.toggle('is-error', !!isErr);
      // Auto-clear errors after 4s so they don't linger on the panel.
      if (isErr && msg) {
        statusTimeout = setTimeout(() => {
          statusEl.textContent = '';
          statusEl.classList.remove('is-error');
        }, 4000);
      }
    }

    let _isSubmitting = false;
    async function doSubmit() {
      if (_isSubmitting) return; // hard double-submit guard
      const name = nameInput.value.trim();
      if (!name) { setStatus('Please enter your name.', true); return; }
      const anyFilled = Object.values(state).some(v => v !== null);
      if (!anyFilled) { setStatus('Add at least one slot before submitting.', true); return; }
      _isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      setStatus('Submitting…');
      localStorage.setItem(NAME_KEY, name);

      // Track per-slot upload outcome so a single failure doesn't wipe the
      // student's other filled slots. Failed slots stay in state with a
      // _retryable flag so they can be re-tried.
      const failedSlots = [];

      try {
        const finalSlots = { image: null, video: null, code: null, cad: null, summary: null };
        const uploadedPaths = []; // track for rollback if doc-write fails

        for (const def of SLOT_DEFS) {
          const cur = state[def.key];
          if (!cur) continue;
          if (cur.mode === 'text') {
            finalSlots[def.key] = { mode: 'text', text: cur.text };
            continue;
          }
          if (cur.mode === 'link') {
            finalSlots[def.key] = { mode: 'link', url: cur.url };
            continue;
          }
          // File: upload
          const file = pendingFiles[def.key];
          if (!file) {
            // Already uploaded? (shouldn't happen in this flow, but guard)
            finalSlots[def.key] = {
              mode: 'file', url: cur.url, fileName: cur.fileName, contentType: cur.contentType
            };
            continue;
          }
          setStatus(`Uploading ${def.label}…`);
          try {
