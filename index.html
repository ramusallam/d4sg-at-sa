<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D4SG @ SA</title>
<style>
  :root {
    /* Spark Learning aesthetic — warm cream page, white cards */
    --bg-0: #F7F3EE;        /* page */
    --bg-1: #FFFFFF;        /* cards / panels */
    --bg-2: #FAFAF7;        /* nested surfaces */
    --ink-hi: #111111;      /* primary text */
    --ink-mid: #555555;     /* secondary text */
    --ink-low: #9CA3AF;     /* muted */
    --accent: #3b82f6;      /* indigo blue */
    --accent-hover: #2563eb;
    --accent-soft: #eff6ff;
    --success: #22c55e;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;

    /* Modal: white card on dimmed backdrop */
    --paper: #FFFFFF;
    --paper-soft: #FAFAF7;
    --paper-ink: #111111;
    --paper-ink-mid: #555555;
    --paper-accent: #3b82f6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg-0);
    color: var(--ink-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  /* ============== STICKY HEADER ============== */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(247, 243, 238, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink-hi);
    margin: 0;
  }
  .header-title .at {
    color: var(--accent);
    font-weight: 700;
  }
  .header-meta {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-low);
  }

  /* ============== LAYOUT ============== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 120px;
  }

  .project {
    margin-bottom: 64px;
  }
  .project:last-child { margin-bottom: 0; }

  .project-title {
    font-size: clamp(24px, 3vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0 0 6px;
  }
  .project-blurb {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0 0 22px;
    max-width: 640px;
  }

  .benchmarks {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .benchmark {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }
  .benchmark:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }
  .benchmark:active {
    transform: translateY(0);
  }

  .checkbox {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }
  .checkbox:hover {
    border-color: var(--accent-hover);
  }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .benchmark-label {
    flex: 1;
    font-size: clamp(15px, 1.6vw, 17px);
    font-weight: 500;
    color: var(--ink-hi);
    line-height: 1.45;
  }
  .benchmark.done .benchmark-label {
    color: var(--ink-low);
    text-decoration: line-through;
    text-decoration-color: rgba(107, 114, 128, 0.5);
  }

  .points {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--bg-2);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* ============== MODAL ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: backdropIn 0.2s ease-out;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes backdropIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 16px;
    width: min(900px, 95vw);
    height: min(85vh, 920px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    flex-shrink: 0;
    padding: 28px 36px 22px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: var(--paper-soft);
  }
  .modal-title-wrap { flex: 1; min-width: 0; }
  .modal-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 6px;
  }
  .modal-title {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--paper-ink);
    margin: 0;
    line-height: 1.25;
  }
  .modal-points {
    font-size: 12px;
    font-weight: 600;
    color: var(--paper-ink-mid);
    background: rgba(0, 0, 0, 0.05);
    padding: 6px 12px;
    border-radius: 999px;
    margin-top: 8px;
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .close-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
    color: var(--paper-ink);
    font-size: 22px;
    line-height: 1;
  }
  .close-btn:hover {
    background: rgba(0, 0, 0, 0.12);
    transform: scale(1.05);
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px 36px;
  }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 10px;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--paper-ink);
    margin: 0 0 12px;
  }
  .modal-section ul {
    margin: 0;
    padding-left: 22px;
    color: var(--paper-ink);
  }
  .modal-section ul li {
    margin-bottom: 6px;
    line-height: 1.55;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .links a {
    display: inline-block;
    background: rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.1);
    color: var(--paper-ink);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin: 0 8px 8px 0;
    transition: background 0.15s ease;
  }
  .links a:hover {
    background: rgba(0, 0, 0, 0.1);
  }

  .rubric {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .rubric-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .rubric-row:last-child { border-bottom: none; }
  .rubric-criterion { font-weight: 500; color: var(--paper-ink); flex: 1; }
  .rubric-points {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--paper-accent);
    flex-shrink: 0;
  }

  /* ============== MOBILE ============== */
  @media (max-width: 640px) {
    .header-inner { padding: 16px 20px; }
    main { padding: 28px 20px 80px; }
    .benchmark { padding: 14px 16px; gap: 12px; }
    .points { font-size: 12px; padding: 4px 10px; }
    .modal {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
    }
    .modal-header { padding: 20px 22px 16px; }
    .modal-body { padding: 20px 22px 32px; }
  }
</style>

  // ============== STATE ==============
  const STORAGE_KEY = 'd4sg-checked-v1';
  const checked = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...checked]));
  }

  // ============== RENDER ==============
  const app = document.getElementById('app');

  function renderProjects() {
    app.innerHTML = '';
    PROJECTS.forEach(project => {
      const projEl = document.createElement('section');
      projEl.className = 'project';
      projEl.innerHTML = `
        <h2 class="project-title">${escapeHtml(project.title)}</h2>
        ${project.blurb ? `<p class="project-blurb">${escapeHtml(project.blurb)}</p>` : ''}
        <div class="benchmarks"></div>
      `;
      const benchEl = projEl.querySelector('.benchmarks');
      project.benchmarks.forEach(b => {
        const isChecked = checked.has(b.id);
        const row = document.createElement('div');
        row.className = 'benchmark' + (isChecked ? ' done' : '');
        row.dataset.id = b.id;
        row.innerHTML = `
          <div class="checkbox ${isChecked ? 'checked' : ''}" data-checkbox="${b.id}" role="checkbox" aria-checked="${isChecked}" tabindex="0"></div>
          <div class="benchmark-label">${escapeHtml(b.title)}</div>
          <div class="points">${b.points} pts</div>
        `;
        // open modal on click of row (not checkbox)
        row.addEventListener('click', (e) => {
          if (e.target.closest('[data-checkbox]')) return;
          openModal(b);
        });
        // checkbox toggle
        const cb = row.querySelector('[data-checkbox]');
        cb.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleChecked(b.id, row, cb);
        });
        cb.addEventListener('keydown', (e) => {
          if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            toggleChecked(b.id, row, cb);
          }
        });
        benchEl.appendChild(row);
      });
      app.appendChild(projEl);
    });
  }

  function toggleChecked(id, row, cb) {
    if (checked.has(id)) {
      checked.delete(id);
      row.classList.remove('done');
      cb.classList.remove('checked');
      cb.setAttribute('aria-checked', 'false');
    } else {
      checked.add(id);
      row.classList.add('done');
      cb.classList.add('checked');
      cb.setAttribute('aria-checked', 'true');
    }
    persist();
  }

  // ============== MODAL ==============
  const modal = document.getElementById('modal');
  const modalCard = document.getElementById('modalCard');
  const modalTitle = document.getElementById('modalTitle');
  const modalPoints = document.getElementById('modalPoints');
  const modalBody = document.getElementById('modalBody');
  const closeBtn = document.getElementById('closeBtn');

  function openModal(b) {
    modalTitle.textContent = b.title;
    modalPoints.textContent = `${b.points} pts`;
    modalBody.innerHTML = '';

    // Instructions
    if (b.instructions) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `<h3>Instructions</h3><p>${escapeHtml(b.instructions)}</p>`;
      modalBody.appendChild(sec);
    }
    // Video
    if (b.videoUrl) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `
        <h3>Helper Video</h3>
        <div class="video-wrap">
          <iframe src="${b.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      `;
      modalBody.appendChild(sec);
    }
    // Links
    if (b.links && b.links.length) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `<h3>Resources</h3><div class="links">${
        b.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`).join('')
      }</div>`;
      modalBody.appendChild(sec);
    }
    // Rubric
    if (b.rubric && b.rubric.length) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      const total = b.rubric.reduce((s, r) => s + r.points, 0);
      sec.innerHTML = `
        <h3>Rubric · ${total} pts total</h3>
        <div class="rubric">
          ${b.rubric.map(r => `
            <div class="rubric-row">
              <div class="rubric-criterion">${escapeHtml(r.criterion)}</div>
              <div class="rubric-points">${r.points} pts</div>
            </div>
          `).join('')}
        </div>
      `;
      modalBody.appendChild(sec);
    }

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  // ============== UTIL ==============
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ============== INIT ==============
  renderProjects();
</script>

</body>
</html>
