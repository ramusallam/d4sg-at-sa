<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D4SG @ SA</title>
<style>
  :root {
    /* Spark Learning aesthetic — warm cream page, white cards */
    --bg-0: #F7F3EE;        /* page */
    --bg-1: #FFFFFF;        /* cards / panels */
    --bg-2: #FAFAF7;        /* nested surfaces */
    --ink-hi: #111111;      /* primary text */
    --ink-mid: #555555;     /* secondary text */
    --ink-low: #9CA3AF;     /* muted */
    --accent: #3b82f6;      /* indigo blue */
    --accent-hover: #2563eb;
    --accent-soft: #eff6ff;
    --success: #22c55e;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;

    /* Modal: white card on dimmed backdrop */
    --paper: #FFFFFF;
    --paper-soft: #FAFAF7;
    --paper-ink: #111111;
    --paper-ink-mid: #555555;
    --paper-accent: #3b82f6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg-0);
    color: var(--ink-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  /* ============== STICKY HEADER ============== */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(247, 243, 238, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink-hi);
    margin: 0;
  }
  .header-title .at {
    color: var(--accent);
    font-weight: 700;
  }
  .header-meta {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-low);
  }

  /* ============== LAYOUT ============== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 120px;
  }

  .project {
    margin-bottom: 64px;
  }
  .project:last-child { margin-bottom: 0; }

  .project-title {
    font-size: clamp(24px, 3vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0 0 6px;
  }
  .project-blurb {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0 0 22px;
    max-width: 640px;
  }

  .benchmarks {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .benchmark {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }
  .benchmark:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }
  .benchmark:active {
    transform: translateY(0);
  }

  .checkbox {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }
  .checkbox:hover {
    border-color: var(--accent-hover);
  }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .benchmark-label {
    flex: 1;
    font-size: clamp(15px, 1.6vw, 17px);
    font-weight: 500;
    color: var(--ink-hi);
    line-height: 1.45;
  }
  .benchmark.done .benchmark-label {
    color: var(--ink-low);
    text-decoration: line-through;
    text-decoration-color: rgba(107, 114, 128, 0.5);
  }

  .points {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--bg-2);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* ============== MODAL ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: backdropIn 0.2s ease-out;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes backdropIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 16px;
    width: min(900px, 95vw);
    height: min(85vh, 920px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    flex-shrink: 0;
    padding: 28px 36px 22px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: var(--paper-soft);
  }
  .modal-title-wrap { flex: 1; min-width: 0; }
  .modal-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 6px;
  }
  .modal-title {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--paper-ink);
    margin: 0;
    line-height: 1.25;
  }
  .modal-points {
    font-size: 12px;
    font-weight: 600;
    color: var(--paper-ink-mid);
    background: rgba(0, 0, 0, 0.05);
    padding: 6px 12px;
    border-radius: 999px;
    margin-top: 8px;
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .close-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
    color: var(--paper-ink);
    font-size: 22px;
    line-height: 1;
  }
  .close-btn:hover {
    background: rgba(0, 0, 0, 0.12);
    transform: scale(1.05);
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px 36px;
  }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 10px;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--paper-ink);
    margin: 0 0 12px;
  }
  .modal-section ul {
    margin: 0;
    padding-left: 22px;
    color: var(--paper-ink);
  }
  .modal-section ul li {
    margin-bottom: 6px;
    line-height: 1.55;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .links a {
    display: inline-block;
    background: rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.1);
    color: var(--paper-ink);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin: 0 8px 8px 0;
    transition: background 0.15s ease;
  }
  .links a:hover {
    background: rgba(0, 0, 0, 0.1);
  }

  .rubric {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .rubric-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .rubric-row:last-child { border-bottom: none; }
  .rubric-criterion { font-weight: 500; color: var(--paper-ink); flex: 1; }
  .rubric-points {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--paper-accent);
    flex-shrink: 0;
  }

  /* ============== HEADER NAV (Homework / Back) ============== */
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: white;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s ease;
    margin-right: 10px;
    cursor: pointer;
  }
  .nav-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .nav-back { display: none; }
  .nav-to-hw { display: inline-flex; }
  body.view-hw .nav-back { display: inline-flex; }
  body.view-hw .nav-to-hw { display: none; }

  /* ============== HOMEWORK page ============== */
  .week-row {
    /* uses .benchmark styles for consistency; only overrides where needed */
  }
  .week-row .checkbox { display: none; } /* homework rows have no checkbox */
  .step-section {
    margin-bottom: 28px;
  }
  .step-section h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 10px;
  }
  .step-section p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--paper-ink);
    margin: 0 0 14px;
  }
  .step-section a.inline-link {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid rgba(59, 130, 246, 0.35);
    padding-bottom: 1px;
    transition: border-color 0.15s ease;
  }
  .step-section a.inline-link:hover { border-color: var(--accent); }
  .tinkercad-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .tinkercad-btn:hover { background: var(--accent-hover); }
  .tinkercad-btn:active { transform: translateY(1px); }
  .tinkercad-btn .arrow { font-size: 12px; }

  /* ============== ARTIFACT COUNT BADGE (on benchmark row) ============== */
  .artifact-count {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(59, 130, 246, 0.25);
    font-variant-numeric: tabular-nums;
  }
  .artifact-count svg { width: 12px; height: 12px; }

  /* ============== GALLERY (inside modal) ============== */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .gallery-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.15s ease;
  }
  .gallery-tile:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
  }
  .gallery-tile img,
  .gallery-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-tile .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    pointer-events: none;
  }
  .gallery-tile .tile-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 8px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0));
    color: white;
    font-size: 10px;
    line-height: 1.25;
  }
  .gallery-tile .tile-caption .tile-name {
    font-weight: 700;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gallery-tile .tile-caption .tile-desc {
    display: none;
  }
  .gallery-tile .tile-delete {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  body.is-admin .gallery-tile .tile-delete { display: flex; }
  .gallery-tile .tile-delete:hover {
    background: #ef4444;
    transform: scale(1.1);
  }

  /* Add tile (dashed) */
  .add-tile {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: transparent;
    border: 1.5px dashed var(--border-strong);
    color: var(--ink-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    font-weight: 600;
    font-size: 10px;
    text-align: center;
    padding: 4px;
  }
  .add-tile:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .add-tile .plus {
    font-size: 22px;
    line-height: 1;
    font-weight: 300;
  }

  /* Upload form */
  .upload-form {
    grid-column: 1 / -1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
  }
  .upload-form label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-low);
  }
  .upload-form input[type="text"],
  .upload-form textarea {
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg-2);
    color: var(--paper-ink);
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
    resize: vertical;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .upload-form input[type="text"]:focus,
  .upload-form textarea:focus {
    border-color: var(--accent);
    background: white;
  }
  .upload-form input[type="file"] { display: none; }

  /* Smart attachment zone */
  .attach {
    position: relative;
    border: 1.5px dashed var(--border-strong);
    border-radius: 12px;
    background: var(--bg-2);
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    overflow: hidden;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .attach.is-dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: scale(1.005);
  }
  .attach.has-content {
    border-style: solid;
    background: white;
    cursor: default;
    min-height: 0;
  }
  .attach-empty {
    width: 100%;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    color: var(--ink-mid);
    text-align: center;
  }
  .attach-empty:hover { color: var(--accent); }
  .attach-empty .attach-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .attach-empty:hover .attach-icon { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.18); }
  .attach-empty .attach-icon svg { width: 18px; height: 18px; }
  .attach-empty .attach-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
  }
  .attach-empty .attach-sub {
    font-size: 12px;
    color: var(--ink-low);
  }
  .attach-link-toggle {
    margin-top: 4px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s ease;
  }
  .attach-link-toggle:hover { background: var(--accent-soft); }

  .attach-link-entry {
    display: none;
    padding: 14px;
    width: 100%;
    align-items: center;
    gap: 8px;
  }
  .attach.is-link-entry .attach-empty { display: none; }
  .attach.is-link-entry .attach-link-entry { display: flex; }
  .attach-link-entry input {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: white;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .attach-link-entry input:focus { border-color: var(--accent); }
  .attach-link-entry .icon-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    transition: all 0.15s ease;
  }
  .attach-link-entry .icon-btn:hover { border-color: var(--ink-mid); color: var(--paper-ink); }

  /* Preview card (file or link) */
  .attach-preview {
    display: none;
    padding: 12px;
    width: 100%;
    align-items: center;
    gap: 14px;
  }
  .attach.has-content .attach-preview { display: flex; }
  .attach.has-content .attach-empty,
  .attach.has-content .attach-link-entry { display: none; }
  .attach-preview .preview-thumb {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 9px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--accent);
  }
  .attach-preview .preview-thumb img,
  .attach-preview .preview-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .attach-preview .preview-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .attach-preview .preview-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-preview .preview-meta {
    font-size: 12px;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-preview .preview-remove {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .attach-preview .preview-remove:hover {

  // ============== MODAL ==============
  const modal = document.getElementById('modal');
  const modalCard = document.getElementById('modalCard');
  const modalTitle = document.getElementById('modalTitle');
  const modalPoints = document.getElementById('modalPoints');
  const modalBody = document.getElementById('modalBody');
  const closeBtn = document.getElementById('closeBtn');

  function openModal(b) {
    currentBenchmark = b;
    modalTitle.textContent = b.title;
    modalPoints.textContent = `${b.points} pts`;
    modalPoints.style.display = '';
    modalBody.innerHTML = '';

    // Instructions
    if (b.instructions) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `<h3>Instructions</h3><p>${escapeHtml(b.instructions)}</p>`;
      modalBody.appendChild(sec);
    }
    // Video
    if (b.videoUrl) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `
        <h3>Helper Video</h3>
        <div class="video-wrap">
          <iframe src="${b.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      `;
      modalBody.appendChild(sec);
    }
    // Links
    if (b.links && b.links.length) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `<h3>Resources</h3><div class="links">${
        b.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`).join('')
      }</div>`;
      modalBody.appendChild(sec);
    }
    // Rubric
    if (b.rubric && b.rubric.length) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      const total = b.rubric.reduce((s, r) => s + r.points, 0);
      sec.innerHTML = `
        <h3>Rubric · ${total} pts total</h3>
        <div class="rubric">
          ${b.rubric.map(r => `
            <div class="rubric-row">
              <div class="rubric-criterion">${escapeHtml(r.criterion)}</div>
              <div class="rubric-points">${r.points} pts</div>
            </div>
          `).join('')}
        </div>
      `;
      modalBody.appendChild(sec);
    }

    // Gallery (always present — students drop work here, signals to grade)
    const gallerySec = document.createElement('div');
    gallerySec.className = 'modal-section';
    gallerySec.innerHTML = `
      <h3>Drop evidence of your work here</h3>
      <div class="gallery-grid" id="galleryGrid"></div>
    `;
    modalBody.appendChild(gallerySec);
    subscribeGallery(b.id);

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    currentBenchmark = null;
    if (unsubscribeGallery) { unsubscribeGallery(); unsubscribeGallery = null; }
  }

  function openHomeworkModal(w) {
    currentBenchmark = w;
    modalTitle.textContent = w.title;
    modalPoints.textContent = '';
    modalPoints.style.display = 'none';
    modalBody.innerHTML = '';

    // Step 1
    const step1 = document.createElement('div');
    step1.className = 'step-section';
    step1.innerHTML = `
      <h3>Step 1</h3>
      <p>Watch the video and follow along in <a href="https://www.tinkercad.com/" target="_blank" rel="noopener" class="inline-link">Tinkercad</a>.</p>
      <a href="https://www.tinkercad.com/" target="_blank" rel="noopener" class="tinkercad-btn">Open Tinkercad <span class="arrow">↗</span></a>
      ${w.videoUrl
        ? `<div class="video-wrap"><iframe src="${w.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`
        : `<div class="video-wrap" style="background:#fafaf7;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-low);font-size:13px;">Video placeholder for ${escapeHtml(w.title)}</div>`}
    `;
    modalBody.appendChild(step1);

    // Step 2
    const step2 = document.createElement('div');
    step2.className = 'step-section';
    step2.innerHTML = `
      <h3>Step 2</h3>
      <p>Use the skills from the video to create something purposeful. Describe its purpose and provide the public link to your design below.</p>
      <div class="gallery-grid" id="galleryGrid"></div>
    `;
    modalBody.appendChild(step2);

    subscribeGallery(w.id, {
      linkOnly: true,
      descriptionPlaceholder: 'Describe the purpose of your design…'
    });

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  // ============== GALLERY ==============
  function subscribeGallery(benchmarkId, opts = {}) {
    if (unsubscribeGallery) unsubscribeGallery();
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    const q = query(
      collection(db, 'artifacts'),
      where('benchmarkId', '==', benchmarkId)
    );
    unsubscribeGallery = onSnapshot(q, (snap) => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      // newest first
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      renderGallery(grid, benchmarkId, items, opts);
    }, (err) => {
      console.error('gallery subscribe error', err);
      grid.innerHTML = `<div class="gallery-empty">Could not load gallery.</div>`;
    });
  }

  function renderGallery(grid, benchmarkId, items, opts = {}) {
    grid.innerHTML = '';
    items.forEach(item => {
      const tile = document.createElement('div');
      const isLink = item.type === 'link';
      const isVideo = (item.contentType || '').startsWith('video/');
      tile.className = 'gallery-tile' + (isLink ? ' link-tile' : '');

      let media;
      if (isLink) {
        media = item.linkImage
          ? `<img src="${item.linkImage}" alt="${escapeHtml(item.linkTitle || item.linkUrl)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'link-fallback',innerHTML:'<div class=\\'link-icon\\'>🔗</div><div class=\\'link-domain\\'>${escapeHtml(item.linkDomain || '')}</div>'}));" />`
          : `<div class="link-fallback"><div class="link-icon">🔗</div><div class="link-domain">${escapeHtml(item.linkDomain || 'link')}</div></div>`;
      } else if (isVideo) {
        media = `<video src="${item.fileUrl}" muted preload="metadata"></video><div class="play-icon">▶</div>`;
      } else {
        media = `<img src="${item.fileUrl}" alt="${escapeHtml(item.studentName || '')}" loading="lazy" />`;
      }

      tile.innerHTML = `
        ${media}
        ${isLink ? `<span class="link-chip">Link</span>` : ''}
        <div class="tile-caption">
          <span class="tile-name">${escapeHtml(item.studentName || 'Unnamed')}</span>
          <span class="tile-desc">${escapeHtml(item.description || '')}</span>
        </div>
        <button class="tile-delete" aria-label="Delete">×</button>
      `;
      tile.addEventListener('click', (e) => {
        if (e.target.closest('.tile-delete')) return;
        if (isLink) {
          window.open(item.linkUrl, '_blank', 'noopener');
        } else {
          openLightbox(item);
        }
      });
      tile.querySelector('.tile-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`Delete "${item.studentName}" submission?`)) return;
        await deleteArtifact(item);
      });
      grid.appendChild(tile);
    });
    // Add tile (always last)
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.innerHTML = `<div class="plus">+</div><div>${opts.linkOnly ? 'Submit link' : 'Add your work'}</div>`;
    addTile.addEventListener('click', () => {
      const form = buildUploadForm(benchmarkId, () => {
        // re-render handled by snapshot
      }, () => {
        renderGallery(grid, benchmarkId, items, opts);
      }, opts);
      grid.replaceChild(form, addTile);
    });
    grid.appendChild(addTile);
  }

  function buildUploadForm(benchmarkId, onSuccess, onCancel, opts = {}) {
    const linkOnly = !!opts.linkOnly;
    const descPlaceholder = opts.descriptionPlaceholder || 'What is this and what should we look at?';
    const form = document.createElement('div');
    form.className = 'upload-form';
    const savedName = localStorage.getItem(NAME_KEY) || '';
    const UPLOAD_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0l-5 5m5-5l5 5M4 20h16"/></svg>';
    const LINK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.5-1.5"/></svg>';

    const fileBlock = linkOnly ? '' : `
      <div class="attach-empty" data-attach-empty>
        <div class="attach-icon">${UPLOAD_ICON}</div>
        <div class="attach-text">Drop a file or click to upload</div>
        <div class="attach-sub">Image or video, up to 50MB</div>
        <button type="button" class="attach-link-toggle" data-link-toggle>${LINK_ICON} Or paste a link</button>
      </div>
      <input type="file" data-file accept="image/*,video/*" />
    `;

    form.innerHTML = `
      <label>Your name<input type="text" data-name maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" /></label>
      <label>Brief description<textarea data-desc rows="2" maxlength="500" placeholder="${escapeHtml(descPlaceholder)}"></textarea></label>

      <div class="attach ${linkOnly ? 'is-link-entry' : ''}" data-attach>
        ${fileBlock}
        <div class="attach-link-entry">
          <input type="url" data-link-input placeholder="${linkOnly ? 'Paste a public link to your design and press Enter…' : 'Paste a URL and press Enter…'}" />
          ${linkOnly ? '' : '<button type="button" class="icon-btn" data-link-cancel aria-label="Cancel">×</button>'}
        </div>
        <div class="attach-preview" data-preview></div>
      </div>

      <div class="upload-status" data-status></div>
      <div class="actions">
        <button class="btn-cancel" data-cancel type="button">Cancel</button>
        <button class="btn-submit" data-submit type="button">Submit</button>
      </div>
    `;

    const nameInput = form.querySelector('[data-name]');
    const descInput = form.querySelector('[data-desc]');
    const statusEl = form.querySelector('[data-status]');
    const submitBtn = form.querySelector('[data-submit]');
    const attach = form.querySelector('[data-attach]');
    const attachEmpty = form.querySelector('[data-attach-empty]');
    const fileInput = form.querySelector('[data-file]');
    const linkToggle = form.querySelector('[data-link-toggle]');
    const linkInput = form.querySelector('[data-link-input]');
    const linkCancel = form.querySelector('[data-link-cancel]');
    const previewEl = form.querySelector('[data-preview]');

    // Attachment state
    let attachedFile = null;
    let attachedLink = null; // { url, preview }

    function setErr(msg) {
      statusEl.classList.add('error');
      statusEl.textContent = msg;
    }
    function clearStatus() {
      statusEl.classList.remove('error');
      statusEl.textContent = '';
    }

    function clearAttachment() {
      attachedFile = null;
      attachedLink = null;
      attach.classList.remove('has-content', 'is-link-entry');
      previewEl.innerHTML = '';
      fileInput.value = '';
      linkInput.value = '';
      clearStatus();
    }

    function attachFile(file) {
      if (!file.type.match(/^(image|video)\//)) { setErr('File must be an image or video.'); return; }
      if (file.size > 50 * 1024 * 1024) { setErr('File too large (50MB max).'); return; }
      attachedFile = file;
      attachedLink = null;
      const isVideo = file.type.startsWith('video/');
      const sizeKb = file.size / 1024;
      const sizeStr = sizeKb < 1024 ? `${Math.round(sizeKb)} KB` : `${(sizeKb / 1024).toFixed(1)} MB`;
      const objectUrl = URL.createObjectURL(file);
      previewEl.innerHTML = `
        <div class="preview-thumb">${isVideo ? `<video src="${objectUrl}" muted></video>` : `<img src="${objectUrl}" alt="preview" />`}</div>
        <div class="preview-info">
          <div class="preview-title">${escapeHtml(file.name)}</div>
          <div class="preview-meta">${sizeStr} · ${isVideo ? 'Video' : 'Image'}</div>
        </div>
        <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
      `;
      attach.classList.add('has-content');
      attach.classList.remove('is-link-entry');
      previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      clearStatus();
    }

    async function attachLink(url) {
      if (!/^https?:\/\//i.test(url)) { setErr('Link must start with http:// or https://'); return; }
      attachedFile = null;
      attachedLink = { url, preview: null };
      attach.classList.add('has-content');
      attach.classList.remove('is-link-entry');
      // loading state
      previewEl.innerHTML = `
        <div class="preview-thumb">${LINK_ICON_BIG}</div>
        <div class="preview-info">
          <div class="preview-title">${escapeHtml(url)}</div>
          <div class="preview-meta preview-loading">Pulling preview…</div>
        </div>
        <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
      `;
      previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      clearStatus();
      try {
        const preview = await fetchLinkPreview(url);
        if (attachedLink?.url !== url) return; // user changed it
        attachedLink.preview = preview;
        const thumb = preview.image
          ? `<img src="${preview.image}" alt="preview" onerror="this.parentElement.innerHTML='${LINK_ICON_BIG.replace(/'/g, "\\'")}';" />`
          : LINK_ICON_BIG;
        previewEl.innerHTML = `
          <div class="preview-thumb">${thumb}</div>
          <div class="preview-info">
            <div class="preview-title">${escapeHtml(preview.title || preview.domain || url)}</div>
            <div class="preview-meta">${escapeHtml(preview.domain || url)}</div>
          </div>
          <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
        `;
        previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      } catch (err) {
        // keep the basic preview but mark as failed
        const meta = previewEl.querySelector('.preview-meta');
        if (meta) meta.textContent = 'Could not pull preview · still submittable';
      }
    }

    const LINK_ICON_BIG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.5-1.5"/></svg>';

    if (!linkOnly) {
      // Click empty zone → file picker
      attachEmpty.addEventListener('click', (e) => {
        if (e.target.closest('[data-link-toggle]')) return;
        fileInput.click();
      });
      fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) attachFile(fileInput.files[0]);
      });

      // Drag & drop on the attach zone (file or URL)
      ['dragenter', 'dragover'].forEach(ev => attach.addEventListener(ev, (e) => {
        e.preventDefault();
        attach.classList.add('is-dragover');
      }));
      ['dragleave', 'drop'].forEach(ev => attach.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== attach) return;
        attach.classList.remove('is-dragover');
      }));
      attach.addEventListener('drop', (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files && files.length) { attachFile(files[0]); return; }
        const url = (e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '').trim();
        if (url) attachLink(url);
      });

      // Link toggle: reveal URL entry
      linkToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        attach.classList.add('is-link-entry');
        setTimeout(() => linkInput.focus(), 50);
      });
      linkCancel.addEventListener('click', () => {
        attach.classList.remove('is-link-entry');
        linkInput.value = '';
      });
    } else {
      // linkOnly: drop URL anywhere on the attach zone is still useful
      ['dragenter', 'dragover'].forEach(ev => attach.addEventListener(ev, (e) => {
        e.preventDefault();
        attach.classList.add('is-dragover');
      }));
      ['dragleave', 'drop'].forEach(ev => attach.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== attach) return;
        attach.classList.remove('is-dragover');
      }));
      attach.addEventListener('drop', (e) => {
        e.preventDefault();
        const url = (e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '').trim();
        if (url) attachLink(url);
      });
      // Auto-focus the link input when form opens
      setTimeout(() => linkInput.focus(), 50);
    }
    linkInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const v = linkInput.value.trim();
        if (v) attachLink(v);
      } else if (e.key === 'Escape') {
        linkCancel.click();
      }
    });
    // Paste a URL into the link input → auto-attach
    linkInput.addEventListener('paste', (e) => {
      const t = (e.clipboardData?.getData('text/plain') || '').trim();
      if (/^https?:\/\//i.test(t)) {
        e.preventDefault();
        linkInput.value = t;
        attachLink(t);
      }
    });
    // Paste a URL anywhere else on the form (not in name/desc inputs) → auto-attach
    form.addEventListener('paste', (e) => {
      if (e.target === nameInput || e.target === descInput || e.target === linkInput) return;
      const t = (e.clipboardData?.getData('text/plain') || '').trim();
      if (/^https?:\/\//i.test(t)) {
        e.preventDefault();
        attachLink(t);
      }
    });

    form.querySelector('[data-cancel]').addEventListener('click', onCancel);
    submitBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const desc = descInput.value.trim();
      if (!name) { setErr('Please enter your name.'); return; }
      if (!attachedFile && !attachedLink) { setErr(linkOnly ? 'Paste a link to your design.' : 'Drop a file or paste a link.'); return; }
      submitBtn.disabled = true;
      clearStatus();
      localStorage.setItem(NAME_KEY, name);
      try {
        if (attachedFile) {
          statusEl.textContent = 'Uploading…';
          await uploadArtifact({ benchmarkId, name, desc, file: attachedFile, onProgress: (pct) => {
            statusEl.textContent = `Uploading… ${pct}%`;
          }});
        } else {
          statusEl.textContent = 'Saving…';
          const preview = attachedLink.preview || await fetchLinkPreview(attachedLink.url);
          await addLinkArtifact({ benchmarkId, name, desc, link: attachedLink.url, preview });
        }
        statusEl.textContent = 'Done.';
        onSuccess();
      } catch (err) {
        console.error(err);
        setErr(err.message || 'Submit failed. Try again.');
        submitBtn.disabled = false;
      }
    });

    return form;
  }

  async function fetchLinkPreview(url) {
    try {
      const r = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error('preview');
      return await r.json();
    } catch (err) {
      // Graceful degradation — submit the link with no preview metadata
      let domain = '';
      try { domain = new URL(url).hostname.replace(/^www\./, ''); } catch (_) {}
      return { url, title: '', description: '', image: '', domain };
    }
  }

  async function addLinkArtifact({ benchmarkId, name, desc, link, preview }) {
    await addDoc(collection(db, 'artifacts'), {
      benchmarkId,
      studentName: name,
      description: desc,
      type: 'link',
      linkUrl: link,
      linkTitle: preview?.title || '',
      linkDescription: preview?.description || '',
      linkImage: preview?.image || '',
      linkDomain: preview?.domain || '',
      createdAt: serverTimestamp()
    });
  }

  function uploadArtifact({ benchmarkId, name, desc, file, onProgress }) {
    return new Promise((resolve, reject) => {
      const ext = (file.name.match(/\.[a-z0-9]+$/i) || [''])[0];
      const path = `artifacts/${benchmarkId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}${ext}`;
      const ref = storageRef(storage, path);
      const task = uploadBytesResumable(ref, file, { contentType: file.type });
      task.on('state_changed',
        (snap) => onProgress?.(Math.round(snap.bytesTransferred / snap.totalBytes * 100)),
        reject,
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            await addDoc(collection(db, 'artifacts'), {
              benchmarkId,
              studentName: name,
              description: desc,
              fileUrl: url,
              filePath: path,
              contentType: file.type,
              createdAt: serverTimestamp()
            });
            resolve();
          } catch (e) { reject(e); }
        }
      );
    });
  }

  async function deleteArtifact(item) {
    try {
      if (item.filePath) {
        try { await deleteObject(storageRef(storage, item.filePath)); } catch (e) { /* file may already be gone */ }
      }
      await deleteDoc(doc(db, 'artifacts', item.id));
    } catch (err) {
      console.error('delete failed', err);
      alert('Could not delete. Try again.');
    }
  }

  // ============== LIGHTBOX ==============
  const lightbox = document.getElementById('lightbox');
  const lightboxMedia = document.getElementById('lightboxMedia');
  const lightboxName = document.getElementById('lightboxName');
  const lightboxDesc = document.getElementById('lightboxDesc');
  const lightboxClose = document.getElementById('lightboxClose');

  function openLightbox(item) {
    const isVideo = (item.contentType || '').startsWith('video/');
    lightboxMedia.innerHTML = isVideo
      ? `<video src="${item.fileUrl}" controls autoplay></video>`
      : `<img src="${item.fileUrl}" alt="${escapeHtml(item.studentName || '')}" />`;
    lightboxName.textContent = item.studentName || 'Unnamed';
    lightboxDesc.textContent = item.description || '';
    lightbox.classList.add('open');
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxMedia.innerHTML = '';
  }
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
  });

  // ============== ARCHIVE (admin) ==============
  document.getElementById('archiveBtn').addEventListener('click', async () => {
    if (!isAdmin) return;
    if (!confirm('Archive ALL current submissions and clear the live galleries? Old work stays accessible in Firestore as a snapshot.')) return;
    try {
      const snap = await getDocs(collection(db, 'artifacts'));
      if (snap.empty) { alert('Nothing to archive.'); return; }
      const archiveId = new Date().toISOString().replace(/[:.]/g, '-');
      // copy each to archives/{archiveId}/artifacts/{id}
      const copies = [];
      snap.forEach(d => {
        copies.push(setDoc(doc(db, 'archives', archiveId, 'artifacts', d.id), d.data()));
      });
      await Promise.all(copies);
      // delete originals (Firestore doc + Storage file)
      const deletes = [];
      snap.forEach(d => {
        const data = d.data();
        if (data.filePath) {
          deletes.push(deleteObject(storageRef(storage, data.filePath)).catch(() => {}));
        }
        deletes.push(deleteDoc(doc(db, 'artifacts', d.id)));
      });
      await Promise.all(deletes);
      alert(`Archived ${snap.size} submissions to archives/${archiveId}.`);
    } catch (err) {
      console.error(err);
      alert('Archive failed. Check console.');
    }
  });

  // ============== UTIL ==============
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ============== INIT ==============
  const route = location.pathname.replace(/\/+$/, '');
  if (route === '/hw') {
    document.body.classList.add('view-hw');
    renderHomework();
  } else {
    renderProjects();
  }
</script>

</body>
