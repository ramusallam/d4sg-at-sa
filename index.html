<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D4SG @ SA</title>
<style>
  :root {
    /* Spark Learning aesthetic — warm cream page, white cards */
    --bg-0: #F7F3EE;        /* page */
    --bg-1: #FFFFFF;        /* cards / panels */
    --bg-2: #FAFAF7;        /* nested surfaces */
    --ink-hi: #111111;      /* primary text */
    --ink-mid: #555555;     /* secondary text */
    --ink-low: #9CA3AF;     /* muted */
    --accent: #3b82f6;      /* indigo blue */
    --accent-hover: #2563eb;
    --accent-soft: #eff6ff;
    --success: #22c55e;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;

    /* Modal: white card on dimmed backdrop */
    --paper: #FFFFFF;
    --paper-soft: #FAFAF7;
    --paper-ink: #111111;
    --paper-ink-mid: #555555;
    --paper-accent: #3b82f6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg-0);
    color: var(--ink-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  /* ============== STICKY HEADER ============== */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(247, 243, 238, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink-hi);
    margin: 0;
  }
  .header-title .at {
    color: var(--accent);
    font-weight: 700;
  }
  .header-meta {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-low);
  }

  /* ============== LAYOUT ============== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 120px;
  }

  .project {
    margin-bottom: 64px;
  }
  .project:last-child { margin-bottom: 0; }

  .project-title {
    font-size: clamp(24px, 3vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0 0 16px;
  }
  .project-blurb {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0 0 22px;
    max-width: 640px;
  }

  /* ============== FINALE: PUBLISH TO INSTRUCTABLES (Project 4 only) ============== */
  /* Quiet, grown-up forest-green CTA. Distinct from the indigo accents elsewhere
     so the publishing step still reads as a separate moment, but no shouting. */
  .finale-publish {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: stretch;
  }
  .finale-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    border-radius: 12px;
    background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    color: #ffffff;
    text-decoration: none;
    box-shadow: 0 2px 10px rgba(5, 150, 105, 0.20);
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
  }
  .finale-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(5, 150, 105, 0.28);
  }
  .finale-btn:active {
    transform: translateY(0);
  }
  .finale-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .finale-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #ffffff;
  }
  .finale-sub {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.45;
  }
  .finale-arrow {
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    flex-shrink: 0;
    opacity: 0.9;
    transition: transform 0.15s ease-out, opacity 0.15s ease-out;
  }
  .finale-btn:hover .finale-arrow {
    transform: translateX(3px);
    opacity: 1;
  }
  @media (max-width: 600px) {
    .finale-btn { padding: 16px 18px; gap: 12px; border-radius: 10px; }
    .finale-title { font-size: 15px; }
    .finale-sub { font-size: 12px; }
    .finale-arrow { font-size: 22px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .finale-btn, .finale-arrow { transition: none; }
  }

  .benchmarks {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .benchmark {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }
  .benchmark:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }
  .benchmark:active {
    transform: translateY(0);
  }

  .checkbox {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }
  .checkbox:hover {
    border-color: var(--accent-hover);
  }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .benchmark-num {
    flex-shrink: 0;
    width: 22px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-low);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }
  .benchmark.done .benchmark-num { color: var(--ink-low); opacity: 0.5; }

  .benchmark-label {
    flex: 1;
    font-size: clamp(15px, 1.6vw, 17px);
    font-weight: 500;
    color: var(--ink-hi);
    line-height: 1.45;
  }
  .benchmark.done .benchmark-label {
    color: var(--ink-low);
    text-decoration: line-through;
    text-decoration-color: rgba(107, 114, 128, 0.5);
  }

  .points {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--bg-2);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* ============== MODAL ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: backdropIn 0.2s ease-out;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes backdropIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 16px;
    width: min(900px, 95vw);
    height: min(85vh, 920px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    flex-shrink: 0;
    padding: 28px 36px 22px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: var(--paper-soft);
  }
  .modal-title-wrap { flex: 1; min-width: 0; }
  .modal-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 6px;
  }
  .modal-title {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--paper-ink);
    margin: 0;
    line-height: 1.25;
  }
  .modal-points {
    font-size: 12px;
    font-weight: 600;
    color: var(--paper-ink-mid);
    background: rgba(0, 0, 0, 0.05);
    padding: 6px 12px;
    border-radius: 999px;
    margin-top: 8px;
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .close-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
    color: var(--paper-ink);
    font-size: 22px;
    line-height: 1;
  }
  .close-btn:hover {
    background: rgba(0, 0, 0, 0.12);
    transform: scale(1.05);
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px 36px;
  }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-ink);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--paper-ink);
    margin: 0 0 12px;
  }
  .modal-section ul {
    margin: 0;
    padding-left: 22px;
    color: var(--paper-ink);
  }
  .modal-section ul li {
    margin-bottom: 6px;
    line-height: 1.55;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .links a {
    display: inline-block;
    background: rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.1);
    color: var(--paper-ink);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin: 0 8px 8px 0;
    transition: background 0.15s ease;
  }
  .links a:hover {
    background: rgba(0, 0, 0, 0.1);
  }

  .rubric {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .rubric-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .rubric-row:last-child { border-bottom: none; }
  .rubric-criterion { font-weight: 500; color: var(--paper-ink); flex: 1; }
  .rubric-points {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--paper-accent);
    flex-shrink: 0;
  }

  /* ============== HEADER NAV (Homework / Back) ============== */
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: white;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s ease;
    margin-right: 10px;
    cursor: pointer;
  }
  .nav-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .nav-back { display: none; }
  .nav-to-hw, .nav-to-progress { display: inline-flex; }
  body.view-hw .nav-back, body.view-progress .nav-back { display: inline-flex; }
  body.view-hw .nav-to-hw { display: none; }
  body.view-progress .nav-to-progress { display: none; }

  /* ============== PROGRESS page ============== */
  .progress-section { margin-bottom: 32px; }
  .progress-blurb {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-mid);
    margin: 0 0 18px;
    max-width: 640px;
  }
  .progress-table-wrap {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: auto;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
    max-height: calc(100vh - 220px);
  }
  .progress-table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    font-size: 13px;
  }
  .progress-table th,
  .progress-table td {
    padding: 0;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: white;
    text-align: center;
    vertical-align: middle;
    white-space: nowrap;
  }
  .progress-table thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--bg-2);
    color: var(--ink-mid);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 10px 8px;
  }
  .progress-table thead .prog-project-th {
    border-bottom: 1px solid var(--border-strong);
    color: var(--paper-ink);
    font-size: 11px;
    letter-spacing: 1px;
  }
  .progress-table thead .prog-bench-th {
    font-weight: 600;
    color: var(--ink-mid);
    padding: 8px 6px;
    min-width: 56px;
  }
  .progress-table .prog-name-cell {
    position: sticky;
    left: 0;
    z-index: 1;
    background: white;
    text-align: left;
    padding: 10px 16px;
    font-weight: 600;
    color: var(--paper-ink);
    min-width: 180px;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    border-right: 1px solid var(--border-strong);
  }
  .progress-table thead .prog-name-cell {
    z-index: 3;
    background: var(--bg-2);
    color: var(--ink-mid);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.8px;
  }
  .progress-table tbody tr:hover .prog-name-cell { background: var(--bg-2); }
  .progress-table tbody tr:hover td { background: rgba(34, 197, 94, 0.03); }
  .progress-table tbody tr:last-child td { border-bottom: none; }
  .progress-table td:last-child,
  .progress-table th:last-child { border-right: none; }

  .prog-cell {
    width: 56px;
    height: 44px;
    padding: 0;
  }
  .prog-cell.is-done {
    background: rgba(34, 197, 94, 0.06);
  }
  .prog-check {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    text-decoration: none;
    transition: transform 0.12s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }
  .prog-check:hover {
    transform: scale(1.08);
    box-shadow: 0 2px 8px rgba(34, 197, 94, 0.35);
  }
  .prog-check svg { width: 14px; height: 14px; display: block; }
  .prog-empty {
    text-align: center;
    color: var(--ink-low);
    padding: 28px 16px;
    font-size: 13px;
    background: white;
  }
  .prog-empty-cell::before {
    content: '·';
    color: var(--border-strong);
    font-size: 14px;
  }

  @media (max-width: 720px) {
    .progress-table { font-size: 12px; }
    .progress-table .prog-name-cell { min-width: 130px; padding: 10px 10px; }
    .prog-cell { width: 44px; height: 38px; }
    .prog-check { width: 24px; height: 24px; }
    .prog-check svg { width: 12px; height: 12px; }
  }

  /* Instructable submission panel — single link field, slim like checkpoint */
  .instructable-panel .inst-link-input {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 11px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--paper-ink);
    background: var(--bg-1);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .instructable-panel .inst-link-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* ============== HOMEWORK page ============== */
  .week-row {
    /* uses .benchmark styles for consistency; only overrides where needed */
  }
  .week-row .checkbox { display: none; } /* homework rows have no checkbox */
  .step-section {
    margin-bottom: 28px;
  }
  .step-section h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-ink);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-num {
    display: inline-flex;
    width: 24px;
    height: 24px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(59, 130, 246, 0.25);
  }
  .step-section p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--paper-ink);
    margin: 0 0 14px;
  }
  .tinkercad-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 9px 16px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .tinkercad-btn:hover { background: var(--accent-hover); }
  .tinkercad-btn:active { transform: translateY(1px); }
  .tinkercad-btn .arrow { font-size: 12px; }

  /* Homework modal: two-column layout (Step 1 left, Step 2 right, no outer scroll) */
  .modal-body.is-hw {
    overflow: hidden;
    padding: 24px 30px 30px;
  }
  .hw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    height: 100%;
    align-items: stretch;
  }
  .hw-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .hw-col .step-section { margin-bottom: 0; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .hw-col .video-wrap { flex-shrink: 0; }
  .hw-step2-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding-right: 4px;
    margin-right: -4px;
  }
  .hw-col .gallery-grid {
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  }

  @media (max-width: 720px) {
    .hw-grid { grid-template-columns: 1fr; height: auto; gap: 20px; }
    .modal-body.is-hw { overflow-y: auto; padding: 20px 22px 32px; }
    .hw-col .step-section { flex: 0 0 auto; }
    .hw-step2-scroll { overflow: visible; padding-right: 0; margin-right: 0; }
  }

  /* ============== ARTIFACT COUNT BADGE (on benchmark row) ============== */
  .artifact-count {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(59, 130, 246, 0.25);
    font-variant-numeric: tabular-nums;
  }
  .artifact-count svg { width: 12px; height: 12px; }

  /* ============== GALLERY (inside modal) ============== */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .gallery-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.15s ease;
  }
  .gallery-tile:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
  }
  .gallery-tile img,
  .gallery-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-tile .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    pointer-events: none;
  }
  .gallery-tile .tile-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 8px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0));
    color: white;
    font-size: 10px;
    line-height: 1.25;
  }
  .gallery-tile .tile-caption .tile-name {
    font-weight: 700;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gallery-tile .tile-caption .tile-desc {
    display: none;
  }
  .gallery-tile .tile-delete {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  body.is-admin .gallery-tile .tile-delete { display: flex; }
  .gallery-tile .tile-delete:hover {
    background: #ef4444;
    transform: scale(1.1);
  }

  /* Add tile (dashed) */
  .add-tile {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: transparent;
    border: 1.5px dashed var(--border-strong);
    color: var(--ink-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    font-weight: 600;
    font-size: 10px;
    text-align: center;
    padding: 4px;
  }
  .add-tile:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .add-tile .plus {
    font-size: 22px;
    line-height: 1;
    font-weight: 300;
  }

  /* Upload form */
  .upload-form {
    grid-column: 1 / -1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
  }
  .upload-form label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-low);
  }
  .upload-form input[type="text"],
  .upload-form textarea {
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg-2);
    color: var(--paper-ink);
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
    resize: vertical;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .upload-form input[type="text"]:focus,
  .upload-form textarea:focus {
    border-color: var(--accent);
    background: white;
  }
  .upload-form input[type="file"] { display: none; }

  /* Smart attachment zone */
  .attach {
    position: relative;
    border: 1.5px dashed var(--border-strong);
    border-radius: 12px;
    background: var(--bg-2);
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    overflow: hidden;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .attach.is-dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: scale(1.005);
  }
  .attach.has-content {
    border-style: solid;
    background: white;
    cursor: default;
    min-height: 0;
  }
  .attach-empty {
    width: 100%;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    color: var(--ink-mid);
    text-align: center;
  }
  .attach-empty:hover { color: var(--accent); }
  .attach-empty .attach-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .attach-empty:hover .attach-icon { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.18); }
  .attach-empty .attach-icon svg { width: 18px; height: 18px; }
  .attach-empty .attach-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
  }
  .attach-empty .attach-sub {
    font-size: 12px;
    color: var(--ink-low);
  }
  .attach-link-toggle {
    margin-top: 4px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s ease;
  }
  .attach-link-toggle:hover { background: var(--accent-soft); }

  .attach-link-entry {
    display: none;
    padding: 14px;
    width: 100%;
    align-items: center;
    gap: 8px;
  }
  .attach.is-link-entry .attach-empty { display: none; }
  .attach.is-link-entry .attach-link-entry { display: flex; }
  .attach-link-entry input {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: white;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .attach-link-entry input:focus { border-color: var(--accent); }
  .attach-link-entry .icon-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    transition: all 0.15s ease;
  }
  .attach-link-entry .icon-btn:hover { border-color: var(--ink-mid); color: var(--paper-ink); }

  /* Preview card (file or link) */
  .attach-preview {
    display: none;
    padding: 12px;
    width: 100%;
    align-items: center;
    gap: 14px;
  }
  .attach.has-content .attach-preview { display: flex; }
  .attach.has-content .attach-empty,
  .attach.has-content .attach-link-entry { display: none; }
  .attach-preview .preview-thumb {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 9px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--accent);
  }
  .attach-preview .preview-thumb img,
  .attach-preview .preview-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .attach-preview .preview-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .attach-preview .preview-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-preview .preview-meta {
    font-size: 12px;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-preview .preview-remove {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .attach-preview .preview-remove:hover {
    border-color: #ef4444;
    color: #ef4444;
  }
  .attach-preview .preview-loading {
    font-size: 13px;
    color: var(--ink-mid);
    font-style: italic;
  }

  .upload-form .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    align-items: center;
  }
  .upload-form .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    padding: 10px 18px;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    transition: all 0.15s ease;
  }
  .upload-form .btn-cancel:hover { border-color: var(--border-strong); color: var(--paper-ink); }
  .upload-form .btn-submit {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .upload-form .btn-submit:hover { background: var(--accent-hover); }
  .upload-form .btn-submit:active { transform: translateY(1px); }
  .upload-form .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .upload-form .upload-status {
    font-size: 13px;
    color: var(--ink-mid);
    min-height: 18px;
  }
  .upload-form .upload-status.error { color: #ef4444; }
  /* Link tile chrome */
  .gallery-tile.link-tile .link-chip {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(0, 0, 0, 0.65);
    color: white;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 5px;
    text-transform: uppercase;
    pointer-events: none;
  }
  .gallery-tile.link-tile .link-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: linear-gradient(135deg, var(--accent-soft), white);
    color: var(--accent);
    padding: 6px;
    text-align: center;
  }
  .gallery-tile.link-tile .link-fallback .link-icon {
    font-size: 20px;
    line-height: 1;
  }
  .gallery-tile.link-tile .link-fallback .link-domain {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  .gallery-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-low);
    font-size: 14px;
    padding: 8px 0 16px;
  }

  /* ============== LIGHTBOX ============== */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0, 0, 0, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    flex-direction: column;
    gap: 16px;
  }
  .lightbox.open { display: flex; }
  .lightbox-media {
    max-width: min(1100px, 92vw);
    max-height: 78vh;
    border-radius: 12px;
    overflow: hidden;
    background: black;
  }
  .lightbox-media img,
  .lightbox-media video {
    display: block;
    max-width: 100%;
    max-height: 78vh;
    object-fit: contain;
  }
  .lightbox-meta {
    color: white;
    text-align: center;
    max-width: min(700px, 90vw);
  }
  .lightbox-meta .lb-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .lightbox-meta .lb-desc { font-size: 14px; opacity: 0.85; line-height: 1.5; }
  .lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: white;
    border: none;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .lightbox-close:hover { background: rgba(255, 255, 255, 0.22); }

  /* ============== ADMIN CONTROLS ============== */
  .admin-bar {
    display: none;
    align-items: center;
    gap: 10px;
  }
  body.is-admin .admin-bar { display: inline-flex; }
  .admin-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid rgba(59, 130, 246, 0.25);
  }
  .archive-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--ink-mid);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .archive-btn:hover {
    border-color: #ef4444;
    color: #ef4444;
  }

  /* ============== PORTFOLIO PANEL (drop + expand) ============== */
  .portfolio-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .portfolio-panel .pf-name-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .portfolio-panel .pf-name-row label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-low);
  }
  .portfolio-panel .pf-name-row input {
    font-family: inherit;
    font-size: 15px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg-2);
    color: var(--paper-ink);
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .portfolio-panel .pf-name-row input:focus {
    border-color: var(--accent);
    background: white;
  }

  .pf-slots {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .pf-slot {
    background: var(--bg-2);
    border: 1.5px dashed var(--border-strong);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    display: flex;
    flex-direction: column;
  }
  .pf-slot.is-open {
    border-style: solid;
    border-color: var(--accent);
    background: white;
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.12);
    grid-column: 1 / -1;
  }
  .pf-slot.is-filled:not(.is-open) {
    border-style: solid;
    background: white;
    border-color: var(--border);
  }
  .pf-slot:hover:not(.is-open) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .pf-slot.is-tile-dragover:not(.is-open) {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.18);
  }
  .pf-slot-tile {
    cursor: pointer;
    padding: 18px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 120px;
    text-align: center;
    color: var(--ink-mid);
    transition: color 0.15s ease;
    position: relative;
  }
  .pf-slot.is-filled .pf-slot-tile { color: var(--paper-ink); }
  .pf-slot-icon {
    font-size: 26px;
    line-height: 1;
    color: var(--accent);
  }
  .pf-slot-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .pf-slot-status {
    font-size: 11px;
    color: var(--ink-low);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .pf-slot.is-filled .pf-slot-status { color: var(--success); font-weight: 600; }
  .pf-slot-thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
  }
  .pf-slot-thumb img,
  .pf-slot-thumb video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .pf-slot-mini-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .pf-slot.is-filled:hover .pf-slot-mini-actions { opacity: 1; }
  .pf-slot-mini-actions button {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .pf-slot-mini-actions button:hover { background: #ef4444; transform: scale(1.05); }

  .pf-slot-body {
    overflow: hidden;
    transition: max-height 0.28s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.22s ease;
    max-height: 0;
    opacity: 0;
  }
  .pf-slot.is-open .pf-slot-body {
    max-height: 1200px;
    opacity: 1;
  }
  .pf-slot-body-inner {
    padding: 6px 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .pf-slot-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 8px;
  }
  .pf-slot-head .pf-slot-head-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--paper-ink);
  }
  .pf-slot-head .pf-slot-head-title .pf-slot-icon { font-size: 20px; }
  .pf-slot-collapse {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .pf-slot-collapse:hover { border-color: var(--ink-mid); color: var(--paper-ink); }

  .pf-drop {
    border: 1.5px dashed var(--border-strong);
    border-radius: 11px;
    background: var(--bg-2);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--ink-mid);
    cursor: pointer;
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    padding: 18px 14px;
    text-align: center;
  }
  .pf-drop:hover { color: var(--accent); border-color: var(--accent); }
  .pf-drop.is-dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.18);
  }
  .pf-drop .pf-drop-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }
  .pf-drop .pf-drop-icon svg { width: 18px; height: 18px; }
  .pf-drop-text { font-size: 14px; font-weight: 600; color: var(--paper-ink); }
  .pf-drop-sub { font-size: 12px; color: var(--ink-low); }

  /* ============== CHECKPOINT PANEL (benchmarks 1-4) ============== */
  .checkpoint-panel .cp-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }
  .checkpoint-panel .cp-section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--paper-ink);
    letter-spacing: 0.01em;
  }
  .checkpoint-panel .cp-reflection {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 11px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.55;
    color: var(--paper-ink);
    background: var(--bg-1);
    resize: vertical;
    min-height: 120px;
    box-sizing: border-box;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .checkpoint-panel .cp-reflection:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .checkpoint-panel .cp-reflection::placeholder {
    color: var(--ink-low);
    white-space: pre-line;
  }
  .checkpoint-panel .cp-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 11px;
    background: var(--bg-2);
  }
  .checkpoint-panel .cp-preview[hidden] { display: none; }
  .checkpoint-panel .cp-preview img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .checkpoint-panel .cp-preview-meta {
    display: flex;
    flex: 1;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  // Live count badges — SCOPED for scale.
  //
  // Old approach: two unscoped onSnapshot listeners on the full /portfolios
  // and /artifacts collections. At 200 students × ~5 submissions × 20
  // benchmarks that's 20,000+ doc reads on first paint and the listener
  // re-fires on every write.
  //
  // New approach:
  //   1. Initial load: one getCountFromServer() per benchmark (server-side
  //      aggregation, billed as 1 read each — ~30 total instead of 20,000).
  //   2. Live updates: maintain counts locally by listening only to the
  //      currently-OPEN benchmark's gallery (already done in
  //      subscribePortfolios + subscribeGallery). Other badges drift only
  //      while a different benchmark is open; refreshCountBadge() is called
  //      after every submit/delete to re-pull the affected benchmark.
  async function refreshCountBadge(benchmarkId) {
    if (!benchmarkId) return;
    const isHw = benchmarkId.startsWith('hw-');
    const colName = isHw ? 'artifacts' : 'portfolios';
    try {
      const q = query(collection(db, colName), where('benchmarkId', '==', benchmarkId));
      const agg = await getCountFromServer(q);
      updateCountBadge(benchmarkId, agg.data().count);
    } catch (err) {
      console.warn('count refresh failed for', benchmarkId, err);
    }
  }

  async function loadInitialCounts() {
    const ids = Object.keys(countEls);
    // Run in parallel; getCountFromServer is a single read each.
    await Promise.allSettled(ids.map(refreshCountBadge));
  }

  function subscribeProgress() {
    if (_progressUnsubscribe) _progressUnsubscribe();
    _progressUnsubscribe = onSnapshot(collection(db, 'portfolios'), (snap) => {
      _progressData = {};
      snap.forEach(d => {
        const data = d.data();
        const name = (data.studentName || '').trim();
        if (!name || !data.benchmarkId) return;
        if (!_progressData[name]) _progressData[name] = new Set();
        _progressData[name].add(data.benchmarkId);
      });
      renderProgressTable();
    }, (err) => {
      console.error('progress subscribe error', err);
      const tbl = document.getElementById('progressTable');
      if (tbl) tbl.innerHTML = `<tbody><tr><td class="prog-empty">Could not load progress.</td></tr></tbody>`;
    });
  }

  function toggleChecked(id, row, cb) {
    if (checked.has(id)) {
      checked.delete(id);
      row.classList.remove('done');
      cb.classList.remove('checked');
      cb.setAttribute('aria-checked', 'false');
    } else {
      checked.add(id);
      row.classList.add('done');
      cb.classList.add('checked');
      cb.setAttribute('aria-checked', 'true');
    }
    persist();
  }

  // Auto-check a benchmark after a successful submission. Idempotent —
  // re-submitting won't toggle it back off.
  function markChecked(id) {
    if (checked.has(id)) return;
    checked.add(id);
    const cb = document.querySelector(`[data-checkbox="${id}"]`);
    const row = cb ? cb.closest('.benchmark') : null;
    if (cb) {
      cb.classList.add('checked');
      cb.setAttribute('aria-checked', 'true');
    }
    if (row) row.classList.add('done');
    persist();
  }

  // ============== MODAL ==============
  const modal = document.getElementById('modal');
  const modalCard = document.getElementById('modalCard');
  const modalTitle = document.getElementById('modalTitle');
  const modalPoints = document.getElementById('modalPoints');
  const modalBody = document.getElementById('modalBody');
  const closeBtn = document.getElementById('closeBtn');

  // _focusStudent: when set, the next portfolio gallery render auto-expands the
  // row for that student name and scrolls it into view.
  let _focusStudent = null;
  function openModal(b, opts = {}) {
    _focusStudent = opts.focusStudent || null;
    currentBenchmark = b;
    modalTitle.textContent = b.title;
    modalPoints.textContent = `${b.points} pts`;
    modalPoints.style.display = '';
    modalBody.classList.remove('is-hw');
    modalBody.innerHTML = '';

    let n = 0;
    const badge = () => `<span class="step-num">${++n}</span>`;

    // Instructions
    if (b.instructions) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `<h3>${badge()}Instructions</h3><p>${escapeHtml(b.instructions)}</p>`;
      modalBody.appendChild(sec);
    }
    // Video
    if (b.videoUrl) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `
        <h3>${badge()}Helper Video</h3>
        <div class="video-wrap">
          <iframe src="${b.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      `;
      modalBody.appendChild(sec);
    }
    // Links
    if (b.links && b.links.length) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      sec.innerHTML = `<h3>${badge()}Resources</h3><div class="links">${
        b.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`).join('')
      }</div>`;
      modalBody.appendChild(sec);
    }
    // Rubric
    if (b.rubric && b.rubric.length) {
      const sec = document.createElement('div');
      sec.className = 'modal-section';
      const total = b.rubric.reduce((s, r) => s + r.points, 0);
      sec.innerHTML = `
        <h3>${badge()}Rubric · ${total} pts total</h3>
        <div class="rubric">
          ${b.rubric.map(r => `
            <div class="rubric-row">
              <div class="rubric-criterion">${r.label ? `<strong>${escapeHtml(r.label)}:</strong> ` : ''}${escapeHtml(r.text || r.criterion || '')}</div>
              <div class="rubric-points">${r.points} pts</div>
            </div>
          `).join('')}
        </div>
      `;
      modalBody.appendChild(sec);
    }

    // Submission panel — instructable (link-only), Portfolio Drop (multi-slot), or checkpoint (photo + reflection)
    const isPortfolioDrop = b.title === 'Portfolio Drop';
    const isInstructable = b.id === 'instructable';
    const portfolioSec = document.createElement('div');
    portfolioSec.className = 'modal-section';
    const submitHeading = isInstructable ? 'Drop your Instructable link'
      : isPortfolioDrop ? 'Drop your portfolio'
      : 'Submit evidence + reflection';
    portfolioSec.innerHTML = `
      <h3>${badge()}${submitHeading}</h3>
      <div id="portfolioPanelMount"></div>
    `;
    modalBody.appendChild(portfolioSec);
    const panelMount = portfolioSec.querySelector('#portfolioPanelMount');
    panelMount.appendChild(
      isInstructable ? buildInstructablePanel(b.id)
      : isPortfolioDrop ? buildPortfolioPanel(b.id)
      : buildCheckpointPanel(b.id)
    );

    // Gallery — students by name with expandable rows
    const gallerySec = document.createElement('div');
    gallerySec.className = 'modal-section';
    gallerySec.innerHTML = `
      <h3>${isPortfolioDrop ? 'Class portfolios' : 'Class submissions'}</h3>
      <div class="pf-gallery" id="pfGallery"></div>
    `;
    modalBody.appendChild(gallerySec);
    subscribePortfolios(b.id);

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    currentBenchmark = null;
    _focusStudent = null;
    if (unsubscribeGallery) { unsubscribeGallery(); unsubscribeGallery = null; }
    if (unsubscribePortfolios) { unsubscribePortfolios(); unsubscribePortfolios = null; }
    // Cancel any pending debounced renders so they don't paint into a closed modal.
    if (_galleryRenderTimer) { clearTimeout(_galleryRenderTimer); _galleryRenderTimer = null; _galleryRenderArgs = null; }
    if (_pfGalleryRenderTimer) { clearTimeout(_pfGalleryRenderTimer); _pfGalleryRenderTimer = null; _pfGalleryRenderItems = null; }
    // Clear modal body refs so a re-open animates fresh.
    const pfGrid = document.getElementById('pfGallery');
    if (pfGrid) pfGrid._pfKnownIds = null;
    // Clear archive deep-link param so closing an archive doesn't keep it sticky.
    try {
      const sp = new URLSearchParams(location.search);
      if (sp.has('archive')) {
        sp.delete('archive');
        history.replaceState(null, '', sp.toString() ? `${location.pathname}?${sp.toString()}` : location.pathname);
      }
    } catch (_) {}
  }

  function openHomeworkModal(w) {
    currentBenchmark = w;
    modalTitle.textContent = w.title;
    modalPoints.textContent = '';
    modalPoints.style.display = 'none';
    modalBody.innerHTML = '';
    modalBody.classList.add('is-hw');

    const videoBlock = w.videoUrl
      ? `<div class="video-wrap"><iframe src="${w.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`
      : `<div class="video-wrap" style="background:#fafaf7;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-low);font-size:13px;">Video placeholder for ${escapeHtml(w.title)}</div>`;

    const grid = document.createElement('div');
    grid.className = 'hw-grid';
    grid.innerHTML = `
      <div class="hw-col">
        <div class="step-section">
          <h3><span class="step-num">1</span>Step 1</h3>
          <p>Watch the video and follow along in Tinkercad.</p>
          <a href="https://www.tinkercad.com/" target="_blank" rel="noopener" class="tinkercad-btn">Open Tinkercad <span class="arrow">↗</span></a>
          ${videoBlock}
        </div>
      </div>
      <div class="hw-col">
        <div class="step-section">
          <h3><span class="step-num">2</span>Step 2</h3>
          <p>Use the skills from the video to create something purposeful. Describe its purpose and provide the public link to your design below.</p>
          <div class="hw-step2-scroll">
            <div class="gallery-grid" id="galleryGrid"></div>
          </div>
        </div>
      </div>
    `;
    modalBody.appendChild(grid);

    subscribeGallery(w.id, {
      linkOnly: true,
      descriptionPlaceholder: 'Describe the purpose of your design…'
    });

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  // ============== GALLERY ==============
  function subscribeGallery(benchmarkId, opts = {}) {
    if (unsubscribeGallery) unsubscribeGallery();
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    const q = query(
      collection(db, 'artifacts'),
      where('benchmarkId', '==', benchmarkId)
    );
    unsubscribeGallery = onSnapshot(q, (snap) => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      // newest first
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      // Update the count badge from the live snapshot for free (no extra read).
      updateCountBadge(benchmarkId, items.length);
      debouncedRenderGallery(grid, benchmarkId, items, opts);
    }, (err) => {
      console.error('gallery subscribe error', err);
      grid.innerHTML = `<div class="gallery-empty">Could not load gallery.</div>`;
    });
  }

  // Debounce gallery re-renders. When 30 students submit in 5 seconds the
  // snapshot fires 30 times; we want to coalesce to ~1 paint per ~200ms.
  let _galleryRenderTimer = null;
  let _galleryRenderArgs = null;
  function debouncedRenderGallery(...args) {
    _galleryRenderArgs = args;
    if (_galleryRenderTimer) return;
    _galleryRenderTimer = setTimeout(() => {
      _galleryRenderTimer = null;
      const a = _galleryRenderArgs;
      _galleryRenderArgs = null;
      if (a) renderGallery.apply(null, a);
    }, 200);
  }

  function renderGallery(grid, benchmarkId, items, opts = {}) {
    grid.innerHTML = '';
    items.forEach(item => {
      const tile = document.createElement('div');
      const isLink = item.type === 'link';
      const isVideo = (item.contentType || '').startsWith('video/');
      tile.className = 'gallery-tile' + (isLink ? ' link-tile' : '');

      let media;
      if (isLink) {
        media = item.linkImage
          ? `<img src="${item.linkImage}" alt="${escapeHtml(item.linkTitle || item.linkUrl)}" loading="lazy" decoding="async" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'link-fallback',innerHTML:'<div class=\\'link-icon\\'>🔗</div><div class=\\'link-domain\\'>${escapeHtml(item.linkDomain || '')}</div>'}));" />`
          : `<div class="link-fallback"><div class="link-icon">🔗</div><div class="link-domain">${escapeHtml(item.linkDomain || 'link')}</div></div>`;
      } else if (isVideo) {
        media = `<video src="${item.fileUrl}" muted preload="metadata"></video><div class="play-icon">▶</div>`;
      } else {
        media = `<img src="${item.fileUrl}" alt="${escapeHtml(item.studentName || '')}" loading="lazy" decoding="async" onerror="this.parentElement.innerHTML='<div class=&quot;pf-broken&quot;><span class=&quot;pf-broken-icon&quot;>⚠</span><span>(file unavailable)</span></div>';" />`;
      }

      tile.innerHTML = `
        ${media}
        ${isLink ? `<span class="link-chip">Link</span>` : ''}
        <div class="tile-caption">
          <span class="tile-name">${escapeHtml(item.studentName || 'Unnamed')}</span>
          <span class="tile-desc">${escapeHtml(item.description || '')}</span>
        </div>
        <button class="tile-delete" aria-label="Delete">×</button>
      `;
      tile.addEventListener('click', (e) => {
        if (e.target.closest('.tile-delete')) return;
        if (isLink) {
          window.open(item.linkUrl, '_blank', 'noopener');
        } else {
          openLightbox(item);
        }
      });
      tile.querySelector('.tile-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`Delete "${item.studentName}" submission?`)) return;
        await deleteArtifact(item);
      });
      grid.appendChild(tile);
    });
    // Add tile (always last)
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.innerHTML = `<div class="plus">+</div><div>${opts.linkOnly ? 'Submit link' : 'Add your work'}</div>`;
    addTile.addEventListener('click', () => {
      const form = buildUploadForm(benchmarkId, () => {
        // re-render handled by snapshot
      }, () => {
        renderGallery(grid, benchmarkId, items, opts);
      }, opts);
      grid.replaceChild(form, addTile);
    });
    grid.appendChild(addTile);
  }

  function buildUploadForm(benchmarkId, onSuccess, onCancel, opts = {}) {
    const linkOnly = !!opts.linkOnly;
    const descPlaceholder = opts.descriptionPlaceholder || 'What is this and what should we look at?';
    const form = document.createElement('div');
    form.className = 'upload-form';
    const savedName = localStorage.getItem(NAME_KEY) || '';
    const UPLOAD_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0l-5 5m5-5l5 5M4 20h16"/></svg>';
    const LINK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.5-1.5"/></svg>';

    const fileBlock = linkOnly ? '' : `
      <div class="attach-empty" data-attach-empty>
        <div class="attach-icon">${UPLOAD_ICON}</div>
        <div class="attach-text">Drop a file or click to upload</div>
        <div class="attach-sub">Image or video, up to 50MB</div>
        <button type="button" class="attach-link-toggle" data-link-toggle>${LINK_ICON} Or paste a link</button>
      </div>
      <input type="file" data-file accept="image/*,video/*" />
    `;

    form.innerHTML = `
      <label>Your name<input type="text" data-name maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" /></label>
      <label>Brief description<textarea data-desc rows="2" maxlength="500" placeholder="${escapeHtml(descPlaceholder)}"></textarea></label>

      <div class="attach ${linkOnly ? 'is-link-entry' : ''}" data-attach>
        ${fileBlock}
        <div class="attach-link-entry">
          <input type="url" data-link-input placeholder="${linkOnly ? 'Paste your link' : 'Paste a URL'}" />
          ${linkOnly ? '' : '<button type="button" class="icon-btn" data-link-cancel aria-label="Cancel">×</button>'}
        </div>
        <div class="attach-preview" data-preview></div>
      </div>

      <div class="upload-status" data-status></div>
      <div class="actions">
        <button class="btn-cancel" data-cancel type="button">Cancel</button>
        <button class="btn-submit" data-submit type="button">Submit</button>
      </div>
    `;

    const nameInput = form.querySelector('[data-name]');
    const descInput = form.querySelector('[data-desc]');
    const statusEl = form.querySelector('[data-status]');
    const submitBtn = form.querySelector('[data-submit]');
    const attach = form.querySelector('[data-attach]');
    const attachEmpty = form.querySelector('[data-attach-empty]');
    const fileInput = form.querySelector('[data-file]');
    const linkToggle = form.querySelector('[data-link-toggle]');
    const linkInput = form.querySelector('[data-link-input]');
    const linkCancel = form.querySelector('[data-link-cancel]');
    const previewEl = form.querySelector('[data-preview]');

    // Attachment state
    let attachedFile = null;
    let attachedLink = null; // { url, preview }

    function setErr(msg) {
      statusEl.classList.add('error');
      statusEl.textContent = msg;
    }
    function clearStatus() {
      statusEl.classList.remove('error');
      statusEl.textContent = '';
    }

    function clearAttachment() {
      attachedFile = null;
      attachedLink = null;
      attach.classList.remove('has-content', 'is-link-entry');
      previewEl.innerHTML = '';
      fileInput.value = '';
      linkInput.value = '';
      clearStatus();
    }

    function attachFile(file) {
      if (!file.type.match(/^(image|video)\//)) { setErr('File must be an image or video.'); return; }
      if (file.size > 50 * 1024 * 1024) { setErr('File too large (50MB max).'); return; }
      attachedFile = file;
      attachedLink = null;
      const isVideo = file.type.startsWith('video/');
      const sizeKb = file.size / 1024;
      const sizeStr = sizeKb < 1024 ? `${Math.round(sizeKb)} KB` : `${(sizeKb / 1024).toFixed(1)} MB`;
      const objectUrl = URL.createObjectURL(file);
      previewEl.innerHTML = `
        <div class="preview-thumb">${isVideo ? `<video src="${objectUrl}" muted></video>` : `<img src="${objectUrl}" alt="preview" />`}</div>
        <div class="preview-info">
          <div class="preview-title">${escapeHtml(file.name)}</div>
          <div class="preview-meta">${sizeStr} · ${isVideo ? 'Video' : 'Image'}</div>
        </div>
        <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
      `;
      attach.classList.add('has-content');
      attach.classList.remove('is-link-entry');
      previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      clearStatus();
    }

    async function attachLink(url) {
      if (!/^https?:\/\//i.test(url)) { setErr('Link must start with http:// or https://'); return; }
      attachedFile = null;
      attachedLink = { url, preview: null };
      attach.classList.add('has-content');
      attach.classList.remove('is-link-entry');
      // loading state
      previewEl.innerHTML = `
        <div class="preview-thumb">${LINK_ICON_BIG}</div>
        <div class="preview-info">
          <div class="preview-title">${escapeHtml(url)}</div>
          <div class="preview-meta preview-loading">Pulling preview…</div>
        </div>
        <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
      `;
      previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      clearStatus();
      try {
        const preview = await fetchLinkPreview(url);
        if (attachedLink?.url !== url) return; // user changed it
        attachedLink.preview = preview;
        const thumb = preview.image
          ? `<img src="${preview.image}" alt="preview" onerror="this.parentElement.innerHTML='${LINK_ICON_BIG.replace(/'/g, "\\'")}';" />`
          : LINK_ICON_BIG;
        previewEl.innerHTML = `
          <div class="preview-thumb">${thumb}</div>
          <div class="preview-info">
            <div class="preview-title">${escapeHtml(preview.title || preview.domain || url)}</div>
            <div class="preview-meta">${escapeHtml(preview.domain || url)}</div>
          </div>
          <button type="button" class="preview-remove" data-preview-remove aria-label="Remove">×</button>
        `;
        previewEl.querySelector('[data-preview-remove]').addEventListener('click', clearAttachment);
      } catch (err) {
        // keep the basic preview but mark as failed
        const meta = previewEl.querySelector('.preview-meta');
        if (meta) meta.textContent = 'Could not pull preview · still submittable';
      }
    }

    const LINK_ICON_BIG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.5-1.5"/></svg>';

    if (!linkOnly) {
      // Click empty zone → file picker
      attachEmpty.addEventListener('click', (e) => {
        if (e.target.closest('[data-link-toggle]')) return;
        fileInput.click();
      });
      fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) attachFile(fileInput.files[0]);
      });

      // Drag & drop on the attach zone (file or URL)
      ['dragenter', 'dragover'].forEach(ev => attach.addEventListener(ev, (e) => {
        e.preventDefault();
        attach.classList.add('is-dragover');
      }));
      ['dragleave', 'drop'].forEach(ev => attach.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== attach) return;
        attach.classList.remove('is-dragover');
      }));
      attach.addEventListener('drop', (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files && files.length) { attachFile(files[0]); return; }
        const url = (e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '').trim();
        if (url) attachLink(url);
      });

      // Link toggle: reveal URL entry
      linkToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        attach.classList.add('is-link-entry');
        setTimeout(() => linkInput.focus(), 50);
      });
      linkCancel.addEventListener('click', () => {
        attach.classList.remove('is-link-entry');
        linkInput.value = '';
      });
    } else {
      // linkOnly: drop URL anywhere on the attach zone is still useful
      ['dragenter', 'dragover'].forEach(ev => attach.addEventListener(ev, (e) => {
        e.preventDefault();
        attach.classList.add('is-dragover');
      }));
      ['dragleave', 'drop'].forEach(ev => attach.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== attach) return;
        attach.classList.remove('is-dragover');
      }));
      attach.addEventListener('drop', (e) => {
        e.preventDefault();
        const url = (e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '').trim();
        if (url) attachLink(url);
      });
      // Auto-focus the link input when form opens
      setTimeout(() => linkInput.focus(), 50);
    }
    linkInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const v = linkInput.value.trim();
        if (v) attachLink(v);
      } else if (e.key === 'Escape') {
        linkCancel.click();
      }
    });
    // Paste a URL into the link input → auto-attach
    linkInput.addEventListener('paste', (e) => {
      const t = (e.clipboardData?.getData('text/plain') || '').trim();
      if (/^https?:\/\//i.test(t)) {
        e.preventDefault();
        linkInput.value = t;
        attachLink(t);
      }
    });
    // Paste a URL anywhere else on the form (not in name/desc inputs) → auto-attach
    form.addEventListener('paste', (e) => {
      if (e.target === nameInput || e.target === descInput || e.target === linkInput) return;
      const t = (e.clipboardData?.getData('text/plain') || '').trim();
      if (/^https?:\/\//i.test(t)) {
        e.preventDefault();
        attachLink(t);
      }
    });

    form.querySelector('[data-cancel]').addEventListener('click', onCancel);
    submitBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const desc = descInput.value.trim();
      if (!name) { setErr('Please enter your name.'); return; }
      if (!attachedFile && !attachedLink) { setErr(linkOnly ? 'Paste a link to your design.' : 'Drop a file or paste a link.'); return; }
      submitBtn.disabled = true;
      clearStatus();
      localStorage.setItem(NAME_KEY, name);
      try {
        if (attachedFile) {
          statusEl.textContent = 'Uploading…';
          await uploadArtifact({ benchmarkId, name, desc, file: attachedFile, onProgress: (pct) => {
            statusEl.textContent = `Uploading… ${pct}%`;
          }});
        } else {
          statusEl.textContent = 'Saving…';
          const preview = attachedLink.preview || await fetchLinkPreview(attachedLink.url);
          await addLinkArtifact({ benchmarkId, name, desc, link: attachedLink.url, preview });
        }
        statusEl.textContent = 'Done.';
        onSuccess();
      } catch (err) {
        console.error(err);
        setErr(err.message || 'Submit failed. Try again.');
        submitBtn.disabled = false;
      }
    });

    return form;
  }

  async function fetchLinkPreview(url) {
    try {
      const r = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error('preview');
      return await r.json();
    } catch (err) {
      // Graceful degradation — submit the link with no preview metadata
      let domain = '';
      try { domain = new URL(url).hostname.replace(/^www\./, ''); } catch (_) {}
      return { url, title: '', description: '', image: '', domain };
    }
  }

  async function addLinkArtifact({ benchmarkId, name, desc, link, preview }) {
    await addDoc(collection(db, 'artifacts'), {
      benchmarkId,
      studentName: name,
      description: desc,
      type: 'link',
      linkUrl: link,
      linkTitle: preview?.title || '',
      linkDescription: preview?.description || '',
      linkImage: preview?.image || '',
      linkDomain: preview?.domain || '',
      createdAt: serverTimestamp()
    });
  }

  function uploadArtifact({ benchmarkId, name, desc, file, onProgress }) {
    return new Promise((resolve, reject) => {
      const ext = (file.name.match(/\.[a-z0-9]+$/i) || [''])[0];
      const path = `artifacts/${benchmarkId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}${ext}`;
      const ref = storageRef(storage, path);
      const task = uploadBytesResumable(ref, file, { contentType: file.type });
      task.on('state_changed',
        (snap) => onProgress?.(Math.round(snap.bytesTransferred / snap.totalBytes * 100)),
        reject,
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            await addDoc(collection(db, 'artifacts'), {
              benchmarkId,
              studentName: name,
              description: desc,
              fileUrl: url,
              filePath: path,
              contentType: file.type,
              createdAt: serverTimestamp()
            });
            resolve();
          } catch (e) { reject(e); }
        }
      );
    });
  }

  async function deleteArtifact(item) {
    try {
      if (item.filePath) {
        try { await deleteObject(storageRef(storage, item.filePath)); } catch (e) { /* file may already be gone */ }
      }
      await deleteDoc(doc(db, 'artifacts', item.id));
      // Open-snapshot listener will update the count for this benchmark live;
      // belt-and-braces refresh the badge in case nothing else closes the loop.
      if (item.benchmarkId) refreshCountBadge(item.benchmarkId);
    } catch (err) {
      console.error('delete failed', err);
      alert('Could not delete. Try again.');
    }
  }

  // ============== PORTFOLIO SYSTEM ==============
  const SLOT_DEFS = [
    { key: 'image',   label: 'Image',   icon: ICON_IMAGE,   accept: 'image/jpeg,image/png',                                          exts: 'JPG, PNG',  fileTypes: 'image', allowFile: true,  allowLink: false },
    { key: 'video',   label: 'Video',   icon: ICON_VIDEO,   accept: 'video/mp4',                                                     exts: 'MP4',       fileTypes: 'video', allowFile: true,  allowLink: true  },
    { key: 'cad',     label: 'CAD',     icon: ICON_CAD,     accept: '.stl,model/stl,application/sla,application/vnd.ms-pki.stl',    exts: 'STL',       fileTypes: 'cad',   allowFile: true,  allowLink: false },
    { key: 'code',    label: 'Code',    icon: ICON_CODE,    accept: '',                                                              exts: 'Link only', fileTypes: 'link', allowFile: false, allowLink: true  },
    { key: 'summary', label: 'Summary', icon: ICON_SUMMARY, accept: '',                                                              exts: 'Text only', fileTypes: 'text', allowFile: false, allowLink: false }
  ];
  const SUMMARY_MAX = 1500;
  const PORTFOLIO_MAX_FILE = 100 * 1024 * 1024; // 100MB

  function isStlFile(file) {
    if (!file) return false;
    if (/\.stl$/i.test(file.name || '')) return true;
    const ct = (file.type || '').toLowerCase();
    return ct === 'model/stl' || ct === 'application/sla' || ct === 'application/vnd.ms-pki.stl';
  }

  function isAcceptedForSlot(slotKey, file) {
    if (!file) return false;
    if (file.size > PORTFOLIO_MAX_FILE) return false;
    const ct = (file.type || '').toLowerCase();
    if (slotKey === 'image') {
      return ct === 'image/jpeg' || ct === 'image/png';
    }
    if (slotKey === 'video') {
      return ct === 'video/mp4';
    }
    if (slotKey === 'cad') {
      return isStlFile(file);
    }
    return false; // code is link-only, summary is text-only
  }

  function shortBytes(n) {
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${Math.round(n / 1024)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch (_) { return ''; }
  }

  function thumbnailFor(slotData) {
    if (!slotData) return '';
    if (slotData.mode === 'text') return ICON_SUMMARY;
    if (slotData.mode === 'link') return ICON_LINK;
    const ct = (slotData.contentType || '').toLowerCase();
    if (ct.startsWith('image/')) return `<img src="${slotData.url}" alt="" loading="lazy" />`;
    if (ct.startsWith('video/')) return `<video src="${slotData.url}" muted preload="metadata"></video>`;
    return ICON_DOC;
  }

  function buildPortfolioPanel(benchmarkId) {
    const panel = document.createElement('div');
    panel.className = 'portfolio-panel';

    const savedName = localStorage.getItem(NAME_KEY) || '';
    panel.innerHTML = `
      <div class="pf-name-row">
        <label for="pfNameInput">Your name</label>
        <input id="pfNameInput" type="text" maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" />
      </div>
      <div class="pf-slots" data-pf-slots></div>
      <div class="pf-actions">
        <div class="pf-status" data-pf-status></div>
        <button class="pf-submit" data-pf-submit type="button" disabled>Submit Portfolio</button>
      </div>
    `;

    const nameInput = panel.querySelector('#pfNameInput');
    const slotsEl = panel.querySelector('[data-pf-slots]');
    const submitBtn = panel.querySelector('[data-pf-submit]');
    const statusEl = panel.querySelector('[data-pf-status]');

    // In-memory slot state: { image: {...}, video: {...}, ... } or null
    const state = { image: null, video: null, code: null, cad: null, summary: null };
    // Pending file objects, before submit (so we can upload at submit time)
    const pendingFiles = {}; // { slotKey: File }
    let openSlotKey = null;

    SLOT_DEFS.forEach(def => {
      const slot = document.createElement('div');
      slot.className = 'pf-slot';
      slot.dataset.slot = def.key;
      slot.innerHTML = `
        <div class="pf-slot-tile" data-pf-tile>
          <div class="pf-slot-icon">${def.icon}</div>
          <div class="pf-slot-label">${def.label}</div>
          <div class="pf-slot-status">+ Add</div>
          <div class="pf-slot-mini-actions">
            <button type="button" data-pf-mini-edit aria-label="Edit">✎</button>
            <button type="button" data-pf-mini-remove aria-label="Remove">×</button>
          </div>
        </div>
        <div class="pf-slot-body">
          <div class="pf-slot-head">
            <div class="pf-slot-head-title">
              <span class="pf-slot-icon">${def.icon}</span>
              ${def.label}
            </div>
            <button type="button" class="pf-slot-collapse" data-pf-collapse aria-label="Collapse">×</button>
          </div>
          <div class="pf-slot-body-inner" data-pf-body-inner></div>
        </div>
      `;
      slotsEl.appendChild(slot);

      const tile = slot.querySelector('[data-pf-tile]');
      const collapseBtn = slot.querySelector('[data-pf-collapse]');
      const bodyInner = slot.querySelector('[data-pf-body-inner]');

      tile.addEventListener('click', (e) => {
        if (e.target.closest('[data-pf-mini-remove]')) {
          e.stopPropagation();
          clearSlot(def.key);
          return;
        }
        if (e.target.closest('[data-pf-mini-edit]')) {
          e.stopPropagation();
        }
        openSlot(def.key);
      });
      // Keyboard support: Enter / Space on tile opens slot
      tile.setAttribute('tabindex', '0');
      tile.setAttribute('role', 'button');
      tile.setAttribute('aria-label', `${def.label} slot`);
      tile.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          if (e.target.closest('[data-pf-mini-remove], [data-pf-mini-edit]')) return;
          e.preventDefault();
          openSlot(def.key);
        }
      });
      // Drag-over feedback on the slot tile itself (when collapsed) — only
      // for slots that actually accept files.
      if (def.allowFile) {
        ['dragenter', 'dragover'].forEach(ev => slot.addEventListener(ev, (e) => {
          if (slot.classList.contains('is-open')) return;
          if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
          e.preventDefault();
          slot.classList.add('is-tile-dragover');
        }));
        ['dragleave', 'drop'].forEach(ev => slot.addEventListener(ev, (e) => {
          if (ev === 'dragleave' && slot.contains(e.relatedTarget)) return;
          slot.classList.remove('is-tile-dragover');
        }));
        slot.addEventListener('drop', (e) => {
          if (slot.classList.contains('is-open')) return;
          const files = e.dataTransfer?.files;
          if (!files || !files.length) return;
          e.preventDefault();
          openSlot(def.key);
          handleFileForSlot(def, files[0]);
        });
      }
      collapseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeOpenSlot();
      });

      function renderBody() {
        if (def.fileTypes === 'text') {
          const existingText = state.summary?.text || '';
          bodyInner.innerHTML = `
            <textarea class="pf-summary-box" data-pf-text rows="6" maxlength="${SUMMARY_MAX}" placeholder="4–5 sentences reflecting on your prototyping process: what you created, problems you encountered, how you overcame them, and new things you learned.">${escapeHtml(existingText)}</textarea>
            <div class="pf-char-count" data-pf-char>${existingText.length} / ${SUMMARY_MAX}</div>
          `;
          const txt = bodyInner.querySelector('[data-pf-text]');
          const counter = bodyInner.querySelector('[data-pf-char]');
          const updateCount = () => {
            const len = txt.value.length;
            counter.textContent = `${len} / ${SUMMARY_MAX}`;
            counter.classList.toggle('is-warn', len > SUMMARY_MAX * 0.85 && len <= SUMMARY_MAX);
            counter.classList.toggle('is-over', len > SUMMARY_MAX);
          };
          txt.addEventListener('input', () => {
            updateCount();
            const v = txt.value.trim();
            state.summary = v ? { mode: 'text', text: v.slice(0, SUMMARY_MAX) } : null;
            refreshTile(def.key);
            refreshSubmit();
          });
          updateCount();
          setTimeout(() => txt.focus(), 50);
          return;
        }

        // File slot UI
        const filled = state[def.key];
        let previewHtml = '';
        if (filled) {
          let thumb = '';
          if (filled.mode === 'link') {
            thumb = ICON_LINK;
          } else if ((filled.contentType || '').startsWith('image/')) {
            thumb = `<img src="${filled.url}" alt="" />`;
          } else if ((filled.contentType || '').startsWith('video/')) {
            thumb = `<video src="${filled.url}" muted></video>`;
          } else {
            thumb = ICON_DOC;
          }
          const title = filled.mode === 'link'
            ? (filled.url || 'Link')
            : (filled.fileName || 'File');
          const meta = filled.mode === 'link'
            ? (getDomain(filled.url) || 'External link')
            : (filled.contentType || '');
          previewHtml = `
            <div class="pf-filled-preview">
              <div class="pf-fp-thumb">${thumb}</div>
              <div class="pf-fp-info">
                <div class="pf-fp-title">${escapeHtml(title)}</div>
                <div class="pf-fp-meta">${escapeHtml(meta)}</div>
              </div>
              <button type="button" class="pf-fp-remove" data-pf-clear aria-label="Remove">×</button>
            </div>
          `;
        }

        const dropHtml = def.allowFile ? `
          <div class="pf-drop" data-pf-drop>
            <div class="pf-drop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0l-5 5m5-5l5 5M4 20h16"/></svg></div>
            <div class="pf-drop-text">Drop a file or click to upload</div>
            <div class="pf-drop-sub">${def.exts} · up to 100MB</div>
            <input type="file" data-pf-file accept="${def.accept}" style="display:none;" />
          </div>
        ` : '';
        const linkHtml = def.allowLink ? `
          <div class="pf-link-row">
            <span class="pf-link-label">${def.allowFile ? 'Or link' : 'Public URL'}</span>
            <span class="pf-link-input-wrap">
              <input type="url" data-pf-link placeholder="https://…" value="${filled?.mode === 'link' ? escapeHtml(filled.url) : ''}" />
