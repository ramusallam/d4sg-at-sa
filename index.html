            const ext = (file.name.match(/\.[a-z0-9]+$/i) || [''])[0];
            const path = `portfolios/${benchmarkId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${def.key}${ext}`;
            const ref = storageRef(storage, path);
            const ct = file.type || (isStlFile(file) ? 'model/stl' : 'application/octet-stream');
            const task = uploadBytesResumable(ref, file, { contentType: ct });
            await new Promise((resolve, reject) => {
              task.on('state_changed',
                (snap) => {
                  const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
                  setStatus(`Uploading ${def.label}… ${pct}%`);
                },
                reject,
                resolve
              );
            });
            const url = await getDownloadURL(task.snapshot.ref);
            uploadedPaths.push(path);
            finalSlots[def.key] = {
              mode: 'file',
              url,
              fileName: file.name,
              contentType: ct,
              filePath: path
            };
          } catch (perSlotErr) {
            console.error(`upload failed for ${def.key}`, perSlotErr);
            failedSlots.push(def);
            // Leave state[def.key] intact so the student can retry without
            // re-attaching the file.
          }
        }

        const anySucceeded = Object.values(finalSlots).some(v => v !== null);
        if (failedSlots.length && !anySucceeded) {
          // Total failure — surface a retry prompt and bail without writing.
          throw new Error(
            `Upload failed for ${failedSlots.map(d => d.label).join(', ')}. Check your wifi and try again.`
          );
        }

        await addDoc(collection(db, 'portfolios'), {
          benchmarkId,
          studentName: name,
          createdAt: serverTimestamp(),
          slots: finalSlots
        });

        // Reset state ONLY for slots that successfully uploaded. Keep failed
        // slots in state so the student can retry them.
        for (const def of SLOT_DEFS) {
          if (failedSlots.find(f => f.key === def.key)) continue; // preserve
          const cur = state[def.key];
          if (cur?._localPreview && cur.url) {
            try { URL.revokeObjectURL(cur.url); } catch (_) {}
          }
          state[def.key] = null;
          delete pendingFiles[def.key];
          refreshTile(def.key);
        }
        if (openSlotKey && !failedSlots.find(f => f.key === openSlotKey)) {
          const prev = slotsEl.querySelector(`.pf-slot[data-slot="${openSlotKey}"]`);
          if (prev) prev.classList.remove('is-open');
          openSlotKey = null;
        }

        // Refresh the count badge for this benchmark in case the snapshot
        // hasn't propagated yet (it usually has, but this is belt-and-braces).
        refreshCountBadge(benchmarkId);
        if (!failedSlots.length) markChecked(benchmarkId);

        // Success pulse: green flash on the button, status briefly, then clear.
        submitBtn.textContent = failedSlots.length ? 'Submit failed slots' : '✓ Submitted!';
        if (!failedSlots.length) submitBtn.classList.add('is-success');
        if (failedSlots.length) {
          setStatus(`Saved ${SLOT_DEFS.length - failedSlots.length} slot(s). ${failedSlots.map(d => d.label).join(', ')} failed — retry?`, true);
        } else {
          setStatus('Your portfolio is in the gallery below.');
        }
        setTimeout(() => {
          submitBtn.classList.remove('is-success');
          submitBtn.textContent = 'Submit Portfolio';
          if (!failedSlots.length) setStatus('');
          _isSubmitting = false;
          refreshSubmit();
        }, 1800);
      } catch (err) {
        console.error('portfolio submit failed', err);
        submitBtn.textContent = 'Submit Portfolio';
        const msg = err?.code === 'unavailable' || /network|offline/i.test(err?.message || '')
          ? 'Connection failed. Check wifi and retry.'
          : (err.message || 'Submit failed. Try again.');
        setStatus(msg, true);
        submitBtn.disabled = false;
        _isSubmitting = false;
      }
    }
    submitBtn.addEventListener('click', doSubmit);
    // Prevent stray Enter-key resubmits from inside the panel.
    panel.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (e.target.tagName === 'TEXTAREA') return; // newline allowed in summary
      if (e.target === submitBtn) {
        e.preventDefault();
        doSubmit();
      }
    });

    refreshSubmit();
    return panel;
  }

  // ----- Checkpoint panel (benchmarks 1-4): photo + 3-sentence reflection -----
  // Writes to the same `portfolios` collection as the full Portfolio Drop, with
  // only the `image` and `summary` slots filled — so the existing gallery
  // renders checkpoint submissions with no extra code path.
  function buildCheckpointPanel(benchmarkId) {
    const panel = document.createElement('div');
    panel.className = 'portfolio-panel checkpoint-panel';

    const savedName = localStorage.getItem(NAME_KEY) || '';
    panel.innerHTML = `
      <div class="pf-name-row">
        <label for="cpNameInput">Your name</label>
        <input id="cpNameInput" type="text" maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" />
      </div>
      <div class="cp-section">
        <div class="cp-section-label">Photo of your work</div>
        <div class="pf-drop" data-cp-drop>
          <div class="pf-drop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0l-5 5m5-5l5 5M4 20h16"/></svg></div>
          <div class="pf-drop-text">Drop a photo or click to upload</div>
          <div class="pf-drop-sub">JPG, PNG · up to 100MB</div>
          <input type="file" data-cp-file accept="image/jpeg,image/png" style="display:none;" />
        </div>
        <div class="cp-preview" data-cp-preview hidden></div>
      </div>
      <div class="cp-section">
        <div class="cp-section-label">Reflection</div>
        <textarea class="cp-reflection" data-cp-text rows="6" maxlength="1500"
          placeholder="1. Summarize what you made.&#10;2. Describe any problems you ran into and how you worked through them.&#10;3. List at least three new things you learned."></textarea>
      </div>
      <div class="pf-actions">
        <div class="pf-status" data-cp-status></div>
        <button class="pf-submit" data-cp-submit type="button" disabled>Submit</button>
      </div>
    `;

    const nameInput = panel.querySelector('#cpNameInput');
    const drop = panel.querySelector('[data-cp-drop]');
    const fileInput = panel.querySelector('[data-cp-file]');
    const preview = panel.querySelector('[data-cp-preview]');
    const textarea = panel.querySelector('[data-cp-text]');
    const submitBtn = panel.querySelector('[data-cp-submit]');
    const statusEl = panel.querySelector('[data-cp-status]');

    let pendingFile = null;
    let previewUrl = null;

    function setStatus(msg, isError) {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('is-error', !!isError);
    }
    function refreshSubmit() {
      const ok = !!(nameInput.value.trim() && pendingFile && textarea.value.trim());
      submitBtn.disabled = !ok;
    }
    function clearPhoto() {
      pendingFile = null;
      if (previewUrl) { try { URL.revokeObjectURL(previewUrl); } catch (_) {} }
      previewUrl = null;
      preview.innerHTML = '';
      preview.hidden = true;
      drop.style.display = '';
      fileInput.value = '';
      refreshSubmit();
    }
    function showPreview(file) {
      if (previewUrl) { try { URL.revokeObjectURL(previewUrl); } catch (_) {} }
      previewUrl = URL.createObjectURL(file);
      preview.innerHTML = `
        <img src="${previewUrl}" alt="" />
        <div class="cp-preview-meta">
          <div class="cp-preview-name">${escapeHtml(file.name)}</div>
          <button type="button" class="cp-preview-remove" data-cp-remove aria-label="Remove">×</button>
        </div>
      `;
      preview.hidden = false;
      drop.style.display = 'none';
      preview.querySelector('[data-cp-remove]').addEventListener('click', clearPhoto);
    }
    function handleFile(file) {
      if (!file) return;
      const ct = (file.type || '').toLowerCase();
      if (ct !== 'image/jpeg' && ct !== 'image/png') {
        setStatus('Photo must be JPG or PNG.', true);
        return;
      }
      if (file.size > PORTFOLIO_MAX_FILE) {
        setStatus('File too large (100MB max).', true);
        return;
      }
      setStatus('');
      pendingFile = file;
      showPreview(file);
      refreshSubmit();
    }

    drop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleFile(fileInput.files?.[0]));
    ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, (e) => {
      if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
      e.preventDefault();
      drop.classList.add('is-dragover');
    }));
    ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, () => {
      drop.classList.remove('is-dragover');
    }));
    drop.addEventListener('drop', (e) => {
      const files = e.dataTransfer?.files;
      if (!files || !files.length) return;
      e.preventDefault();
      handleFile(files[0]);
    });

    nameInput.addEventListener('input', refreshSubmit);
    textarea.addEventListener('input', refreshSubmit);

    let isSubmitting = false;
    submitBtn.addEventListener('click', async () => {
      if (isSubmitting) return;
      const name = nameInput.value.trim();
      const text = textarea.value.trim();
      if (!name || !pendingFile || !text) return;
      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      setStatus('Uploading…');
      localStorage.setItem(NAME_KEY, name);

      try {
        const ext = (pendingFile.name.match(/\.[a-z0-9]+$/i) || [''])[0];
        const path = `portfolios/${benchmarkId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}-image${ext}`;
        const ref = storageRef(storage, path);
        const ct = pendingFile.type || 'image/jpeg';
        const task = uploadBytesResumable(ref, pendingFile, { contentType: ct });
        await new Promise((resolve, reject) => {
          task.on('state_changed',
            (snap) => {
              const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
              setStatus(`Uploading… ${pct}%`);
            },
            reject,
            resolve
          );
        });
        const url = await getDownloadURL(task.snapshot.ref);

        await addDoc(collection(db, 'portfolios'), {
          benchmarkId,
          studentName: name,
          createdAt: serverTimestamp(),
          slots: {
            image: { mode: 'file', url, fileName: pendingFile.name, contentType: ct, filePath: path },
            video: null,
            code: null,
            cad: null,
            summary: { mode: 'text', text: text.slice(0, 1500) }
          }
        });

        clearPhoto();
        textarea.value = '';
        refreshCountBadge(benchmarkId);
        markChecked(benchmarkId);

        submitBtn.textContent = '✓ Submitted!';
        submitBtn.classList.add('is-success');
        setStatus('Your submission is in the gallery below.');
        setTimeout(() => {
          submitBtn.classList.remove('is-success');
          submitBtn.textContent = 'Submit';
          setStatus('');
          isSubmitting = false;
          refreshSubmit();
        }, 1800);
      } catch (err) {
        console.error('checkpoint submit failed', err);
        setStatus('Submit failed. Check your wifi and try again.', true);
        submitBtn.textContent = 'Submit';
        isSubmitting = false;
        refreshSubmit();
      }
    });

    return panel;
  }

  // ----- Instructable panel — link-only submission -----
  // Stores the URL under slot.code so the existing gallery renders it as a
  // clickable link chip without any extra render path.
  function buildInstructablePanel(benchmarkId) {
    const panel = document.createElement('div');
    panel.className = 'portfolio-panel checkpoint-panel instructable-panel';

    const savedName = localStorage.getItem(NAME_KEY) || '';
    panel.innerHTML = `
      <div class="pf-name-row">
        <label for="instNameInput">Your name</label>
        <input id="instNameInput" type="text" maxlength="80" placeholder="e.g. Alex Rivera" value="${escapeHtml(savedName)}" />
      </div>
      <div class="cp-section">
        <div class="cp-section-label">Public Instructable URL</div>
        <input class="inst-link-input" type="url" data-inst-link placeholder="https://www.instructables.com/..." />
      </div>
      <div class="pf-actions">
        <div class="pf-status" data-inst-status></div>
        <button class="pf-submit" data-inst-submit type="button" disabled>Submit</button>
      </div>
    `;

    const nameInput = panel.querySelector('#instNameInput');
    const linkInput = panel.querySelector('[data-inst-link]');
    const submitBtn = panel.querySelector('[data-inst-submit]');
    const statusEl = panel.querySelector('[data-inst-status]');

    function setStatus(msg, isErr) {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('is-error', !!isErr);
    }
    function refresh() {
      const ok = nameInput.value.trim() && /^https?:\/\/\S+/i.test(linkInput.value.trim());
      submitBtn.disabled = !ok;
    }
    nameInput.addEventListener('input', refresh);
    linkInput.addEventListener('input', refresh);

    let isSubmitting = false;
    submitBtn.addEventListener('click', async () => {
      if (isSubmitting) return;
      const name = nameInput.value.trim();
      const url = linkInput.value.trim();
      if (!name) { setStatus('Please enter your name.', true); return; }
      if (!/^https?:\/\//i.test(url)) { setStatus('Link must start with http:// or https://', true); return; }

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      setStatus('');
      localStorage.setItem(NAME_KEY, name);

      try {
        await addDoc(collection(db, 'portfolios'), {
          benchmarkId,
          studentName: name,
          createdAt: serverTimestamp(),
          slots: {
            image: null, video: null, code: { mode: 'link', url }, cad: null, summary: null
          }
        });
        linkInput.value = '';
        refreshCountBadge(benchmarkId);
        markChecked(benchmarkId);

        submitBtn.textContent = '✓ Submitted!';
        submitBtn.classList.add('is-success');
        setStatus('Your Instructable is in the gallery below.');
        setTimeout(() => {
          submitBtn.classList.remove('is-success');
          submitBtn.textContent = 'Submit';
          setStatus('');
          isSubmitting = false;
          refresh();
        }, 1800);
      } catch (err) {
        console.error('instructable submit failed', err);
        setStatus('Submit failed. Check your wifi and try again.', true);
        submitBtn.textContent = 'Submit';
        isSubmitting = false;
        refresh();
      }
    });

    refresh();
    return panel;
  }

  // ----- Portfolio gallery (live) -----
  // Note: only the focused benchmark has a live listener. With 200 students
  // each submitting ~5 portfolios per benchmark this listener pulls ~1000
  // docs once on first open, then deltas only. We paginate the rendered
  // gallery to 50 rows at a time so the DOM stays responsive.
  let _pfGalleryPage = 50; // number of rows currently shown
  const PF_PAGE_SIZE = 50;
  let _pfGalleryRenderTimer = null;
  let _pfGalleryRenderItems = null;
  function debouncedRenderPortfolio(grid, items) {
    _pfGalleryRenderItems = items;
    if (_pfGalleryRenderTimer) return;
    _pfGalleryRenderTimer = setTimeout(() => {
      _pfGalleryRenderTimer = null;
      const it = _pfGalleryRenderItems;
      _pfGalleryRenderItems = null;
      if (it) renderPortfolioGallery(grid, it);
    }, 200);
  }
  function subscribePortfolios(benchmarkId) {
    if (unsubscribePortfolios) unsubscribePortfolios();
    _pfGalleryPage = PF_PAGE_SIZE; // reset paginator on every benchmark open
    const grid = document.getElementById('pfGallery');
    if (!grid) return;
    const q = query(collection(db, 'portfolios'), where('benchmarkId', '==', benchmarkId));
    unsubscribePortfolios = onSnapshot(q, (snap) => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      // alphabetical by name
      items.sort((a, b) => (a.studentName || '').localeCompare(b.studentName || '', undefined, { sensitivity: 'base' }));
      // Update the count badge live from the snapshot — no extra read.
      updateCountBadge(benchmarkId, items.length);
      debouncedRenderPortfolio(grid, items);
    }, (err) => {
      console.error('portfolio subscribe error', err);
      grid.innerHTML = `<div class="pf-gallery-empty">Could not load portfolios.</div>`;
    });
  }

  function renderPortfolioGallery(grid, items, opts = {}) {
    const readOnly = !!opts.readOnly;
    // Track which IDs were already painted so we only animate genuinely-new rows.
    const knownIds = grid._pfKnownIds || new Set();
    // Preserve which row was open before re-render
    const openIds = new Set();
    grid.querySelectorAll('.pf-row.is-open').forEach(r => openIds.add(r.dataset.id));

    grid.innerHTML = '';
    if (!items.length) {
      grid.innerHTML = readOnly
        ? `<div class="pf-gallery-empty">No portfolios in this archive.</div>`
        : `<div class="pf-gallery-empty">No portfolios yet — be the first to drop yours.</div>`;
      grid._pfKnownIds = new Set();
      return;
    }

    // Pagination: only paint up to _pfGalleryPage rows.
    const total = items.length;
    const pageSize = readOnly ? total : _pfGalleryPage;
    const visible = items.slice(0, pageSize);

    const newKnownIds = new Set();
    visible.forEach(item => {
      newKnownIds.add(item.id);
      const row = document.createElement('div');
      row.className = 'pf-row';
      row.dataset.id = item.id;
      // Suppress entry animation for rows we've already shown — only NEW submissions slide in.
      if (knownIds.has(item.id)) row.style.animation = 'none';
      const slots = item.slots || {};
      const filledKeys = SLOT_DEFS.filter(d => slots[d.key]).map(d => d.key);
      const chips = filledKeys.map(k => {
        const def = SLOT_DEFS.find(d => d.key === k);
        return `<span class="pf-row-chip" title="${escapeHtml(def.label)}" aria-label="${escapeHtml(def.label)} attached"><span class="pf-chip-icon">${def.icon}</span></span>`;
      }).join('');

      const deleteBtnHtml = readOnly
        ? ''
        : `<button class="pf-row-delete" data-pf-row-delete aria-label="Delete portfolio">×</button>`;
      row.innerHTML = `
        <div class="pf-row-head" data-pf-row-head>
          <span class="pf-row-name">${escapeHtml(item.studentName || 'Unnamed')}</span>
          <span class="pf-row-icons">${chips || '<span class="pf-row-chip is-empty">empty</span>'}</span>
          ${deleteBtnHtml}
          <span class="pf-row-caret">▶</span>
        </div>
        <div class="pf-row-body"><div class="pf-row-body-inner" data-pf-row-body></div></div>
      `;
      grid.appendChild(row);

      const head = row.querySelector('[data-pf-row-head]');
      const body = row.querySelector('[data-pf-row-body]');
      const deleteBtn = row.querySelector('[data-pf-row-delete]');

      head.addEventListener('click', (e) => {
        if (e.target.closest('[data-pf-row-delete]')) return;
        const willOpen = !row.classList.contains('is-open');
        row.classList.toggle('is-open', willOpen);
        if (willOpen) {
          renderRowBody(body, item, { readOnly });
          // Dynamic max-height: open to actual content, then settle to auto.
          const inner = row.querySelector('.pf-row-body');
          if (inner) {
            inner.style.maxHeight = inner.scrollHeight + 'px';
            const onEnd = () => {
              if (row.classList.contains('is-open')) inner.style.maxHeight = 'none';
              inner.removeEventListener('transitionend', onEnd);
            };
            inner.addEventListener('transitionend', onEnd);
          }
        } else {
          // Collapsing: snap back to a measured height first, then 0, so the
          // CSS transition runs even if we were on max-height: none.
          const inner = row.querySelector('.pf-row-body');
          if (inner) {
            inner.style.maxHeight = inner.scrollHeight + 'px';
            requestAnimationFrame(() => { inner.style.maxHeight = '0px'; });
          }
        }
      });
      if (deleteBtn) {
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm(`Delete ${item.studentName}'s portfolio?`)) return;
          await deletePortfolio(item);
        });
      }

      if (openIds.has(item.id)) {
        row.classList.add('is-open');
        renderRowBody(body, item, { readOnly });
      }
    });

    // "Show next 50" pager
    if (!readOnly && total > pageSize) {
      const remaining = total - pageSize;
      const nextChunk = Math.min(PF_PAGE_SIZE, remaining);
      const pager = document.createElement('div');
      pager.className = 'pf-pager';
      pager.innerHTML = `<button type="button">Show next ${nextChunk} (${remaining} more)</button>`;
      pager.querySelector('button').addEventListener('click', () => {
        _pfGalleryPage += PF_PAGE_SIZE;
        renderPortfolioGallery(grid, items, opts);
      });
      grid.appendChild(pager);
    }

    grid._pfKnownIds = newKnownIds;

    // Deep-link from Progress page: auto-expand the targeted student's row
    // and scroll the gallery into view. Consumes _focusStudent on success.
    if (!readOnly && _focusStudent) {
      const target = _focusStudent;
      requestAnimationFrame(() => {
        const rows = grid.querySelectorAll('.pf-row');
        for (const r of rows) {
          const nameEl = r.querySelector('.pf-row-name');
          const name = (nameEl?.textContent || '').trim();
          if (name.localeCompare(target, undefined, { sensitivity: 'base' }) === 0) {
            if (!r.classList.contains('is-open')) {
              r.querySelector('[data-pf-row-head]')?.click();
            }
            setTimeout(() => r.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
            _focusStudent = null;
            break;
          }
        }
      });
    }
  }

  function renderRowBody(body, item, opts = {}) {
    const readOnly = !!opts.readOnly;
    body.innerHTML = '';
    const slots = item.slots || {};
    SLOT_DEFS.forEach(def => {
      const data = slots[def.key];
      if (!data) return;
      const tile = document.createElement('div');
      tile.className = 'pf-view-tile';
      tile.dataset.slotKey = def.key;
      body.appendChild(tile);
      paintTile(tile, def, data, item, false, { readOnly });
    });
    if (!body.children.length) {
      body.innerHTML = `<div class="pf-gallery-empty" style="grid-column:1/-1;">No slots filled.</div>`;
    }
  }

  // Paint a single tile (DOM events + content) — single source of truth so we don't double-bind.
  function paintTile(tile, def, data, item, isExpanded, opts = {}) {
    const readOnly = !!opts.readOnly;
    tile.classList.toggle('is-expanded', isExpanded);
    tile.innerHTML = renderSlotView(def, data, isExpanded, { readOnly });

    const onTileClick = (e) => {
      if (e.target.closest('a, .pf-view-readmore, .pf-view-slot-delete, [data-pf-lightbox]')) return;
      // For text slots, don't toggle — Read more / less handles that
      if (data.mode === 'text' && tile.querySelector('.pf-view-readmore')) return;
      paintTile(tile, def, data, item, !isExpanded, { readOnly });
    };
    tile.onclick = onTileClick;

    const readMore = tile.querySelector('.pf-view-readmore');
    if (readMore && !readMore.hasAttribute('style')) {
      // Only wire interactive Read more (the "Click to expand" hint has pointer-events:none)
      readMore.addEventListener('click', (e) => {
        e.stopPropagation();
        const summary = tile.querySelector('.pf-view-summary');
        if (summary) {
          summary.classList.toggle('is-collapsed');
          readMore.textContent = summary.classList.contains('is-collapsed') ? 'Read more' : 'Read less';
        }
      });
    }
    const slotDelete = tile.querySelector('.pf-view-slot-delete');
    if (slotDelete && !readOnly) {
      slotDelete.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`Delete ${item.studentName}'s ${def.label} slot?`)) return;
        await deletePortfolioSlot(item, def.key);
      });
    }
    const lightboxTrigger = tile.querySelector('[data-pf-lightbox]');
    if (lightboxTrigger) {
      lightboxTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        openPortfolioLightbox(data, item.studentName, def.label);
      });
    }
    // Image graceful failure: if the URL 404s show a friendly placeholder.
    tile.querySelectorAll('img').forEach(img => {
      img.addEventListener('error', () => {
        const wrap = img.closest('.pf-view-thumb');
        if (wrap) {
          wrap.innerHTML = `<div class="pf-broken"><span class="pf-broken-icon">⚠</span><span>(file unavailable)</span></div>`;
        }
      }, { once: true });
    });
    tile.querySelectorAll('iframe').forEach(f => {
      f.addEventListener('error', () => {
        const wrap = f.closest('.pf-view-thumb');
        if (wrap) wrap.innerHTML = `<div class="pf-broken"><span class="pf-broken-icon">⚠</span><span>(file unavailable)</span></div>`;
      }, { once: true });
    });
  }

  function renderSlotView(def, data, isExpanded, opts = {}) {
    const readOnly = !!opts.readOnly;
    const slotDeleteBtn = readOnly
      ? ''
      : `<button class="pf-view-slot-delete" data-pf-slot-delete aria-label="Delete slot">×</button>`;
    const headHtml = `
      <div class="pf-view-head">
        <span class="pf-view-icon">${def.icon}</span>
        <span class="pf-view-label">${escapeHtml(def.label)}</span>
      </div>
      ${slotDeleteBtn}
    `;

    if (data.mode === 'text') {
      const text = data.text || '';
      const long = text.length > 200;
      return `
        ${headHtml}
        <div class="pf-view-summary${(!isExpanded && long) ? ' is-collapsed' : ''}">${escapeHtml(text)}</div>
        ${long ? `<button class="pf-view-readmore" type="button">${(!isExpanded) ? 'Read more' : 'Read less'}</button>` : ''}
      `;
    }

    if (data.mode === 'link') {
      const domain = getDomain(data.url) || 'link';
      return `
        ${headHtml}
        <div class="pf-view-thumb" style="font-size:32px;">🔗</div>
        <div class="pf-view-filename">${escapeHtml(domain)}</div>
        <a class="pf-view-open" href="${data.url}" target="_blank" rel="noopener">Open ↗</a>
      `;
    }

    // File
    const ct = (data.contentType || '').toLowerCase();
    if (ct.startsWith('image/')) {
      return `
        ${headHtml}
        <div class="pf-view-thumb" data-pf-lightbox><img src="${data.url}" alt="${escapeHtml(data.fileName || '')}" loading="lazy" decoding="async" /></div>
        <div class="pf-view-filename">${escapeHtml(data.fileName || 'Image')}</div>
        ${isExpanded ? '' : '<span class="pf-view-readmore" style="pointer-events:none;">Click to expand</span>'}
      `;
    }
    if (ct.startsWith('video/')) {
      if (isExpanded) {
        return `
          ${headHtml}
          <div class="pf-view-thumb"><video src="${data.url}" controls preload="metadata"></video></div>
          <div class="pf-view-filename">${escapeHtml(data.fileName || 'Video')}</div>
          <a class="pf-view-open" href="${data.url}" target="_blank" rel="noopener">Open ↗</a>
        `;
      }
      return `
        ${headHtml}
        <div class="pf-view-thumb"><video src="${data.url}" muted preload="metadata"></video><div class="play-badge">▶</div></div>
        <div class="pf-view-filename">${escapeHtml(data.fileName || 'Video')}</div>
      `;
    }
    if (ct === 'application/pdf') {
      if (isExpanded) {
        return `
          ${headHtml}
          <div class="pf-view-thumb" style="aspect-ratio:auto;height:60vh;">
            <iframe src="${data.url}" loading="lazy" style="width:100%;height:100%;border:0;"></iframe>
          </div>
          <div class="pf-view-filename">${escapeHtml(data.fileName || 'PDF')}</div>
          <a class="pf-view-open" href="${data.url}" target="_blank" rel="noopener">Open ↗</a>
        `;
      }
      return `
        ${headHtml}
        <div class="pf-view-thumb" style="font-size:32px;">📄</div>
        <div class="pf-view-filename">${escapeHtml(data.fileName || 'PDF')}</div>
        <a class="pf-view-open" href="${data.url}" target="_blank" rel="noopener">Open ↗</a>
      `;
    }
    // STL or generic file
    return `
      ${headHtml}
      <div class="pf-view-thumb" style="font-size:32px;">📦</div>
      <div class="pf-view-filename">${escapeHtml(data.fileName || 'File')}</div>
      <a class="pf-view-open" href="${data.url}" target="_blank" rel="noopener">Download ↓</a>
    `;
  }

  function openPortfolioLightbox(data, studentName, slotLabel) {
    if (data.mode !== 'file') return;
    const ct = (data.contentType || '').toLowerCase();
    if (ct.startsWith('image/')) {
      lightboxMedia.innerHTML = `<img src="${data.url}" alt="${escapeHtml(studentName || '')}" />`;
    } else if (ct.startsWith('video/')) {
      lightboxMedia.innerHTML = `<video src="${data.url}" controls autoplay></video>`;
    } else {
      window.open(data.url, '_blank', 'noopener');
      return;
    }
    lightboxName.textContent = `${studentName || 'Unnamed'} · ${slotLabel}`;
    lightboxDesc.textContent = data.fileName || '';
    lightbox.classList.add('open');
  }

  async function deletePortfolio(item) {
    try {
      // Delete any uploaded files
      const slots = item.slots || {};
      for (const def of SLOT_DEFS) {
        const s = slots[def.key];
        if (s && s.mode === 'file' && s.filePath) {
          try { await deleteObject(storageRef(storage, s.filePath)); } catch (_) {}
        }
      }
      await deleteDoc(doc(db, 'portfolios', item.id));
      if (item.benchmarkId) refreshCountBadge(item.benchmarkId);
    } catch (err) {
      console.error('portfolio delete failed', err);
      alert('Could not delete. Try again.');
    }
  }

  async function deletePortfolioSlot(item, slotKey) {
    try {
      const slots = { ...(item.slots || {}) };
      const cur = slots[slotKey];
      if (cur && cur.mode === 'file' && cur.filePath) {
        try { await deleteObject(storageRef(storage, cur.filePath)); } catch (_) {}
      }
      slots[slotKey] = null;
      // Use setDoc with merge to update only slots
      await setDoc(doc(db, 'portfolios', item.id), { slots }, { merge: true });
    } catch (err) {
      console.error('slot delete failed', err);
      alert('Could not delete that slot. Try again.');
    }
  }

  // ============== LIGHTBOX ==============
  const lightbox = document.getElementById('lightbox');
  const lightboxMedia = document.getElementById('lightboxMedia');
  const lightboxName = document.getElementById('lightboxName');
  const lightboxDesc = document.getElementById('lightboxDesc');
  const lightboxClose = document.getElementById('lightboxClose');

  function openLightbox(item) {
    const isVideo = (item.contentType || '').startsWith('video/');
    lightboxMedia.innerHTML = isVideo
      ? `<video src="${item.fileUrl}" controls autoplay></video>`
      : `<img src="${item.fileUrl}" alt="${escapeHtml(item.studentName || '')}" />`;
    lightboxName.textContent = item.studentName || 'Unnamed';
    lightboxDesc.textContent = item.description || '';
    lightbox.classList.add('open');
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxMedia.innerHTML = '';
  }
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
  });

  // ============== ARCHIVE (admin) ==============
  document.getElementById('archiveBtn').addEventListener('click', async () => {
    if (!isAdmin) return;
    if (!confirm('Archive ALL current portfolios and homework artifacts and clear the live galleries? Old work stays accessible in Firestore as a snapshot and viewable from the Archives button.')) return;
    const note = (prompt('Optional cohort label (e.g. "April 2026 cohort"). Leave blank to skip.', '') || '').trim();
    try {
      const archiveId = new Date().toISOString().replace(/[:.]/g, '-');
      // Portfolios
      const pfSnap = await getDocs(collection(db, 'portfolios'));
      const artSnap = await getDocs(collection(db, 'artifacts'));
      if (pfSnap.empty && artSnap.empty) { alert('Nothing to archive.'); return; }

      const copies = [];
      pfSnap.forEach(d => copies.push(setDoc(doc(db, 'archives', archiveId, 'portfolios', d.id), d.data())));
      artSnap.forEach(d => copies.push(setDoc(doc(db, 'archives', archiveId, 'artifacts', d.id), d.data())));
      await Promise.all(copies);

      // Write parent metadata doc — used by the archive viewer's list page.
      const studentNames = new Set();
      pfSnap.forEach(d => { const n = d.data().studentName; if (n) studentNames.add(n.trim().toLowerCase()); });
      artSnap.forEach(d => { const n = d.data().studentName; if (n) studentNames.add(n.trim().toLowerCase()); });
      await setDoc(doc(db, 'archives', archiveId), {
        archivedAt: serverTimestamp(),
        portfolioCount: pfSnap.size,
        artifactCount: artSnap.size,
        studentCount: studentNames.size,
        note: note || ''
      });

      const deletes = [];
      pfSnap.forEach(d => {
        const data = d.data();
        const slots = data.slots || {};
        Object.values(slots).forEach(s => {
          if (s && s.mode === 'file' && s.filePath) {
            deletes.push(deleteObject(storageRef(storage, s.filePath)).catch(() => {}));
          }
        });
        deletes.push(deleteDoc(doc(db, 'portfolios', d.id)));
      });
      artSnap.forEach(d => {
        const data = d.data();
        if (data.filePath) {
          deletes.push(deleteObject(storageRef(storage, data.filePath)).catch(() => {}));
        }
        deletes.push(deleteDoc(doc(db, 'artifacts', d.id)));
      });
      await Promise.all(deletes);
      // Refresh visible count badges (now zero for everything).
      Object.keys(countEls).forEach(bid => updateCountBadge(bid, 0));
      alert(`Archived ${pfSnap.size} portfolios and ${artSnap.size} homework artifacts to archives/${archiveId}.`);
    } catch (err) {
      console.error(err);
      alert('Archive failed. Check console.');
    }
  });

  // ============== ARCHIVE VIEWER (admin) ==============
  // Per-session cache so re-opening an archive doesn't re-fetch.
  const _archiveCache = new Map(); // archiveId -> { portfolios: [...], meta: {...} }

  function fmtArchiveDate(d) {
    if (!d) return '';
    try {
      const dt = (d.toDate && d.toDate()) || d;
      return dt.toISOString().slice(0, 10);
    } catch (_) { return String(d); }
  }
  function archiveTitleFor(meta, archiveId) {
    if (meta?.note) return meta.note;
    // Fall back to the readable date portion of the archiveId
    return `Archive ${archiveId.slice(0, 10)}`;
  }

  async function openArchivesList() {
    if (!isAdmin) return;
    currentBenchmark = null;
    modalTitle.textContent = 'Class Archives';
    modalPoints.style.display = 'none';
    modalBody.classList.remove('is-hw');
    modalBody.innerHTML = `
      <div class="modal-section">
        <p style="color:var(--paper-ink-mid);font-size:14px;margin-bottom:18px;">
          Read-only snapshots from previous cohorts. Click any archive to browse it.
        </p>
        <div class="archive-list" id="archiveList">
          <div class="archive-list-empty">Loading archives…</div>
        </div>
      </div>
    `;
    // Tear down any open live listeners first.
    if (unsubscribeGallery) { unsubscribeGallery(); unsubscribeGallery = null; }
    if (unsubscribePortfolios) { unsubscribePortfolios(); unsubscribePortfolios = null; }
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    const listEl = document.getElementById('archiveList');
    try {
      // Fetch parent docs only — no subcollection scans.
      const archivesSnap = await getDocs(collection(db, 'archives'));
      const items = [];
      archivesSnap.forEach(d => {
        const data = d.data() || {};
        // Only include docs that look like a metadata doc (has archivedAt).
        // Older archives may not have a parent doc — surface them too with a synthetic stub.
        items.push({ id: d.id, ...data });
      });
      // Sort newest first by archiveId (ISO-ish string sorts naturally).
      items.sort((a, b) => (b.id || '').localeCompare(a.id || ''));

      if (!items.length) {
        listEl.innerHTML = `<div class="archive-list-empty">No archives yet.</div>`;
        return;
      }

      listEl.innerHTML = '';
      items.forEach(item => {
        const date = item.archivedAt ? fmtArchiveDate(item.archivedAt) : item.id.slice(0, 10);
        const title = archiveTitleFor(item, item.id);
        const meta = [
          item.studentCount != null ? `${item.studentCount} students` : null,
          item.portfolioCount != null ? `${item.portfolioCount} portfolios` : null,
          item.artifactCount != null ? `${item.artifactCount} homework` : null
        ].filter(Boolean).join(' · ');
        const row = document.createElement('div');
        row.className = 'archive-list-item';
        row.innerHTML = `
          <div class="archive-info">
            <div class="archive-title">${escapeHtml(title)}</div>
            <div class="archive-meta">archived ${escapeHtml(date)}${meta ? ' — ' + escapeHtml(meta) : ''}</div>
          </div>
          <span class="archive-caret">▶</span>
        `;
        row.addEventListener('click', () => openArchiveDetail(item.id, item));
        listEl.appendChild(row);
      });
    } catch (err) {
      console.error('archive list failed', err);
      listEl.innerHTML = `<div class="archive-list-empty">Could not load archives.</div>`;
    }
  }

  async function openArchiveDetail(archiveId, metaHint) {
    if (!isAdmin) return;
    currentBenchmark = null;
    modalTitle.textContent = archiveTitleFor(metaHint || {}, archiveId);
    modalPoints.style.display = 'none';
    modalBody.classList.remove('is-hw');
    modalBody.innerHTML = `
      <div class="modal-section">
        <div class="archive-banner">
          <span class="archive-banner-tag">Archive</span>
          <span>Read-only snapshot. ${escapeHtml(fmtArchiveDate(metaHint?.archivedAt) || archiveId.slice(0, 10))}</span>
          <div class="archive-banner-actions">
            <button type="button" data-archive-back>← All archives</button>
            <button type="button" class="btn-restore" data-archive-restore>Restore to live</button>
          </div>
        </div>
        <div id="archiveDetail">
          <div class="pf-gallery-empty">Loading…</div>
        </div>
      </div>
    `;
    // Update URL deep link.
    try {
      const sp = new URLSearchParams(location.search);
      sp.set('admin', ADMIN_TOKEN);
      sp.set('archive', archiveId);
      history.replaceState(null, '', `${location.pathname}?${sp.toString()}`);
    } catch (_) {}

    modalBody.querySelector('[data-archive-back]').addEventListener('click', () => {
      // Clear the deep link param when going back to the list.
      try {
        const sp = new URLSearchParams(location.search);
        sp.delete('archive');
        history.replaceState(null, '', `${location.pathname}?${sp.toString()}`);
      } catch (_) {}
      openArchivesList();
    });
    modalBody.querySelector('[data-archive-restore]').addEventListener('click', () => restoreArchive(archiveId));

    if (!modal.classList.contains('open')) {
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    const detailEl = document.getElementById('archiveDetail');
    try {
      let cached = _archiveCache.get(archiveId);
      if (!cached) {
        // One-time getDocs — no live listener for archives.
        const pfSnap = await getDocs(collection(db, 'archives', archiveId, 'portfolios'));
        const portfolios = [];
        pfSnap.forEach(d => portfolios.push({ id: d.id, ...d.data() }));
        cached = { portfolios, meta: metaHint || null };
        _archiveCache.set(archiveId, cached);
      }
      const portfolios = cached.portfolios;

      detailEl.innerHTML = '';
      // Group archived portfolios by benchmarkId, render in PROJECTS order.
      const byBenchmark = {};
      portfolios.forEach(p => {
        const bid = p.benchmarkId || '_unbound';
        (byBenchmark[bid] = byBenchmark[bid] || []).push(p);
      });

      let renderedAny = false;
      PROJECTS.forEach(project => {
        const projHasContent = project.benchmarks.some(b => byBenchmark[b.id]?.length);
        if (!projHasContent) return;
        renderedAny = true;
        const projSec = document.createElement('section');
        projSec.className = 'project';
        projSec.style.marginBottom = '32px';
        projSec.innerHTML = `<h2 class="project-title">${escapeHtml(project.title)}</h2>`;
        const benchWrap = document.createElement('div');
        benchWrap.className = 'benchmarks';
        project.benchmarks.forEach(b => {
          const bucket = byBenchmark[b.id] || [];
          if (!bucket.length) return;
          const wrapper = document.createElement('div');
          wrapper.style.cssText = 'display:flex;flex-direction:column;gap:8px;margin-bottom:18px;';
          wrapper.innerHTML = `
            <div style="font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-mid);">
              ${escapeHtml(b.title)} — ${bucket.length} portfolio${bucket.length === 1 ? '' : 's'}
            </div>
            <div class="pf-gallery"></div>
          `;
          const grid = wrapper.querySelector('.pf-gallery');
          // Sort alphabetically as in the live view.
          bucket.sort((a, b) => (a.studentName || '').localeCompare(b.studentName || '', undefined, { sensitivity: 'base' }));
          renderPortfolioGallery(grid, bucket, { readOnly: true });
          benchWrap.appendChild(wrapper);
        });
        projSec.appendChild(benchWrap);
        detailEl.appendChild(projSec);
      });

      if (!renderedAny) {
        detailEl.innerHTML = `<div class="pf-gallery-empty">This archive has no portfolios.</div>`;
      }
    } catch (err) {
      console.error('archive detail failed', err);
      detailEl.innerHTML = `<div class="pf-gallery-empty">Could not load this archive.</div>`;
    }
  }

  async function restoreArchive(archiveId) {
    if (!isAdmin) return;
    if (!confirm(
      'Restore this archive\'s portfolios to the LIVE collection? This is for accidental archives only — it copies docs back to /portfolios. Proceed?'
    )) return;
    try {
      const cached = _archiveCache.get(archiveId);
      let portfolios = cached?.portfolios;
      if (!portfolios) {
        const pfSnap = await getDocs(collection(db, 'archives', archiveId, 'portfolios'));
        portfolios = [];
        pfSnap.forEach(d => portfolios.push({ id: d.id, ...d.data() }));
      }
      if (!portfolios.length) { alert('Nothing to restore.'); return; }

      // Strip the archive doc id and write a fresh doc in /portfolios with a
      // new server timestamp. We DO preserve all slot data including the
      // existing fileUrl pointers (Storage objects were left in place since
      // archive doesn't move blobs — they were deleted on archive though, so
      // file-mode slots may now be broken; the read-side renders a friendly
      // placeholder for those).
      const writes = [];
      portfolios.forEach(p => {
        const { id, createdAt, ...rest } = p;
        writes.push(addDoc(collection(db, 'portfolios'), {
          ...rest,
          createdAt: serverTimestamp()
        }));
      });
      await Promise.all(writes);
      // Refresh count badges so admin sees the restore reflected.
      const benchIds = new Set(portfolios.map(p => p.benchmarkId).filter(Boolean));
      benchIds.forEach(bid => refreshCountBadge(bid));
      alert(`Restored ${portfolios.length} portfolios to live. Note: archived files (storage blobs) were deleted at archive time, so file-mode slots may show "(file unavailable)".`);
    } catch (err) {
      console.error('restore failed', err);
      alert('Restore failed. Check console.');
    }
  }

  function vibeLoadCodeMirror() {
    if (window.CodeMirror) return Promise.resolve();
    const cssHref = 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css';
    if (!document.querySelector('link[data-vibe-cm]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = cssHref;
      link.setAttribute('data-vibe-cm', '1');
      document.head.appendChild(link);
    }
    const loadScript = (src) => new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => resolve();
      s.onerror = () => reject(new Error('Failed to load ' + src));
      document.head.appendChild(s);
    });
    return loadScript('https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js')
      .then(() => loadScript('https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/clike/clike.min.js'));
  }

  // Lazy-load jsPDF on first export.
  function vibeLoadJsPdf() {
    if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
      s.onload = () => resolve();
      s.onerror = () => reject(new Error('Failed to load jsPDF'));
      document.head.appendChild(s);
    });
  }

  async function vibeExportPdf() {
    const btn = document.getElementById('vibeDownloadPdf');
    const txt = vibeGetEditorText();
    if (!txt || !txt.trim()) {
      schemToast('Editor is empty. Generate or paste code first.');
      return;
    }
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'Building PDF...';
    try {
      await vibeLoadJsPdf();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'pt', format: 'letter' });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const marginX = 48;
      const marginY = 56;
      // Header
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(14);
      doc.text('Arduino Sketch', marginX, marginY);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(120);
      const stamp = new Date().toLocaleString();
      doc.text(stamp, pageW - marginX, marginY, { align: 'right' });
      doc.setTextColor(0);
      // Code body
      doc.setFont('courier', 'normal');
      doc.setFontSize(10);
      const lineHeight = 13;
      const wrappedLines = [];
      txt.split('\n').forEach(line => {
        const fitted = doc.splitTextToSize(line || ' ', pageW - marginX * 2);
        fitted.forEach(l => wrappedLines.push(l));
      });
      let y = marginY + 28;
      wrappedLines.forEach(line => {
        if (y + lineHeight > pageH - marginY) {
          doc.addPage();
          y = marginY;
        }
        doc.text(line, marginX, y);
        y += lineHeight;
      });
      const filename = `arduino-sketch-${new Date().toISOString().slice(0, 10)}.pdf`;
      doc.save(filename);
      btn.textContent = 'Saved!';
      btn.classList.add('is-copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('is-copied');
        btn.disabled = false;
      }, 1600);
    } catch (err) {
      console.warn('PDF export failed', err);
      schemToast('Could not build PDF. Check your connection and try again.');
      btn.textContent = original;
      btn.disabled = false;
    }
  }

  function vibeRenderChat() {
    const scroll = document.getElementById('vibeChatScroll');

      const row = document.createElement('div');
      row.className = `vibe-msg-row is-${avatarKind}`;
      const av = document.createElement('div');
      av.className = `vibe-msg-avatar is-${avatarKind}`;
      av.textContent = avatarKind === 'user' ? 'You' : 'AI';
      const msg = document.createElement('div');
      msg.className = `vibe-msg ${msgClass}`;
      row.appendChild(av);
      row.appendChild(msg);
      return { row, msg };
    };

    _vibeChat.forEach((msg) => {
      if (msg.role === 'user') {
        const { row, msg: el } = _row('user', 'vibe-msg-user');
        el.textContent = msg.content;
        scroll.appendChild(row);
      } else if (msg.role === 'assistant') {
        const { row, msg: el } = _row('ai', 'vibe-msg-ai');
        const intro = document.createElement('div');
        intro.style.fontSize = '13px';
        intro.style.color = 'var(--ink-mid)';
        intro.textContent = 'Here is the code:';

        btn.className = 'vibe-msg-copybtn';
        btn.textContent = 'Copy to Editor';
        btn.addEventListener('click', () => {
          vibeSetEditorText(msg.content);

          btn.textContent = 'Copied to editor';
          btn.classList.add('is-copied');
          setTimeout(() => {
            btn.textContent = 'Copy to Editor';

          }, 1600);
        });
        el.appendChild(intro);
        el.appendChild(pre);
        el.appendChild(btn);
        scroll.appendChild(row);
      } else if (msg.role === 'error') {
        const { row, msg: el } = _row('ai', 'vibe-msg-error');
        el.textContent = msg.content;
        scroll.appendChild(row);

    });

      el.textContent = 'Generating...';

      text: "I'm building an adaptive controller with an Arduino Leonardo. Write clean, well-commented code that <DESCRIBE THE BEHAVIOR>. Use the appropriate HID library if it should send keyboard or mouse input.",
      placeholder: '<DESCRIBE THE BEHAVIOR>'
    },
    {
      label: 'Walk me through',
      text: "Walk me through how to <DESCRIBE THE TASK> on an Arduino Leonardo, step by step. Explain the why, not just the how.",
      placeholder: '<DESCRIBE THE TASK>'
    },
    {
      label: 'Debug this',
      text: "Act like a debugging partner. Here's my Arduino code, and what's happening when I run it:\n\nCODE:\n```\n<PASTE YOUR CODE>\n```\n\nWHAT I'M SEEING:\n<DESCRIBE WHAT'S WRONG>\n\nFind the bug and explain the fix.",
      placeholder: '<PASTE YOUR CODE>'
    },
    {
      label: 'Explain this code',
      text: "Explain this Arduino code to me line by line as if I'm new to programming. What does each section do, and why?\n\n```\n<PASTE YOUR CODE>\n```",
      placeholder: '<PASTE YOUR CODE>'
    },
    {
      label: 'Optimize this',
      text: "Act like a code reviewer. Here's my Arduino sketch:\n\n```\n<PASTE YOUR CODE>\n```\n\nClean it up: better variable names, smaller loops, clearer structure. Explain each change.",
      placeholder: '<PASTE YOUR CODE>'
    }
  ];

  function vibeRenderStems() {
    const wrap = document.getElementById('vibeStems');
    if (!wrap) return;
    wrap.innerHTML = '';
    VIBE_STEMS.forEach(stem => {
      const btn = document.createElement('button');
      btn.className = 'vibe-stem';
      btn.type = 'button';
      btn.innerHTML = `<span class="vibe-stem-icon">✦</span><span>${stem.label}</span>`;
      btn.title = stem.text.length > 80 ? stem.text.slice(0, 77) + '...' : stem.text;
      btn.addEventListener('click', () => vibeApplyStem(stem));
      wrap.appendChild(btn);
    });
  }

  function vibeApplyStem(stem) {
    const inp = document.getElementById('vibeInput');
    if (!inp) return;
    inp.value = stem.text;
    inp.focus();
    // Auto-grow to fit the new content.
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 220) + 'px';
    // Position the cursor at the placeholder so the student can type over it.
    const idx = stem.placeholder ? stem.text.indexOf(stem.placeholder) : -1;
    if (idx >= 0) {
      inp.setSelectionRange(idx, idx + stem.placeholder.length);
    } else {
      inp.setSelectionRange(stem.text.length, stem.text.length);
    }
  }

  // ----- Libraries strip + status bar -----
  const VIBE_QUICK_LIBS = ['Keyboard.h', 'Mouse.h', 'Joystick.h', 'Servo.h'];

  function vibeDetectIncludes() {
    const txt = vibeGetEditorText();
    const found = [];
    const re = /^\s*#\s*include\s*[<"]([^>"]+)[>"]/gm;
    let m;
    while ((m = re.exec(txt)) !== null) {
      const lib = m[1].trim();
      if (lib && !found.includes(lib)) found.push(lib);
    }
    return found;
  }

  function vibeUpdateLibraries() {
    const active = document.getElementById('vibeLibsActive');
    if (!active) return;
    const includes = vibeDetectIncludes();
    active.innerHTML = '';
    if (!includes.length) {
      const empty = document.createElement('span');
      empty.className = 'vibe-libs-chip is-empty';
      empty.textContent = 'no libraries included';
      active.appendChild(empty);
    } else {
      includes.forEach(lib => {
        const chip = document.createElement('span');
        chip.className = 'vibe-libs-chip';
        chip.textContent = `<${lib}>`;
        active.appendChild(chip);
      });
    }
    document.querySelectorAll('.vibe-libs-add button').forEach(btn => {
      btn.disabled = includes.includes(btn.dataset.lib);
    });
  }

  function vibeAddLibrary(lib) {
    const txt = vibeGetEditorText();
    if (new RegExp(`#\\s*include\\s*[<"]${lib.replace(/\./g, '\\.')}[>"]`).test(txt)) return;
    const inc = `#include <${lib}>\n`;
    // Insert after any existing #include block, otherwise at the very top.
    const lines = txt.split('\n');
    let lastInclude = -1;
    for (let i = 0; i < lines.length; i++) {
      if (/^\s*#\s*include/.test(lines[i])) lastInclude = i;
    }
    if (lastInclude >= 0) {
      lines.splice(lastInclude + 1, 0, `#include <${lib}>`);
    } else {
      lines.unshift(`#include <${lib}>`);
    }
    const next = lines.join('\n');
    vibeSetEditorText(next);
    vibeSaveEditorText(next);
    vibeUpdateLibraries();
  }

  function vibeSetStatus(state, label) {
    const bar = document.getElementById('vibeStatus');
    if (!bar) return;
    bar.classList.toggle('is-connected', state === 'connected');
    bar.querySelector('.vibe-status-text').textContent = label;
  }

  function vibeSend() {
    if (_vibeBusy) return;
    const inputEl = document.getElementById('vibeInput');
    const txt = (inputEl.value || '').trim();
    if (!txt) return;

    _vibeChat.push({ role: 'user', content: txt });
    vibeSaveChat();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    _vibeBusy = true;
    document.getElementById('vibeSend').disabled = true;
    vibeRenderChat();

    // Build a short history (last 6 messages, excluding errors).
    const history = _vibeChat
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .slice(-7, -1) // exclude the just-added user message
      .map(m => ({ role: m.role, content: m.content }));

    fetch('/api/vibe-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: txt,
        history
      })
    }).then(async (r) => {
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        const errMsg = data.error || ('Server error ' + r.status);
        _vibeChat.push({ role: 'error', content: 'Something went wrong, try again. (' + errMsg + ')' });
      } else {
        const code = (data.code || '').trim();
        if (code) {
          _vibeChat.push({ role: 'assistant', content: code });
          // Auto-paste the latest response into the IDE every time, so the
          // editor always reflects the freshest generation. Detect libraries
          // for the strip too.
          vibeSetEditorText(code);
          vibeSaveEditorText(code);
          vibeUpdateLibraries();
        } else {
          _vibeChat.push({ role: 'error', content: 'The assistant did not return any code.' });
        }
      }
      vibeSaveChat();
      _vibeBusy = false;
      document.getElementById('vibeSend').disabled = false;
      vibeRenderChat();
    }).catch((err) => {
      _vibeChat.push({ role: 'error', content: 'Something went wrong, try again. (' + (err.message || err) + ')' });
      vibeSaveChat();
      _vibeBusy = false;
      const sendBtn = document.getElementById('vibeSend');
      if (sendBtn) sendBtn.disabled = false;
      vibeRenderChat();
    });
  }

  function vibeShowClassCodeModal(pendingPrompt) {
    if (document.getElementById('vibeClassCodeModal')) return;
    const backdrop = document.createElement('div');
    backdrop.className = 'vibe-modal-backdrop';
    backdrop.id = 'vibeClassCodeModal';
    backdrop.innerHTML = `
      <div class="vibe-modal">
        <h3>Enter the class code</h3>
        <p>Ask Mr. Musallam if you don't have it.</p>
        <input type="text" id="vibeClassCodeInput" placeholder="Class code" autocomplete="off" />
        <p class="vibe-modal-error" id="vibeClassCodeError"></p>
        <div class="vibe-modal-actions">
          <button class="vibe-btn is-primary" id="vibeClassCodeSubmit">Unlock</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    const input = document.getElementById('vibeClassCodeInput');
    const errEl = document.getElementById('vibeClassCodeError');
    input.focus();

    const submit = () => {
      const code = (input.value || '').trim();
      if (!code) {
        errEl.textContent = 'Enter a code.';
        return;
      }
      errEl.textContent = 'Checking...';
      // Verify by calling the proxy with a tiny prompt.
      fetch('/api/vibe-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: 'Say OK.', classCode: code, history: [] })
      }).then(async (r) => {
        if (r.status === 401) {
          errEl.textContent = 'Wrong code, try again.';
          return;
        }
        // Any non-401 means the code was accepted by the gate (even if other errors follow).
        vibeSetClassCode(code);
        backdrop.remove();
        if (pendingPrompt) {
          const inp = document.getElementById('vibeInput');
          if (inp) inp.value = pendingPrompt;
          vibeSend();
        }
      }).catch((err) => {
        errEl.textContent = 'Network error: ' + (err.message || err);
      });
    };

    document.getElementById('vibeClassCodeSubmit').addEventListener('click', submit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submit(); }
    });
  }

  // ---- Web Serial ----
  async function vibeConnectSerial() {
    const monitor = document.getElementById('vibeMonitor');
    if (!('serial' in navigator)) {
      monitor.innerHTML = '';
      vibeAppendMonitor('Web Serial not supported in this browser. Use Chrome or Edge on a desktop, then reload this page.\n');
      return;
    }
    try {
      const port = await navigator.serial.requestPort();
      const baud = parseInt(document.getElementById('vibeBaudRate').value, 10) || 9600;
      await port.open({ baudRate: baud });
      _vibeSerialPort = port;
      _vibeSerialKeepReading = true;
      const btn = document.getElementById('vibeConnect');
      btn.textContent = 'Disconnect';
      btn.classList.remove('is-primary');
      btn.classList.add('is-active');
      monitor.innerHTML = '';
      vibeAppendMonitor('[ connected at ' + baud + ' baud ]\n');
      vibeSetStatus('connected', `Connected at ${baud} baud. Upload your sketch in the desktop Arduino IDE; output streams here.`);
      vibeReadLoop();
    } catch (err) {
      // User cancelled the picker, or open failed.
      if (err && err.name !== 'NotFoundError') {
        vibeAppendMonitor('[ connection error: ' + (err.message || err) + ' ]\n');
      }
    }
  }

  async function vibeReadLoop() {
    if (!_vibeSerialPort) return;
    const decoder = new TextDecoderStream();
    const inputDone = _vibeSerialPort.readable.pipeTo(decoder.writable).catch(() => {});
    const reader = decoder.readable.getReader();
    _vibeSerialReader = reader;
    try {
      while (_vibeSerialKeepReading) {
        const { value, done } = await reader.read();
        if (done) break;
        if (value) vibeAppendMonitor(value);
      }
    } catch (err) {
      vibeAppendMonitor('[ read error: ' + (err.message || err) + ' ]\n');
    }
  }

  async function vibeDisconnectSerial() {
    _vibeSerialKeepReading = false;
    try {
      if (_vibeSerialReader) {
        await _vibeSerialReader.cancel().catch(() => {});
        _vibeSerialReader = null;
      }
      if (_vibeSerialPort) {
        await _vibeSerialPort.close().catch(() => {});
      }
    } catch (_) {}
    _vibeSerialPort = null;
    const btn = document.getElementById('vibeConnect');
    if (btn) {
      btn.textContent = 'Connect Arduino';
      btn.classList.add('is-primary');
      btn.classList.remove('is-active');
    }
    vibeAppendMonitor('[ disconnected ]\n');
    vibeSetStatus('disconnected', 'Disconnected. Choose your Leonardo or Micro after clicking Connect Arduino.');
  }

  function vibeStopReading() {
    if (_vibeSerialPort) {
      vibeDisconnectSerial();
    }
  }

  function vibeAppendMonitor(text) {
    const m = document.getElementById('vibeMonitor');
    if (!m) return;
    // Clear empty placeholder
    const empty = m.querySelector('.vibe-monitor-empty');
    if (empty) m.innerHTML = '';
    m.appendChild(document.createTextNode(text));
    if (_vibeMonitorAutoScroll) {
      m.scrollTop = m.scrollHeight;
    }
  }

  // ============== UTIL ==============
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ============== INIT ==============
  const route = location.pathname.replace(/\/+$/, '');
  if (route === '/hw') {
    document.body.classList.add('view-hw');
    renderHomework();
  } else if (route === '/progress') {
    document.body.classList.add('view-progress');
    renderProgress();
  } else if (route === '/tools') {
    document.body.classList.add('view-tools');
    renderTools();
  } else {
    renderProjects();
  }
  // Pull initial counts via getCountFromServer (1 read per benchmark).
  loadInitialCounts();
  // Deep link to an archive: ?admin=ramsey-d4sg&archive=2026-04-15T12-34-56
  if (isAdmin) {
    const archiveDeepLink = urlParams.get('archive');
    if (archiveDeepLink) {
      // Defer slightly so projects render first.
      setTimeout(() => openArchiveDetail(archiveDeepLink, null), 50);
    }
  }
