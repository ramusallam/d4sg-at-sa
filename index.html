<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D4SG @ SA</title>
<style>
  :root {
    /* Spark Learning aesthetic — warm cream page, white cards */
    --bg-0: #F7F3EE;        /* page */
    --bg-1: #FFFFFF;        /* cards / panels */
    --bg-2: #FAFAF7;        /* nested surfaces */
    --ink-hi: #111111;      /* primary text */
    --ink-mid: #555555;     /* secondary text */
    --ink-low: #9CA3AF;     /* muted */
    --accent: #3b82f6;      /* indigo blue */
    --accent-hover: #2563eb;
    --accent-soft: #eff6ff;
    --success: #22c55e;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;

    /* Modal: white card on dimmed backdrop */
    --paper: #FFFFFF;
    --paper-soft: #FAFAF7;
    --paper-ink: #111111;
    --paper-ink-mid: #555555;
    --paper-accent: #3b82f6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg-0);
    color: var(--ink-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  /* ============== STICKY HEADER ============== */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(247, 243, 238, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink-hi);
    margin: 0;
  }
  .header-title .at {
    color: var(--accent);
    font-weight: 700;
  }
  .header-meta {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-low);
  }

  /* ============== LAYOUT ============== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 120px;
  }

  .project {
    margin-bottom: 64px;
  }
  .project:last-child { margin-bottom: 0; }

  .project-title {
    font-size: clamp(24px, 3vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0 0 6px;
  }
  .project-blurb {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0 0 22px;
    max-width: 640px;
  }

  .benchmarks {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .benchmark {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }
  .benchmark:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }
  .benchmark:active {
    transform: translateY(0);
  }

  .checkbox {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }
  .checkbox:hover {
    border-color: var(--accent-hover);
  }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .benchmark-label {
    flex: 1;
    font-size: clamp(15px, 1.6vw, 17px);
    font-weight: 500;
    color: var(--ink-hi);
    line-height: 1.45;
  }
  .benchmark.done .benchmark-label {
    color: var(--ink-low);
    text-decoration: line-through;
    text-decoration-color: rgba(107, 114, 128, 0.5);
  }

  .points {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--bg-2);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* ============== MODAL ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: backdropIn 0.2s ease-out;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes backdropIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 16px;
    width: min(900px, 95vw);
    height: min(85vh, 920px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    flex-shrink: 0;
    padding: 28px 36px 22px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: var(--paper-soft);
  }
  .modal-title-wrap { flex: 1; min-width: 0; }
  .modal-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 6px;
  }
  .modal-title {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--paper-ink);
    margin: 0;
    line-height: 1.25;
  }
  .modal-points {
    font-size: 12px;
    font-weight: 600;
    color: var(--paper-ink-mid);
    background: rgba(0, 0, 0, 0.05);
    padding: 6px 12px;
    border-radius: 999px;
    margin-top: 8px;
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .close-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
    color: var(--paper-ink);
    font-size: 22px;
    line-height: 1;
  }
  .close-btn:hover {
    background: rgba(0, 0, 0, 0.12);
    transform: scale(1.05);
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px 36px;
  }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 10px;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--paper-ink);
    margin: 0 0 12px;
  }
  .modal-section ul {
    margin: 0;
    padding-left: 22px;
    color: var(--paper-ink);
  }
  .modal-section ul li {
    margin-bottom: 6px;
    line-height: 1.55;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .links a {
    display: inline-block;
    background: rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.1);
    color: var(--paper-ink);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin: 0 8px 8px 0;
    transition: background 0.15s ease;
  }
  .links a:hover {
    background: rgba(0, 0, 0, 0.1);
  }

  .rubric {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .rubric-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .rubric-row:last-child { border-bottom: none; }
  .rubric-criterion { font-weight: 500; color: var(--paper-ink); flex: 1; }
  .rubric-points {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--paper-accent);
    flex-shrink: 0;
  }

  /* ============== ARTIFACT COUNT BADGE (on benchmark row) ============== */
  .artifact-count {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(59, 130, 246, 0.25);
    font-variant-numeric: tabular-nums;
  }
  .artifact-count svg { width: 12px; height: 12px; }

  /* ============== GALLERY (inside modal) ============== */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .gallery-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.15s ease;
  }
  .gallery-tile:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
  }
  .gallery-tile img,
  .gallery-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-tile .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    pointer-events: none;
  }
  .gallery-tile .tile-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 8px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0));
    color: white;
    font-size: 10px;
    line-height: 1.25;
  }
  .gallery-tile .tile-caption .tile-name {
    font-weight: 700;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gallery-tile .tile-caption .tile-desc {
    display: none;
  }
  .gallery-tile .tile-delete {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  body.is-admin .gallery-tile .tile-delete { display: flex; }
  .gallery-tile .tile-delete:hover {
    background: #ef4444;
    transform: scale(1.1);
  }

  /* Add tile (dashed) */
  .add-tile {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: transparent;
    border: 1.5px dashed var(--border-strong);
    color: var(--ink-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    font-weight: 600;
    font-size: 10px;
    text-align: center;
    padding: 4px;
  }
  .add-tile:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .add-tile .plus {
    font-size: 22px;
    line-height: 1;
    font-weight: 300;
  }

  /* Upload form */
  .upload-form {
    grid-column: 1 / -1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .upload-form label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--paper-accent);
  }
  .upload-form input[type="text"],
  .upload-form textarea {
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--paper-ink);
    outline: none;
    transition: border-color 0.15s ease;
    resize: vertical;
  }
  .upload-form input[type="text"]:focus,
  .upload-form textarea:focus {
    border-color: var(--accent);
  }
  .upload-form .file-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .upload-form .file-pick {
    background: white;
    border: 1px solid var(--border);
    color: var(--paper-ink);
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .upload-form .file-pick:hover { border-color: var(--accent); background: var(--accent-soft); }
  .upload-form .file-name {
    font-size: 13px;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .upload-form input[type="file"] { display: none; }
  .upload-form .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    align-items: center;
  }
  .upload-form .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
  }
  .upload-form .btn-submit {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.15s ease;
  }
  .upload-form .btn-submit:hover { background: var(--accent-hover); }
  .upload-form .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .upload-form .upload-status {
    font-size: 13px;
    color: var(--ink-mid);
  }
  .upload-form .upload-status.error { color: #ef4444; }

  .gallery-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-low);
    font-size: 14px;
    padding: 8px 0 16px;
  }

  /* ============== LIGHTBOX ============== */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0, 0, 0, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    flex-direction: column;
    gap: 16px;
  }
  .lightbox.open { display: flex; }
  .lightbox-media {
    max-width: min(1100px, 92vw);
    max-height: 78vh;
    border-radius: 12px;
    overflow: hidden;
    background: black;
  }
  .lightbox-media img,
  .lightbox-media video {
    display: block;
    max-width: 100%;
    max-height: 78vh;
    object-fit: contain;
  }
  .lightbox-meta {
    color: white;
    text-align: center;
    max-width: min(700px, 90vw);
  }
  .lightbox-meta .lb-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .lightbox-meta .lb-desc { font-size: 14px; opacity: 0.85; line-height: 1.5; }
  .lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: white;
    border: none;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .lightbox-close:hover { background: rgba(255, 255, 255, 0.22); }

  /* ============== ADMIN CONTROLS ============== */
  .admin-bar {
    display: none;
    align-items: center;
    gap: 10px;
  }
  body.is-admin .admin-bar { display: inline-flex; }
  .admin-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid rgba(59, 130, 246, 0.25);
  }
  .archive-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--ink-mid);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .archive-btn:hover {
    border-color: #ef4444;
    color: #ef4444;
  }

  /* ============== MOBILE ============== */
  @media (max-width: 640px) {
    .header-inner { padding: 16px 20px; gap: 8px; flex-wrap: wrap; }
    main { padding: 28px 20px 80px; }
    .benchmark { padding: 14px 16px; gap: 12px; }
    .points { font-size: 12px; padding: 4px 10px; }
    .artifact-count { font-size: 11px; padding: 4px 8px; }
    .modal {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
    }
    .modal-header { padding: 20px 22px 16px; }
    .modal-body { padding: 20px 22px 32px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="header-title">D4SG <span class="at">@</span> SA</h1>
    <div class="header-meta">
      Design for Social Good
      <span class="admin-bar">
        <span class="admin-tag">Admin</span>
        <button class="archive-btn" id="archiveBtn">Archive class</button>
      </span>
    </div>
  </div>
</header>

<main id="app"></main>

<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modalCard">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <p class="modal-eyebrow" id="modalEyebrow">Benchmark</p>
        <h2 class="modal-title" id="modalTitle">—</h2>
        <span class="modal-points" id="modalPoints">— pts</span>
      </div>
      <button class="close-btn" id="closeBtn" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>
  <div class="lightbox-media" id="lightboxMedia"></div>
  <div class="lightbox-meta">
    <div class="lb-name" id="lightboxName"></div>
    <div class="lb-desc" id="lightboxDesc"></div>
  </div>
</div>

<script type="module">
  // ============== FIREBASE ==============
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import {
    getFirestore, collection, query, where, orderBy, onSnapshot,
    addDoc, deleteDoc, doc, getDocs, setDoc, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';
  import {
    getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL, deleteObject
  } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-storage.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyBk_7fY9VbLla_2fePNqFTNehGJxkM3wYk',
    authDomain: 'd4sg-sa-class.firebaseapp.com',
    projectId: 'd4sg-sa-class',
    storageBucket: 'd4sg-sa-class-uploads',
    messagingSenderId: '348558190261',
    appId: '1:348558190261:web:45acfd179a20b7343cc0fc'
  };
  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const storage = getStorage(fbApp);

  // ============== ADMIN MODE ==============
  // Visit ?admin=ramsey-d4sg to enable delete buttons & "Archive class".
  const ADMIN_TOKEN = 'ramsey-d4sg';
  const urlParams = new URLSearchParams(location.search);

        const cb = row.querySelector('[data-checkbox]');

            toggleChecked(b.id, row, cb);

      });
      app.appendChild(projEl);
    });

  function updateCountBadge(benchmarkId, n) {
    benchmarkCounts[benchmarkId] = n;
    const el = countEls[benchmarkId];
    if (!el) return;
    if (n > 0) {

      el.querySelector('[data-count-num]').textContent = n;

      counts[bid] = (counts[bid] || 0) + 1;
    });
    // reset all known benchmarks then apply
    Object.keys(countEls).forEach(bid => updateCountBadge(bid, counts[bid] || 0));
  });

  function toggleChecked(id, row, cb) {
    if (checked.has(id)) {
      checked.delete(id);
      row.classList.remove('done');
      cb.classList.remove('checked');
      cb.setAttribute('aria-checked', 'false');
    } else {
      checked.add(id);
      row.classList.add('done');
      cb.classList.add('checked');
      cb.setAttribute('aria-checked', 'true');

    persist();
  }

  // ============== GALLERY ==============
  function subscribeGallery(benchmarkId) {
    if (unsubscribeGallery) unsubscribeGallery();
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    const q = query(
      collection(db, 'artifacts'),
      where('benchmarkId', '==', benchmarkId)
    );
    unsubscribeGallery = onSnapshot(q, (snap) => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      // newest first
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      renderGallery(grid, benchmarkId, items);
    }, (err) => {
      console.error('gallery subscribe error', err);
      grid.innerHTML = `<div class="gallery-empty">Could not load gallery.</div>`;
    });
  }

  function renderGallery(grid, benchmarkId, items) {
    grid.innerHTML = '';
    items.forEach(item => {
      const tile = document.createElement('div');
      tile.className = 'gallery-tile';
      const isVideo = (item.contentType || '').startsWith('video/');

          <span class="tile-desc">${escapeHtml(item.description || '')}</span>

      }, () => {

      });
      grid.replaceChild(form, addTile);
    });
    grid.appendChild(addTile);

    if (items.length === 0) {

  }

  function buildUploadForm(benchmarkId, onSuccess, onCancel) {
    const form = document.createElement('div');

    form.innerHTML = `

          <span data-file-label>Choose image or video</span>
        </label>
        <span class="file-name" data-file-name></span>
      </div>
      <div class="upload-status" data-status></div>
      <div class="actions">
        <button class="btn-cancel" data-cancel type="button">Cancel</button>
        <button class="btn-submit" data-submit type="button">Submit</button>
      </div>
    `;
    const fileInput = form.querySelector('[data-file]');
    const fileNameEl = form.querySelector('[data-file-name]');
    const statusEl = form.querySelector('[data-status]');
    const submitBtn = form.querySelector('[data-submit]');
    const nameInput = form.querySelector('[data-name]');
    const descInput = form.querySelector('[data-desc]');

    fileInput.addEventListener('change', () => {
      fileNameEl.textContent = fileInput.files[0]?.name || '';
    });
    form.querySelector('[data-cancel]').addEventListener('click', onCancel);
    submitBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const desc = descInput.value.trim();
      const file = fileInput.files[0];
      if (!name) { setErr('Please enter your name.'); return; }
      if (!file) { setErr('Please choose an image or video.'); return; }
      if (!file.type.match(/^(image|video)\//)) { setErr('File must be an image or video.'); return; }
      if (file.size > 50 * 1024 * 1024) { setErr('File too large (50MB max).'); return; }
      submitBtn.disabled = true;
      statusEl.classList.remove('error');
      statusEl.textContent = 'Uploading…';
      localStorage.setItem(NAME_KEY, name);
      try {
        await uploadArtifact({ benchmarkId, name, desc, file, onProgress: (pct) => {
          statusEl.textContent = `Uploading… ${pct}%`;
        }});
        statusEl.textContent = 'Done.';
        onSuccess();
      } catch (err) {
        console.error(err);
        setErr('Upload failed. Try again.');
        submitBtn.disabled = false;
      }
    });
    function setErr(msg) {
      statusEl.classList.add('error');
      statusEl.textContent = msg;
    }
    return form;
  }

  function uploadArtifact({ benchmarkId, name, desc, file, onProgress }) {
    return new Promise((resolve, reject) => {
      const ext = (file.name.match(/\.[a-z0-9]+$/i) || [''])[0];
      const path = `artifacts/${benchmarkId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}${ext}`;
      const ref = storageRef(storage, path);
      const task = uploadBytesResumable(ref, file, { contentType: file.type });
      task.on('state_changed',
        (snap) => onProgress?.(Math.round(snap.bytesTransferred / snap.totalBytes * 100)),
        reject,
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            await addDoc(collection(db, 'artifacts'), {
              benchmarkId,
              studentName: name,
              description: desc,
              fileUrl: url,
              filePath: path,
              contentType: file.type,
              createdAt: serverTimestamp()
            });
            resolve();
          } catch (e) { reject(e); }
        }
      );
    });
  }

  async function deleteArtifact(item) {
    try {
      if (item.filePath) {
        try { await deleteObject(storageRef(storage, item.filePath)); } catch (e) { /* file may already be gone */ }
      }
      await deleteDoc(doc(db, 'artifacts', item.id));
    } catch (err) {
      console.error('delete failed', err);
      alert('Could not delete. Try again.');

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxMedia.innerHTML = '';
  }
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
  });

  // ============== ARCHIVE (admin) ==============
  document.getElementById('archiveBtn').addEventListener('click', async () => {
    if (!isAdmin) return;
    if (!confirm('Archive ALL current submissions and clear the live galleries? Old work stays accessible in Firestore as a snapshot.')) return;
    try {
      const snap = await getDocs(collection(db, 'artifacts'));
      if (snap.empty) { alert('Nothing to archive.'); return; }
      const archiveId = new Date().toISOString().replace(/[:.]/g, '-');
      // copy each to archives/{archiveId}/artifacts/{id}
      const copies = [];
      snap.forEach(d => {
        copies.push(setDoc(doc(db, 'archives', archiveId, 'artifacts', d.id), d.data()));
      });
      await Promise.all(copies);
      // delete originals (Firestore doc + Storage file)
      const deletes = [];
      snap.forEach(d => {
        const data = d.data();
        if (data.filePath) {
          deletes.push(deleteObject(storageRef(storage, data.filePath)).catch(() => {}));
        }
        deletes.push(deleteDoc(doc(db, 'artifacts', d.id)));
      });
      await Promise.all(deletes);
      alert(`Archived ${snap.size} submissions to archives/${archiveId}.`);
    } catch (err) {
      console.error(err);
      alert('Archive failed. Check console.');
    }
  });

  // ============== UTIL ==============
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ============== INIT ==============
  renderProjects();
</script>

</body>
</html>
