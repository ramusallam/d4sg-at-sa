<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D4SG @ SA</title>
<style>
  :root {
    /* Spark Learning aesthetic — warm cream page, white cards */
    --bg-0: #F7F3EE;        /* page */
    --bg-1: #FFFFFF;        /* cards / panels */
    --bg-2: #FAFAF7;        /* nested surfaces */
    --ink-hi: #111111;      /* primary text */
    --ink-mid: #555555;     /* secondary text */
    --ink-low: #9CA3AF;     /* muted */
    --accent: #3b82f6;      /* indigo blue */
    --accent-hover: #2563eb;
    --accent-soft: #eff6ff;
    --success: #22c55e;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;

    /* Modal: white card on dimmed backdrop */
    --paper: #FFFFFF;
    --paper-soft: #FAFAF7;
    --paper-ink: #111111;
    --paper-ink-mid: #555555;
    --paper-accent: #3b82f6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg-0);
    color: var(--ink-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  /* ============== STICKY HEADER ============== */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(247, 243, 238, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink-hi);
    margin: 0;
  }
  .header-title .at {
    color: var(--accent);
    font-weight: 700;
  }
  .header-meta {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-low);
  }

  /* ============== LAYOUT ============== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 120px;
  }

  .project {
    margin-bottom: 64px;
  }
  .project:last-child { margin-bottom: 0; }

  .project-title {
    font-size: clamp(24px, 3vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0 0 16px;
  }
  .project-blurb {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0 0 22px;
    max-width: 640px;
  }

  /* Standalone (single-benchmark) project rows — used for "Final: Publish to
     Instructables". Bold green moment that anchors the bottom of the page. */
  .project.is-standalone {
    margin-top: -32px;
  }
  .project.is-standalone .benchmark {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.14), rgba(16, 185, 129, 0.09));
    border: 1.5px solid rgba(34, 197, 94, 0.45);
    box-shadow: 0 4px 18px rgba(34, 197, 94, 0.16);
    padding: 22px 26px;
  }
  .project.is-standalone .benchmark:hover {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.20), rgba(16, 185, 129, 0.13));
    border-color: rgba(34, 197, 94, 0.62);
    box-shadow: 0 10px 26px rgba(34, 197, 94, 0.24);
    transform: translateY(-2px);
  }
  .project.is-standalone .benchmark-label {
    font-weight: 700;
    font-size: clamp(16px, 1.7vw, 18px);
    color: #047857;
    letter-spacing: -0.01em;
  }
  .project.is-standalone .points {
    background: rgba(34, 197, 94, 0.18);
    border-color: rgba(34, 197, 94, 0.4);
    color: #047857;
    font-weight: 700;
  }
  .project.is-standalone .checkbox {
    border-color: rgba(34, 197, 94, 0.5);
  }
  .project.is-standalone .checkbox:hover {
    border-color: var(--success);
  }

  .benchmarks {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .benchmark {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }
  .benchmark:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }
  .benchmark:active {
    transform: translateY(0);
  }

  .checkbox {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }
  .checkbox:hover {
    border-color: var(--accent-hover);
  }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .benchmark-num {
    flex-shrink: 0;
    width: 22px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-low);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }
  .benchmark.done .benchmark-num { color: var(--ink-low); opacity: 0.5; }

  .benchmark-label {
    flex: 1;
    font-size: clamp(15px, 1.6vw, 17px);
    font-weight: 500;
    color: var(--ink-hi);
    line-height: 1.45;
  }
  .benchmark.done .benchmark-label {
    color: var(--ink-low);
    text-decoration: line-through;
    text-decoration-color: rgba(107, 114, 128, 0.5);
  }

  .points {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--bg-2);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* ============== MODAL ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: backdropIn 0.2s ease-out;
  }
  .modal-backdrop.open { display: flex; }
  @keyframes backdropIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 16px;
    width: min(900px, 95vw);
    height: min(85vh, 920px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    flex-shrink: 0;
    padding: 28px 36px 22px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: var(--paper-soft);
  }
  .modal-title-wrap { flex: 1; min-width: 0; }
  .modal-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--paper-accent);
    margin: 0 0 6px;
  }
  .modal-title {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--paper-ink);
    margin: 0;
    line-height: 1.25;
  }
  .modal-points {
    font-size: 12px;
    font-weight: 600;
    color: var(--paper-ink-mid);
    background: rgba(0, 0, 0, 0.05);
    padding: 6px 12px;
    border-radius: 999px;
    margin-top: 8px;
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .close-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
    color: var(--paper-ink);
    font-size: 22px;
    line-height: 1;
  }
  .close-btn:hover {
    background: rgba(0, 0, 0, 0.12);
    transform: scale(1.05);
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px 36px;
  }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-ink);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--paper-ink);
    margin: 0 0 12px;
  }
  .modal-section ul {
    margin: 0;
    padding-left: 22px;
    color: var(--paper-ink);
  }
  .modal-section ul li {
    margin-bottom: 6px;
    line-height: 1.55;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .links a {
    display: inline-block;
    background: rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.1);
    color: var(--paper-ink);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin: 0 8px 8px 0;
    transition: background 0.15s ease;
  }
  .links a:hover {
    background: rgba(0, 0, 0, 0.1);
  }

  .rubric {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .rubric-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .rubric-row:last-child { border-bottom: none; }
  .rubric-criterion { font-weight: 500; color: var(--paper-ink); flex: 1; }
  .rubric-points {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--paper-accent);
    flex-shrink: 0;
  }

  /* ============== HEADER NAV (Homework / Back) ============== */
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: white;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s ease;
    margin-right: 10px;
    cursor: pointer;
  }
  .nav-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .nav-back { display: none; }
  .nav-to-hw, .nav-to-progress, .nav-to-tools { display: inline-flex; }
  body.view-hw .nav-back, body.view-progress .nav-back, body.view-tools .nav-back { display: inline-flex; }
  body.view-hw .nav-to-hw { display: none; }
  body.view-progress .nav-to-progress { display: none; }
  body.view-tools .nav-to-tools { display: none; }

  /* ============== PROGRESS page ============== */
  /* Per-student cards stacked vertically. Each card mirrors the project
     section aesthetic on the home page: white surface, rounded corners,
     soft shadow. Inside each card, one row per project shows the project
     prefix, title, and 5 status pips (1 for the final row). Pips are
     clickable when filled and deep-link to that student's gallery row. */
  .progress-section { margin-bottom: 32px; }
  .progress-board {
    width: 100%;
  }
  .prog-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .prog-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 2px 6px rgba(17, 17, 17, 0.04);
    padding: 24px 28px 22px;
    transition: box-shadow 0.2s ease, transform 0.12s ease;
  }
  .prog-card:hover {
    box-shadow: 0 8px 22px rgba(17, 17, 17, 0.06);
  }
  .prog-card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .prog-card-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .prog-card-you {
    display: inline-flex;
    align-items: center;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
  }
  .prog-card.is-you {
    border-color: rgba(59, 130, 246, 0.35);
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.12);
  }
  .prog-card.is-you:hover {
    box-shadow: 0 8px 22px rgba(59, 130, 246, 0.18);
  }
  .prog-card-rows {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .prog-card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 8px 0;
  }
  .prog-card-row + .prog-card-row {
    border-top: 1px solid rgba(17, 17, 17, 0.04);
  }
  .prog-card-row-label {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }
  .prog-card-row-prefix {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--ink-low);
    flex-shrink: 0;
    min-width: 64px;
  }
  .prog-card-row-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .prog-card-row-dots {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .prog-pip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.6px solid var(--border-strong);
    background: var(--bg-2);
    color: var(--ink-mid);
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    text-decoration: none;
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    flex-shrink: 0;
  }
  .prog-pip.is-done {
    background: var(--success);
    border-color: var(--success);
    color: white;
    cursor: pointer;
  }
  .prog-pip.is-done:hover {
    transform: scale(1.18);
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
  }
  .prog-pip svg {
    width: 13px;
    height: 13px;
  }

  .prog-cards-empty {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 24px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(17, 17, 17, 0.04);
  }
  .prog-cards-empty-line {
    margin: 0 0 6px;
    font-size: 15px;
    color: var(--paper-ink);
    font-weight: 600;
  }
  .prog-cards-empty-sub {
    margin: 0;
    font-size: 13px;
    color: var(--ink-low);
  }

  @media (max-width: 720px) {
    .prog-card { padding: 18px 18px 16px; }
    .prog-card-name { font-size: 18px; }
    .prog-card-tally-num { font-size: 17px; }
    .prog-card-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    .prog-card-row-label { width: 100%; }
    .prog-card-row-prefix { min-width: 0; }
    .prog-card-row-dots { padding-left: 0; }
  }

  /* Instructable submission panel — single link field, slim like checkpoint */
  .instructable-panel .inst-link-input {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 11px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--paper-ink);
    background: var(--bg-1);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .instructable-panel .inst-link-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* ============== HOMEWORK page ============== */
  .week-row {
    /* uses .benchmark styles for consistency; only overrides where needed */
  }
  .week-row .checkbox { display: none; } /* homework rows have no checkbox */
  .step-section {
    margin-bottom: 28px;
  }
  .step-section h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-ink);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-num {
    display: inline-flex;
    width: 24px;
    height: 24px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(59, 130, 246, 0.25);
  }
  .step-section p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--paper-ink);
    margin: 0 0 14px;
  }
  .tinkercad-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 9px 16px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .tinkercad-btn:hover { background: var(--accent-hover); }
  .tinkercad-btn:active { transform: translateY(1px); }
  .tinkercad-btn .arrow { font-size: 12px; }

  /* Homework modal: two-column layout (Step 1 left, Step 2 right, no outer scroll) */
  .modal-body.is-hw {
    overflow: hidden;
    padding: 24px 30px 30px;
  }
  .hw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    height: 100%;
    align-items: stretch;
  }
  .hw-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .hw-col .step-section { margin-bottom: 0; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .hw-col .video-wrap { flex-shrink: 0; }
  .hw-step2-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding-right: 4px;
    margin-right: -4px;
  }
  .hw-col .gallery-grid {
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  }

  @media (max-width: 720px) {
    .hw-grid { grid-template-columns: 1fr; height: auto; gap: 20px; }
    .modal-body.is-hw { overflow-y: auto; padding: 20px 22px 32px; }
    .hw-col .step-section { flex: 0 0 auto; }
    .hw-step2-scroll { overflow: visible; padding-right: 0; margin-right: 0; }
  }

  /* ============== ARTIFACT COUNT BADGE (on benchmark row) ============== */
  .artifact-count {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(59, 130, 246, 0.25);
    font-variant-numeric: tabular-nums;
  }
  .artifact-count svg { width: 12px; height: 12px; }

  /* ============== GALLERY (inside modal) ============== */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .gallery-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.15s ease;
  }
  .gallery-tile:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
  }
  .gallery-tile img,
  .gallery-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-tile .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    pointer-events: none;
  }
  .gallery-tile .tile-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 8px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0));
    color: white;
    font-size: 10px;
    line-height: 1.25;
  }
  .gallery-tile .tile-caption .tile-name {
    font-weight: 700;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gallery-tile .tile-caption .tile-desc {
    display: none;
  }
  .gallery-tile .tile-delete {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  body.is-admin .gallery-tile .tile-delete { display: flex; }
  .gallery-tile .tile-delete:hover {
    background: #ef4444;
    transform: scale(1.1);
  }

  /* Add tile (dashed) */
  .add-tile {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: transparent;
    border: 1.5px dashed var(--border-strong);
    color: var(--ink-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    font-weight: 600;
    font-size: 10px;
    text-align: center;
    padding: 4px;
  }
  .add-tile:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .add-tile .plus {
    font-size: 22px;
    line-height: 1;
    font-weight: 300;
  }

  /* Upload form */
  .upload-form {
    grid-column: 1 / -1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
  }
  .upload-form label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-low);
  }
  .upload-form input[type="text"],
  .upload-form textarea {
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg-2);
    color: var(--paper-ink);
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
    resize: vertical;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .upload-form input[type="text"]:focus,
  .upload-form textarea:focus {
    border-color: var(--accent);
    background: white;
  }
  .upload-form input[type="file"] { display: none; }

  /* Smart attachment zone */
  .attach {
    position: relative;
    border: 1.5px dashed var(--border-strong);
    border-radius: 12px;
    background: var(--bg-2);
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    overflow: hidden;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .attach.is-dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: scale(1.005);
  }
  .attach.has-content {
    border-style: solid;
    background: white;
    cursor: default;
    min-height: 0;
  }
  .attach-empty {
    width: 100%;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    color: var(--ink-mid);
    text-align: center;
  }
  .attach-empty:hover { color: var(--accent); }
  .attach-empty .attach-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .attach-empty:hover .attach-icon { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.18); }
  .attach-empty .attach-icon svg { width: 18px; height: 18px; }
  .attach-empty .attach-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
  }
  .attach-empty .attach-sub {
    font-size: 12px;
    color: var(--ink-low);
  }
  .attach-link-toggle {
    margin-top: 4px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s ease;
  }
  .attach-link-toggle:hover { background: var(--accent-soft); }

  .attach-link-entry {
    display: none;
    padding: 14px;
    width: 100%;
    align-items: center;
    gap: 8px;
  }
  .attach.is-link-entry .attach-empty { display: none; }
  .attach.is-link-entry .attach-link-entry { display: flex; }
  .attach-link-entry input {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: white;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .attach-link-entry input:focus { border-color: var(--accent); }
  .attach-link-entry .icon-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    transition: all 0.15s ease;
  }
  .attach-link-entry .icon-btn:hover { border-color: var(--ink-mid); color: var(--paper-ink); }

  /* Preview card (file or link) */
  .attach-preview {
    display: none;
    padding: 12px;
    width: 100%;
    align-items: center;
    gap: 14px;
  }
  .attach.has-content .attach-preview { display: flex; }
  .attach.has-content .attach-empty,
  .attach.has-content .attach-link-entry { display: none; }
  .attach-preview .preview-thumb {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 9px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--accent);
  }
  .attach-preview .preview-thumb img,
  .attach-preview .preview-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .attach-preview .preview-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .attach-preview .preview-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-preview .preview-meta {
    font-size: 12px;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-preview .preview-remove {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .attach-preview .preview-remove:hover {
    border-color: #ef4444;
    color: #ef4444;
  }
  .attach-preview .preview-loading {
    font-size: 13px;
    color: var(--ink-mid);
    font-style: italic;
  }

  .upload-form .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    align-items: center;
  }
  .upload-form .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    padding: 10px 18px;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    transition: all 0.15s ease;
  }
  .upload-form .btn-cancel:hover { border-color: var(--border-strong); color: var(--paper-ink); }
  .upload-form .btn-submit {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .upload-form .btn-submit:hover { background: var(--accent-hover); }
  .upload-form .btn-submit:active { transform: translateY(1px); }
  .upload-form .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .upload-form .upload-status {
    font-size: 13px;
    color: var(--ink-mid);
    min-height: 18px;
  }
  .upload-form .upload-status.error { color: #ef4444; }
  /* Link tile chrome */
  .gallery-tile.link-tile .link-chip {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(0, 0, 0, 0.65);
    color: white;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 5px;
    text-transform: uppercase;
    pointer-events: none;
  }
  .gallery-tile.link-tile .link-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: linear-gradient(135deg, var(--accent-soft), white);
    color: var(--accent);
    padding: 6px;
    text-align: center;
  }
  .gallery-tile.link-tile .link-fallback .link-icon {
    font-size: 20px;
    line-height: 1;
  }
  .gallery-tile.link-tile .link-fallback .link-domain {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  .gallery-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-low);
    font-size: 14px;
    padding: 8px 0 16px;
  }

  /* ============== LIGHTBOX ============== */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0, 0, 0, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    flex-direction: column;
    gap: 16px;
  }
  .lightbox.open { display: flex; }
  .lightbox-media {
    max-width: min(1100px, 92vw);
    max-height: 78vh;
    border-radius: 12px;
    overflow: hidden;
    background: black;
  }
  .lightbox-media img,
  .lightbox-media video {
    display: block;
    max-width: 100%;
    max-height: 78vh;
    object-fit: contain;
  }
  .lightbox-meta {
    color: white;
    text-align: center;
    max-width: min(700px, 90vw);
  }
  .lightbox-meta .lb-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .lightbox-meta .lb-desc { font-size: 14px; opacity: 0.85; line-height: 1.5; }
  .lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: white;
    border: none;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .lightbox-close:hover { background: rgba(255, 255, 255, 0.22); }

  /* ============== ADMIN CONTROLS ============== */
  .admin-bar {
    display: none;
    align-items: center;
    gap: 10px;
  }
  body.is-admin .admin-bar { display: inline-flex; }
  .admin-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid rgba(59, 130, 246, 0.25);
  }
  .archive-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--ink-mid);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .archive-btn:hover {
    border-color: #ef4444;
    color: #ef4444;
  }

  /* ============== PORTFOLIO PANEL (drop + expand) ============== */
  .portfolio-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .portfolio-panel .pf-name-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .portfolio-panel .pf-name-row label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-low);
  }
  .portfolio-panel .pf-name-row input {
    font-family: inherit;
    font-size: 15px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg-2);
    color: var(--paper-ink);
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .portfolio-panel .pf-name-row input:focus {
    border-color: var(--accent);
    background: white;
  }

  .pf-slots {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .pf-slot {
    background: var(--bg-2);
    border: 1.5px dashed var(--border-strong);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    display: flex;
    flex-direction: column;
  }
  .pf-slot.is-open {
    border-style: solid;
    border-color: var(--accent);
    background: white;
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.12);
    grid-column: 1 / -1;
  }
  .pf-slot.is-filled:not(.is-open) {
    border-style: solid;
    background: white;
    border-color: var(--border);
  }
  .pf-slot:hover:not(.is-open) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .pf-slot.is-tile-dragover:not(.is-open) {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.18);
  }
  .pf-slot-tile {
    cursor: pointer;
    padding: 18px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 120px;
    text-align: center;
    color: var(--ink-mid);
    transition: color 0.15s ease;
    position: relative;
  }
  .pf-slot.is-filled .pf-slot-tile { color: var(--paper-ink); }
  .pf-slot-icon {
    font-size: 26px;
    line-height: 1;
    color: var(--accent);
  }
  .pf-slot-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .pf-slot-status {
    font-size: 11px;
    color: var(--ink-low);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .pf-slot.is-filled .pf-slot-status { color: var(--success); font-weight: 600; }
  .pf-slot-thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
  }
  .pf-slot-thumb img,
  .pf-slot-thumb video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .pf-slot-mini-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .pf-slot.is-filled .pf-slot-mini-actions { opacity: 0.65; }
  .pf-slot.is-filled:hover .pf-slot-mini-actions { opacity: 1; }
  .pf-slot-mini-actions button {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .pf-slot-mini-actions button:hover { background: #ef4444; transform: scale(1.05); }

  .pf-slot-body {
    overflow: hidden;
    transition: max-height 0.28s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.22s ease;
    max-height: 0;
    opacity: 0;
  }
  .pf-slot.is-open .pf-slot-body {
    max-height: 1200px;
    opacity: 1;
  }
  .pf-slot-body-inner {
    padding: 6px 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .pf-slot-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 8px;
  }
  .pf-slot-head .pf-slot-head-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--paper-ink);
  }
  .pf-slot-head .pf-slot-head-title .pf-slot-icon { font-size: 20px; }
  .pf-slot-collapse {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .pf-slot-collapse:hover { border-color: var(--ink-mid); color: var(--paper-ink); }

  .pf-drop {
    border: 1.5px dashed var(--border-strong);
    border-radius: 11px;
    background: var(--bg-2);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--ink-mid);
    cursor: pointer;
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    padding: 18px 14px;
    text-align: center;
  }
  .pf-drop:hover { color: var(--accent); border-color: var(--accent); }
  .pf-drop.is-dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.18);
  }
  .pf-drop .pf-drop-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }
  .pf-drop .pf-drop-icon svg { width: 18px; height: 18px; }
  .pf-drop-text { font-size: 14px; font-weight: 600; color: var(--paper-ink); }
  .pf-drop-sub { font-size: 12px; color: var(--ink-low); }

  /* ============== CHECKPOINT PANEL (benchmarks 1-4) ============== */
  .checkpoint-panel .cp-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }
  .checkpoint-panel .cp-section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--paper-ink);
    letter-spacing: 0.01em;
  }
  .checkpoint-panel .cp-reflection {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 11px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.55;
    color: var(--paper-ink);
    background: var(--bg-1);
    resize: vertical;
    min-height: 120px;
    box-sizing: border-box;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .checkpoint-panel .cp-reflection:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .checkpoint-panel .cp-reflection::placeholder {
    color: var(--ink-low);
    white-space: pre-line;
  }
  .checkpoint-panel .cp-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 11px;
    background: var(--bg-2);
  }
  .checkpoint-panel .cp-preview[hidden] { display: none; }
  .checkpoint-panel .cp-preview img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .checkpoint-panel .cp-preview-meta {
    display: flex;
    flex: 1;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }
  .checkpoint-panel .cp-preview-name {
    font-size: 13px;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .checkpoint-panel .cp-preview-remove {
    background: none;
    border: none;
    font-size: 22px;
    line-height: 1;
    color: var(--ink-low);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.18s ease, color 0.18s ease;
  }
  .checkpoint-panel .cp-preview-remove:hover {
    background: var(--bg-1);
    color: #ef4444;
  }

  .pf-link-row {
    display: flex;
    gap: 8px;
    align-items: center;
    position: relative;
  }
  .pf-link-row .pf-link-input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }
  .pf-link-row input {
    flex: 1;
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 36px 10px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: white;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .pf-link-row input:focus { border-color: var(--accent); }
  .pf-link-row .pf-link-check {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    line-height: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease;
  }
  .pf-link-row .pf-link-check.is-valid { opacity: 1; color: var(--success); }
  .pf-link-row .pf-link-check.is-invalid { opacity: 1; color: #ef4444; }
  .pf-link-row .pf-link-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--ink-low);
    white-space: nowrap;
  }

  .pf-summary-box {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-2);
    color: var(--paper-ink);
    outline: none;
    resize: vertical;
    min-height: 110px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .pf-summary-box:focus { border-color: var(--accent); background: white; }
  .pf-char-count {
    font-size: 11px;
    color: var(--ink-low);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .pf-char-count.is-warn { color: #d97706; }
  .pf-char-count.is-over { color: #ef4444; font-weight: 600; }

  .pf-filled-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-2);
  }
  .pf-filled-preview .pf-fp-thumb {
    width: 56px;
    height: 56px;
    border-radius: 9px;
    overflow: hidden;
    background: white;
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 22px;
  }
  .pf-filled-preview .pf-fp-thumb img,
  .pf-filled-preview .pf-fp-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .pf-filled-preview .pf-fp-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .pf-filled-preview .pf-fp-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pf-filled-preview .pf-fp-meta {
    font-size: 12px;
    color: var(--ink-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pf-filled-preview .pf-fp-remove {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .pf-filled-preview .pf-fp-remove:hover { border-color: #ef4444; color: #ef4444; }

  .pf-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding-top: 6px;
  }
  .pf-status {
    font-size: 13px;
    color: var(--ink-mid);
    flex: 1;
    min-height: 18px;
  }
  .pf-status.is-error { color: #ef4444; }
  .pf-submit {
    background: var(--accent);
    color: white;
    border: none;
    padding: 11px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .pf-submit:hover:not(:disabled) { background: var(--accent-hover); }
  .pf-submit:active:not(:disabled) { transform: translateY(1px); }
  .pf-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .pf-submit.is-success {
    background: var(--success);
    opacity: 1;
    cursor: default;
    animation: submitPulse 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes submitPulse {
    0%   { transform: scale(0.96); }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  /* ============== PORTFOLIO GALLERY ============== */
  .pf-gallery {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pf-gallery-empty {
    text-align: center;
    color: var(--ink-low);
    font-size: 14px;
    padding: 20px 0;
  }
  .pf-row {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    animation: pfRowIn 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes pfRowIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pf-row.is-open {
    border-color: var(--accent);
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.07);
  }
  .pf-row-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s ease;
  }
  .pf-row-head:hover { background: var(--bg-2); }
  .pf-row-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--paper-ink);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pf-row-icons {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .pf-row-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 50%;
    font-size: 12px;
    line-height: 1;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .pf-row-chip:hover { transform: translateY(-1px); background: white; }
  .pf-row-chip .pf-chip-icon { font-size: 13px; line-height: 1; }
  .pf-row-chip.is-empty {
    background: transparent;
    color: var(--ink-low);
    border-style: dashed;
    font-size: 10px;
    font-weight: 600;
    width: auto;
    height: 22px;
    padding: 0 8px;
    border-radius: 999px;
  }
  .pf-row-caret {
    color: var(--ink-low);
    font-size: 14px;
    line-height: 1;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }
  .pf-row.is-open .pf-row-caret { transform: rotate(90deg); }
  .pf-row-delete {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-low);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  body.is-admin .pf-row-delete { display: flex; }
  .pf-row-delete:hover { border-color: #ef4444; color: #ef4444; }

  .pf-row-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.32s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .pf-row.is-open .pf-row-body { max-height: 2400px; }
  .pf-row-body-inner {
    padding: 6px 18px 18px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .pf-view-tile {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    min-height: 130px;
  }
  .pf-view-tile:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    border-color: var(--accent);
  }
  .pf-view-tile.is-expanded {
    grid-column: 1 / -1;
    cursor: default;
  }
  .pf-view-tile.is-expanded:hover { transform: none; }
  .pf-view-head {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pf-view-head .pf-view-icon {
    font-size: 16px;
    line-height: 1;
    color: var(--accent);
  }
  .pf-view-head .pf-view-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--ink-low);
    flex: 1;
  }
  .pf-view-thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    background: white;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 28px;
    position: relative;
  }
  .pf-view-thumb img,
  .pf-view-thumb video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .pf-view-thumb .play-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    pointer-events: none;
  }
  .pf-view-tile.is-expanded .pf-view-thumb {
    aspect-ratio: auto;
    max-height: 60vh;
  }
  .pf-view-tile.is-expanded .pf-view-thumb img {
    object-fit: contain;
    max-height: 60vh;
  }
  .pf-view-tile.is-expanded .pf-view-thumb video {
    object-fit: contain;
    max-height: 60vh;
  }
  .pf-view-filename {
    font-size: 12px;
    color: var(--paper-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .pf-view-open {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.15s ease;
    align-self: flex-start;
  }
  .pf-view-open:hover { background: var(--accent-hover); }
  .pf-view-summary {
    font-size: 13px;
    color: var(--paper-ink);
    line-height: 1.5;
    white-space: pre-wrap;
    overflow: hidden;
    flex: 1;
  }
  .pf-view-summary.is-collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }
  .pf-view-readmore {
    background: transparent;
    border: none;
    color: var(--accent);
    padding: 0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-start;
  }
  .pf-view-readmore:hover { text-decoration: underline; }
  .pf-view-slot-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.15s ease;
    z-index: 1;
  }
  body.is-admin .pf-view-slot-delete { display: flex; }
  .pf-view-slot-delete:hover { background: #ef4444; transform: scale(1.05); }

  /* ============== ARCHIVE VIEWER ============== */
  .archive-banner {
    background: #fef3c7;
    border: 1px solid #fcd34d;
    color: #78350f;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 22px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .archive-banner .archive-banner-tag {
    background: #d97706;
    color: white;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 5px;
    text-transform: uppercase;
  }
  .archive-banner .archive-banner-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .archive-banner button {
    background: white;
    border: 1px solid #d97706;
    color: #78350f;
    padding: 6px 12px;
    border-radius: 7px;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .archive-banner button:hover { background: #d97706; color: white; }
  .archive-banner button.btn-restore { border-color: var(--success); color: #166534; }
  .archive-banner button.btn-restore:hover { background: var(--success); color: white; }

  .archive-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .archive-list-empty {
    text-align: center;
    color: var(--ink-low);
    font-size: 14px;
    padding: 28px 0;
  }
  .archive-list-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.15s ease, box-shadow 0.18s ease, transform 0.12s ease;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .archive-list-item:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
    transform: translateY(-1px);
  }
  .archive-list-item .archive-info { flex: 1; min-width: 0; }
  .archive-list-item .archive-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--paper-ink);
    margin-bottom: 3px;
  }
  .archive-list-item .archive-meta {
    font-size: 12px;
    color: var(--ink-mid);
  }
  .archive-list-item .archive-caret { color: var(--ink-low); font-size: 14px; }

  /* "Show next 50" pager */
  .pf-pager {
    display: flex;
    justify-content: center;
    padding: 14px 0 4px;
  }
  .pf-pager button {
    background: white;
    border: 1px solid var(--border-strong);
    color: var(--paper-ink);
    padding: 9px 18px;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.15s ease;
  }
  .pf-pager button:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .pf-pager button:disabled { opacity: 0.5; cursor: default; }

  /* Friendly file-unavailable placeholder */
  .pf-broken {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-2);
    color: var(--ink-low);
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    padding: 8px;
    gap: 4px;
  }
  .pf-broken .pf-broken-icon { font-size: 20px; opacity: 0.6; }

  /* Soft warning under upload (large file) */
  .pf-soft-warn {
    background: #fef3c7;
    border: 1px solid #fcd34d;
    color: #78350f;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.4;
    margin-top: 6px;
  }

  /* Retry button surfaced after upload failures */
  .pf-retry-btn {
    background: white;
    border: 1px solid #ef4444;
    color: #ef4444;
    padding: 6px 12px;
    border-radius: 7px;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    margin-left: 8px;
    transition: all 0.15s ease;
  }
  .pf-retry-btn:hover { background: #ef4444; color: white; }

  /* Bound thumbnail sizes so the browser doesn't decode at full res */
  .pf-row-chip img,
  .pf-slot-thumb img,
  .pf-fp-thumb img {
    max-width: 120px;
    max-height: 120px;
  }

  /* ============== TABLET ============== */
  @media (max-width: 900px) and (min-width: 641px) {
    .pf-slots { grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .pf-slot-tile { min-height: 110px; padding: 14px 8px; }
    .pf-slot-icon { font-size: 22px; }
    .pf-slot-label { font-size: 11px; letter-spacing: 1px; }
    .pf-slot-status { font-size: 10px; }
  }

  /* ============== REDUCED MOTION ============== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ============== MOBILE ============== */
  @media (max-width: 640px) {
    .header-inner { padding: 16px 20px; gap: 8px; flex-wrap: wrap; }
    main { padding: 28px 20px 80px; }
    .benchmark { padding: 14px 16px; gap: 12px; }
    .points { font-size: 12px; padding: 4px 10px; }
    .artifact-count { font-size: 11px; padding: 4px 8px; }
    .modal {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
    }
    .modal-header { padding: 20px 22px 16px; }
    .modal-body { padding: 20px 22px 32px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pf-slots { grid-template-columns: repeat(2, 1fr); }
    .pf-slot.is-open { grid-column: 1 / -1; }
    .pf-row-body-inner { grid-template-columns: repeat(2, 1fr); }
    .pf-slot-tile { min-height: 100px; padding: 14px 8px; }
    .pf-slot-icon { font-size: 22px; }
  }

  /* ============== TOOLS PAGE ============== */
  .tools-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    margin-bottom: 36px;
  }
  @media (max-width: 760px) {
    .tools-grid { grid-template-columns: 1fr; }
  }
  .tool-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 2px 6px rgba(17, 17, 17, 0.04);
    padding: 28px 28px 26px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 180px;
  }
  .tool-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
  }
  .tool-card.is-disabled {
    cursor: not-allowed;
    opacity: 0.78;
  }
  .tool-card.is-disabled:hover {
    transform: none;
    border-color: var(--border);
    box-shadow: 0 2px 6px rgba(17, 17, 17, 0.04);
  }
  .tool-card-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0;
  }
  .tool-card.is-disabled .tool-card-eyebrow {
    color: var(--ink-low);
  }
  .tool-card-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-hi);
    margin: 0;
  }
  .tool-card-blurb {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0;
    line-height: 1.55;
  }
  .tool-card-footer {
    margin-top: auto;
    padding-top: 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .tool-card.is-disabled .tool-card-footer {
    color: var(--ink-low);
  }

  .tools-section-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin: 12px 0 14px;
  }
  .tools-refs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 900px) {
    .tools-refs { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .tools-refs { grid-template-columns: 1fr; }
  }
  .tool-ref-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px 14px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 0.12s ease, border-color 0.15s ease, box-shadow 0.18s ease;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
  }
  .tool-ref-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
  }
  .tool-ref-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink-hi);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .tool-ref-blurb {
    font-size: 12.5px;
    color: var(--ink-mid);
    margin: 0;
    line-height: 1.45;
  }
  .tool-ref-host {
    font-size: 11px;
    color: var(--ink-low);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* ============== SCHEMATIC TOOL ============== */
  .schem-wrap {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .schem-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    padding: 14px 18px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
  }
  .schem-toolbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .schem-toolbar-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-low);
  }
  .schem-color-row {
    display: flex;
    gap: 6px;
  }
  .schem-color {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border-strong);
    cursor: pointer;
    transition: transform 0.12s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    padding: 0;
  }
  .schem-color:hover { transform: scale(1.08); }
  .schem-color.is-active {
    border-color: var(--ink-hi);
    box-shadow: 0 0 0 2px var(--bg-1), 0 0 0 4px var(--ink-hi);
  }
  .schem-btn {
    background: var(--bg-1);
    border: 1px solid var(--border);
    color: var(--ink-mid);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .schem-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .schem-btn.is-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .schem-btn.is-primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    color: white;
  }
  .schem-btn.is-danger:hover {
    border-color: #dc2626;
    color: #dc2626;
    background: #fef2f2;
  }
  .schem-back {
    background: none;
    border: none;
    color: var(--ink-mid);
    cursor: pointer;
    padding: 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .schem-back:hover { color: var(--accent); }

  .schem-stage {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
  }
  @media (max-width: 820px) {
    .schem-stage { grid-template-columns: 1fr; }
  }

  .schem-palette {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 640px;
    overflow-y: auto;
  }
  .schem-palette-group {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-low);
    margin: 8px 4px 4px;
  }
  .schem-palette-group:first-child { margin-top: 2px; }
  .schem-palette-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-2);
    cursor: pointer;
    transition: all 0.12s ease;
    font-size: 13px;
    color: var(--ink-hi);
    text-align: left;
    width: 100%;
  }
  .schem-palette-item:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }
  .schem-palette-thumb {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .schem-canvas-wrap {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    overflow: auto;
    max-height: 640px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
  }
  .schem-canvas {
    display: block;
    background: #FAF6EE;  /* clean workspace */
    border-radius: 8px;
    user-select: none;
  }
  .schem-pin {
    cursor: crosshair;
    transition: r 0.1s ease, fill 0.1s ease;
  }
  .schem-pin:hover { fill: #fbbf24 !important; }
  .schem-pin.is-pending {
    fill: #f59e0b !important;
    stroke: #b45309;
    stroke-width: 2;
  }
  .schem-component {
    cursor: grab;
  }
  .schem-component.is-dragging { cursor: grabbing; }
  .schem-wire {
    fill: none;
    stroke-linecap: round;
    pointer-events: stroke;
    cursor: pointer;
  }
  .schem-wire:hover { opacity: 0.7; }
  .schem-solder {
    pointer-events: none;
  }

  .schem-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink-hi);
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }
  .schem-toast.is-visible {
    opacity: 1;
    transform: translateX(-50%) translateY(-4px);
  }

  .schem-hint {
    font-size: 12.5px;
    color: var(--ink-mid);
    line-height: 1.55;
    padding: 10px 14px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
  }

  /* ============== VIBE CODING TOOL ============== */
  /* IDE-first layout: the editor + serial monitor fill the page width.
     Chat lives in a floating drawer that slides in from the right when
     the student clicks the "Ask AI" button — like Cursor / VSCode Copilot. */
  .vibe-wrap {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 8px;
    height: calc(100vh - 200px);
    min-height: 600px;
  }

  /* Floating Ask AI button — gradient pill, fixed bottom-right. */
  .vibe-ai-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 90;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #14b8a6 0%, #0ea5e9 55%, var(--accent) 100%);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 14px 22px 14px 18px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    box-shadow: 0 14px 34px rgba(59, 130, 246, 0.30), 0 2px 6px rgba(0, 0, 0, 0.08);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .vibe-ai-fab:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 48px rgba(59, 130, 246, 0.36), 0 2px 6px rgba(0, 0, 0, 0.10);
  }
  .vibe-ai-fab .vibe-ai-fab-icon {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    flex-shrink: 0;
  }
  .vibe-ai-fab .vibe-ai-fab-icon svg { width: 14px; height: 14px; }

  .vibe-drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }
  .vibe-drawer-backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  .vibe-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(540px, 92vw);
    z-index: 101;
    background: var(--bg-1);
    box-shadow: -16px 0 48px rgba(15, 23, 42, 0.18);
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.32, 0.72, 0.4, 1);
    display: flex;
    flex-direction: column;
  }
  .vibe-drawer.is-open { transform: translateX(0); }

  .vibe-drawer-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: white;
  }
  .vibe-drawer-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink-hi);
    margin: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .vibe-drawer-title-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #14b8a6, var(--accent));
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
  }
  .vibe-drawer-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .vibe-drawer-close:hover { border-color: var(--ink-mid); color: var(--ink-hi); }

  /* The role / "stem" card — frames the conversation as if the student
     is talking to an assistive-technology engineer. Read-only context. */
  .vibe-role-card {
    margin: 16px 18px 0;
    padding: 16px 18px;
    background: linear-gradient(135deg, rgba(20, 184, 166, 0.09) 0%, rgba(59, 130, 246, 0.08) 100%);
    border: 1px solid rgba(59, 130, 246, 0.22);
    border-radius: 14px;
    color: var(--ink-hi);
    line-height: 1.55;
  }
  .vibe-role-card-eyebrow {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 6px;
  }
  .vibe-role-card-body {
    font-size: 13.5px;
    color: var(--ink-mid);
    margin: 0;
  }
  .vibe-role-card-body strong { color: var(--ink-hi); font-weight: 600; }

  @media (max-width: 980px) {
    .vibe-wrap { height: auto; }
  }
  .vibe-panel {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .vibe-panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--bg-2);
  }
  .vibe-panel-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin: 0;
  }
  .vibe-panel-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* Chat panel */
  .vibe-chat-scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }
  .vibe-chat-empty {
    color: var(--ink-low);
    font-size: 13.5px;
    text-align: center;
    padding: 32px 18px;
    line-height: 1.6;
  }
  .vibe-chat-empty strong {
    color: var(--ink-mid);
    display: block;
    margin-bottom: 8px;
    font-size: 14.5px;
  }
  .vibe-msg {
    max-width: 92%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .vibe-msg-user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border: none;
  }
  .vibe-msg-ai {
    align-self: flex-start;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--ink-hi);
  }
  .vibe-msg-error {
    align-self: flex-start;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    font-size: 13.5px;
  }
  .vibe-msg-loading {
    align-self: flex-start;
    color: var(--ink-mid);
    font-size: 13.5px;
    font-style: italic;
    animation: vibePulse 1.4s ease-in-out infinite;
  }
  @keyframes vibePulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
  .vibe-msg-codepreview {
    margin-top: 8px;
    background: #1e293b;
    color: #e2e8f0;
    border-radius: 8px;
    padding: 10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12px;
    line-height: 1.5;
    max-height: 180px;
    overflow: auto;
    white-space: pre;
  }
  .vibe-msg-copybtn {
    margin-top: 8px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .vibe-msg-copybtn:hover { background: #2563eb; }
  .vibe-msg-copybtn.is-copied { background: var(--success); }

  /* Prompt starter chips — quick-fill templates modeled on modern code-prompt
     patterns ("Act like...", "Walk me through...", "Debug this..."). Click a
     chip to drop its scaffold into the input; the cursor lands at the
     customizable portion ready to type. */
  .vibe-stems {
    border-top: 1px solid var(--border);
    background: var(--bg-2);
    padding: 12px 18px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .vibe-stem {
    background: white;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .vibe-stem:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .vibe-stem-icon {
    font-size: 11px;
    opacity: 0.7;
  }

  .vibe-input-row {
    border-top: 1px solid var(--border);
    padding: 12px 18px 16px;
    background: var(--bg-2);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .vibe-input {
    flex: 1 1 auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--bg-1);
    padding: 14px 16px;
    font: inherit;
    font-size: 15px;
    line-height: 1.55;
    resize: none;
    min-height: 64px;
    max-height: 220px;
    color: var(--ink-hi);
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .vibe-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }
  .vibe-send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 0;
    width: 56px;
    height: 56px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.12s ease, opacity 0.15s ease;
    align-self: flex-end;
    flex-shrink: 0;
  }
  .vibe-send-btn:hover { transform: translateY(-1px); }
  .vibe-send-btn:hover { background: #2563eb; }
  .vibe-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Editor panel: takes full page width now. Editor expands, monitor docks
     at bottom. */
  .vibe-right {
    display: grid;
    grid-template-rows: auto auto 1fr auto auto auto;
    min-height: 0;
    flex: 1 1 auto;
  }
  .vibe-editor-wrap {
    flex: 1 1 auto;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 240px;
  }
  .vibe-editor-wrap .CodeMirror {
    height: 100%;
    font-size: 13px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
  }
  .vibe-editor-fallback {
    flex: 1 1 auto;
    width: 100%;
    border: none;
    padding: 14px 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 13px;
    line-height: 1.55;
    background: var(--bg-1);
    color: var(--ink-hi);
    resize: none;
    outline: none;
  }
  .vibe-monitor-header {
    background: #0f172a;
    color: #cbd5e1;
    padding: 11px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .vibe-monitor-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: #94a3b8;
    margin: 0;
  }
  .vibe-monitor-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .vibe-monitor-controls select,
  .vibe-monitor-controls .vibe-mini-btn {
    background: #1e293b;
    color: #e2e8f0;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 11.5px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .vibe-monitor-controls .vibe-mini-btn:hover {
    background: #334155;
  }
  .vibe-monitor {
    background: #0b1220;
    color: #4ade80;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 13.5px;
    line-height: 1.6;
    padding: 18px 20px;
    height: 260px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .vibe-monitor::-webkit-scrollbar { width: 10px; }
  .vibe-monitor::-webkit-scrollbar-track { background: #0b1220; }
  .vibe-monitor::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
  .vibe-monitor::-webkit-scrollbar-thumb:hover { background: #334155; }
  .vibe-monitor-empty {
    color: #475569;
    font-style: italic;
  }

  .vibe-btn {
    background: var(--bg-1);
    border: 1px solid var(--border);
    color: var(--ink-mid);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .vibe-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .vibe-btn.is-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .vibe-btn.is-primary:hover {
    background: var(--accent-hover);
    color: white;
  }
  .vibe-btn.is-active {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .vibe-btn.is-copied {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }

  /* Chat avatars — ChatGPT-style "AI" / "You" mini circles next to each
     message. Keeps the conversation legible at a glance. */
  .vibe-msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .vibe-msg-row.is-user { flex-direction: row-reverse; }
  .vibe-msg-row.is-loading { gap: 10px; }
  .vibe-msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: white;
